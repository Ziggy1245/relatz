pursue, to text, to check, to apologise when you have not done anything wrong, to re-engage when you know you should not: do not fight the urge and do not act on it. Simply notice it as a wave. It rose. It will peak. It will fall without you having to do anything. Riding it out builds the muscle of not reacting. Each time you surf it rather than act on it, the wave is slightly smaller next time.\n\nCognitive Defusion — for thoughts that feel like facts: instead of \'I am not good enough\' try \'I notice I am having the thought that I am not good enough.\' Instead of \'They do not care about me\' try \'My mind is telling me they do not care about me.\' You are not arguing with the thought. You are stepping one pace back from it. This creates just enough distance to choose how to respond rather than fusing with it as if it were reality.\n\nDouble Standards — for self-criticism and shame: ask one question. Would I say this to someone I care about in the same situation? If the answer is no — and it almost always is — the standard you are applying to yourself is not a neutral measure of truth. It is a legacy of the environment you were raised in. Apply the same standard to yourself that you would apply to someone you love.\n\nButterfly Tapping — cross your arms over your chest and alternately tap each shoulder slowly and rhythmically. Or tap alternately on your knees. The bilateral stimulation — left, right, left, right — activates both hemispheres of the brain in sequence. This is used in EMDR and trauma work because it helps the nervous system process what it is holding without needing to speak it or think it through. Particularly useful when you are flooded and words feel impossible.\n\nRemove Blame — when shame arrives: your nervous system did what nervous systems do. When triggered, the midbrain activates and the higher reasoning brain goes offline. You did not choose to react the way you did in the same way that you do not choose to flinch when something moves fast near your face. What happened in the past that shaped this response was not your fault. What you do with it now is yours — but blame and shame do not accelerate that process. Compassion does.\n\nDEAR MAN — a DBT communication structure for asserting what you need: Describe the situation factually without interpretation. Express how you feel about it using I statements. Assert what you need clearly and specifically. Reinforce why meeting this need is good for both of you. Mindful — stay focused on your goal and do not get pulled into side arguments. Appear confident even if you do not feel it — slow your speech, hold your posture, speak clearly. Negotiate if necessary — know in advance what you are and are not willing to move on.\n\nRadical Acceptance — for situations you cannot change: this is not approval. It is the decision to stop fighting reality, which always costs more than the reality itself. It is acknowledging: this happened, this is how things are, I do not have to like it to accept that it is true. Resistance to reality does not change it. It only adds suffering to pain."], ["The EAR framework — a way to understand what goes wrong", "David Burns developed a framework for understanding relational complaints that is worth keeping in mind when conversations break down. Most complaints in relationships cluster around three areas: Empathy — the sense of not being heard or understood; Assertiveness — difficulty expressing what you feel or need directly; and Respect — feeling dismissed, used, or not valued.\n\nThe useful clinical observation is that the thing we most complain about in the other person is often something we are doing to ourselves or to them in the way we are responding. The person who complains that their partner never listens may find they are doing a lot of explaining and very little asking. The person who feels disrespected may find they are not naming the disrespect directly but hoping it will be noticed.\n\nThis is not blame — it is leverage. If you are contributing to the pattern, even in a small way, that means there is something within your reach to change. That is more useful than being entirely at the effect of what someone else is or is not doing.\n\nIn practice this means: before asking the other person to change, identify one thing in your own behaviour that might be sustaining the pattern. Not because the problem is your fault, but because that is where your actual power is."]]
  },
  distortions: {
    title: "Cognitive Distortions",
    badge: "Cognitive Distortions",
    bc: "bg-sky-50 border-sky-200",
    tc: "bg-sky-100 text-sky-700",
    body: "Cognitive distortions are systematic patterns of thinking that are biased away from reality. Aaron Beck first identified them in the 1960s while developing cognitive therapy for depression. David Burns expanded and popularised the framework in his clinical work. Albert Ellis developed a parallel model through Rational Emotive Behaviour Therapy, identifying what he called irrational beliefs. Martin Seligman contributed the explanatory styles framework — how people habitually explain setbacks to themselves. Together these theorists mapped the cognitive architecture of emotional suffering. They are not character flaws — they are habits of mind, often learned in environments where they were adaptive. Recognising them is the first step to challenging them. The goal is not to replace them with forced positivity but with more accurate, balanced thinking.",
    secs: [["All-or-nothing thinking", "Seeing things in black and white, with no middle ground. If something is not perfect it is a total failure. If someone is not completely trustworthy they are entirely untrustworthy. This distortion is particularly active in the perfectionist patterns — Never Good Enough, The Performance, Unrelenting Standards — where partial success is experienced as failure.\n\nChallenge: Where is the grey here? What would a more accurate spectrum look like? What percentage would I actually give this rather than 0 or 100?"], ["Overgeneralisation", "Taking a single negative event and treating it as a never-ending pattern. One rejection becomes nobody will ever want me. One mistake becomes I always get things wrong. The key words are always, never, everyone, nobody, everything, nothing.\n\nChallenge: Is this actually always true, or does it feel that way right now? What would the evidence look like if I counted carefully?"], ["Mental filter", "Picking out a single negative detail and dwelling on it exclusively, so that it colours the entire picture. Like a drop of ink in a glass of water — one critical comment at a meeting makes the whole day a failure despite ten things going well.\n\nChallenge: What am I filtering out? If I were a fair witness to the whole picture, what else would I include?"], ["Discounting the positive", "Rejecting positive experiences by insisting they do not count. You did well because it was easy. They said something kind but they were just being polite. This distortion is self-sustaining because it makes the negative evidence permanent and the positive evidence meaningless.\n\nChallenge: What would I think if a friend dismissed their achievement the way I am dismissing mine? Would I accept their reasoning?"], ["Jumping to conclusions", "Making a negative interpretation without actual supporting evidence. Mind reading: assuming you know what someone else is thinking, usually negatively. Fortune telling: predicting that things will turn out badly and treating the prediction as fact.\n\nChallenge: What is the actual evidence for this interpretation? What are two or three other possible explanations?"], ["Magnification and minimisation", "Exaggerating the importance of problems and shortcomings, or minimising the significance of positive qualities and events. Also called catastrophising — turning a mistake into a disaster, a difficulty into an impossibility.\n\nChallenge: If I put this on a scale of 0 to 100 where 100 is the worst thing that could happen to a person, what number does this actually deserve? What would I tell a friend in this situation?"], ["Emotional reasoning", "Assuming that negative emotions necessarily reflect the way things really are. I feel it therefore it must be true. I feel stupid therefore I am stupid. I feel guilty therefore I must have done something wrong. I feel afraid therefore there must be real danger.\n\nChallenge: Feelings are real but they are not always accurate maps of reality. What would the evidence say, separate from how it feels?"], ["Should statements", "Motivating yourself with should and should not, must, ought, and have to. When directed at yourself this produces guilt and shame. When directed at others it produces frustration and resentment. Albert Ellis called this musturbation — the rigid insistence on how things must be.\n\nChallenge: Why should I? Says who? What would happen if I replaced should with I would like to or it would be helpful if?"], ["Labelling", "An extreme form of overgeneralisation. Instead of saying I made a mistake, you say I am a failure. Instead of they did something hurtful, you say they are a bad person. The label is a global negative judgment on the entire self or the other person based on a single event.\n\nChallenge: What specifically happened? What did I or they do, rather than what am I or they?"], ["Personalisation and blame", "Holding yourself responsible for things that are not fully within your control. Seeing yourself as the cause of external events you were not primarily responsible for. Or the reverse — blaming other people entirely and not considering your own contribution.\n\nChallenge: What were all the factors that contributed to this? What is my actual percentage of responsibility — not 0 and not 100?"], ["The 3 Ps — Permanence, Pervasiveness and Personalisation", "Martin Seligman identified three explanatory styles that determine how people respond to adversity. Permanence: believing the negative will last forever versus seeing it as temporary. Pervasiveness: believing the negative affects everything versus just this situation. Personalisation: believing it is entirely your fault versus seeing it as partly situational.\n\nThe most resilient explanatory style is: this is temporary, it is specific to this situation, and I am not the only cause. The most depressive style is: this is permanent, it poisons everything, and it is entirely my fault.\n\nChallenge: Is this permanent or temporary? Is it specific or pervasive? How much is me and how much is situation?"], ["A note on CBT's limits", "A fair criticism of CBT is that it can be mechanistic — that it treats the person as a collection of components to be adjusted rather than a meaning-making human being with a history, a relational context, and a nervous system shaped by experience.\n\nThe best CBT practitioners recognise this. The three-component model is a map, not the territory. It does not capture the developmental history that shaped the automatic thoughts in the first place, the attachment wounds underneath the schemas, or the nervous system state that makes cognitive access impossible when activation is high.\n\nIn the context of this app: CBT tools are most useful in the middle zone — when activation is moderate, the thinking brain is at least partially online, and the person has some capacity to observe their own thoughts. When someone is in a high activation state (stuck on) or a collapsed state (stuck off), body-first tools come before cognitive ones. The nervous system needs to return to a degree of regulation before restructuring becomes possible.\n\nCBT combined with somatic awareness, attachment understanding, and trauma-informed practice is significantly more effective than any one approach alone. Use the tools here as one layer of a multi-layered approach."], ["Magical thinking", "Magical thinking is the belief that one\'s thoughts, worries, or unrelated actions have causal power over external events. The mind operates as if thinking about something makes it more likely to happen, or as if a ritual or behaviour can prevent something bad from occurring.\n\nCommon forms:\n\nThought-action fusion — thinking about something bad makes it more likely to happen, or means I wanted it to happen.\n\nSuperstitious causation — I said the wrong word, wore the wrong thing, or allowed myself to feel happy, and now something bad will follow.\n\nPreventive ritual — if I do not check, count, or arrange things in a specific way, harm will result.\n\nThe happiness trap — allowing oneself to feel good or optimistic is dangerous because it will invite punishment. The person maintains a low emotional baseline as protection.\n\nMagical thinking is particularly common in OCD, health anxiety, and in people whose early environments meant that good things were regularly followed by withdrawal, punishment, or rupture — producing a learned association between positive states and subsequent loss.\n\nThe counter: thoughts are mental events, not actions. Thinking about something does not make it more likely to happen. The anxiety is real. The causal mechanism is not. Thought and external event are separate. They always were."], ["References", "Beck, A.T. (1979). Cognitive therapy of depression. Guilford Press. | Burns, D.D. (1980). Feeling good: The new mood therapy. William Morrow. | Burns, D.D. (1989). The feeling good handbook. William Morrow. | Ellis, A. & Harper, R.A. (1975). A new guide to rational living. Prentice Hall. | Seligman, M.E.P. (1991). Learned optimism. Knopf. | Vivyan, C. (2009). Unhelpful thinking styles. Get Self Help. | Beck, J.S. (2011). Cognitive behaviour therapy: Basics and beyond (2nd ed.). Guilford Press."]]
  },
  selfcare: {
    title: "Self-Care — Restoring the System",
    badge: "Self-Care",
    bc: "bg-lime-50 border-lime-200",
    tc: "bg-lime-100 text-lime-700",
    body: "Self-care is not indulgence. It is the maintenance of the system that everything else runs on. When the nervous system is chronically activated — by patterns of over-responsibility, emotional neglect, boundary violation, or relentless self-monitoring — the body and mind need consistent, deliberate replenishment. This is not optional for people doing relational healing work. It is the foundation.",
    secs: [["Body and physical restoration", "Movement that belongs to you alone — walking, running, swimming, yoga, dancing in your kitchen. The body holds the relational patterns somatically and movement is one of the most reliable ways to discharge what has accumulated. Regular exercise is one of the most evidence-based interventions for mood, anxiety, and nervous system regulation.\n\nRest without agenda — sleeping in, a bath with candles, doing nothing at all. Rest is not laziness. For people who were parentified, who over-function, or who were only valued for what they produced, the capacity to rest without earning it first is often genuinely difficult. Practice it as a skill.\n\nSensory pleasure — aromatherapy, massage, a sauna, a long walk in the woods, the first sip of morning coffee. The sensory system is the fastest route to the present moment. Pleasure is not trivial — it is the nervous system learning that the world is not only threatening."], ["Connection and creativity", "Connection with people who are genuinely safe — not people you manage, maintain, or perform for. Real connection, which involves being known rather than useful. Chatting with a friend who hears you. Debriefing with someone who gets it.\n\nCreativity in any form — cooking without pressure, gardening, music, singing, writing, craft, photography. Creativity is not about skill. It is about engagement, expression, and the experience of making something that did not exist before. This activates parts of the self that purely relational or cognitive work does not reach.\n\nHumour and lightness — stand-up comedy, sharing a joke, watching something funny. Laughter is physiologically regulatory — it activates the social engagement system, releases tension, and is incompatible with sustained threat activation."], ["Reflection and meaning", "Journalling — not necessarily to process difficulty but simply to notice your own experience. What am I thinking? What do I want? What happened today? Giving your inner world a place to exist in words.\n\nGratitude practice — identifying one good thing at the end of each day, however small. Not toxic positivity but genuine noticing of what was present. This is not about denying difficulty — it is about training the attention not to filter exclusively for threat.\n\nInspirational reading, purposeful learning, attending workshops. The part of you that wants to understand, to grow, to make meaning of what you have experienced deserves investment."], ["Boundaries with input", "Leaving the computer off sometimes. Avoiding news cycles that activate without informing. Social media breaks. The nervous system cannot distinguish between a threat in the room and a threat on a screen — sustained media exposure keeps the system in a low-level state of alertness that compounds everything else.\n\nSilence. Time alone that is genuinely restorative rather than lonely. For people who have spent their lives attending to others' states, silence is where the authentic self can be heard."], ["Reconnecting with nature as regulation", "Nature contact is one of the most underused and most evidence-supported regulation tools available. It requires no equipment, no skill, and no particular effort — only the willingness to be present in the natural world for a period of time without an agenda.\n\nAimless outdoor time — going outside without a purpose or destination, without a task to complete or a destination to reach. This is specifically counter to how most people with activated nervous systems habitually move through the world. For those who were only valued for what they produced, the capacity to be genuinely aimless is itself a practice. Start with a short period — even ten minutes — and allow the eyes to move without direction.\n\nSensory immersion — focus on what you can hear in the natural environment: wind, rain, birds, water. Turn off media and simply listen. Notice colour as it changes through the seasons, light through leaves, the texture of bark or stone. The sensory system is the fastest route to the present moment, and nature provides an endlessly renewable sensory environment that makes no demands in return.\n\nWalking as regulation — a deliberate walk with attention on the connection between feet and ground, the feel of air on skin, the rhythm of the body moving. This is different from walking as exercise or as transport. It is walking as a way of returning to the body. The bilateral rhythm of walking has been shown to assist with emotional processing — this is part of why EMDR uses bilateral stimulation and why many people find that difficult conversations are easier on a walk than sitting still.\n\nBringing the outside in — when outdoor access is limited, fresh air through an open window, a plant on a windowsill, natural textures and materials, the sound of rain. The body responds to sensory cues from the natural world even in small doses.\n\nThe research base for nature contact as a mental health intervention is now substantial. Time in natural environments reduces cortisol, lowers blood pressure, improves mood, and activates the parasympathetic nervous system. This is not metaphorical. The body is part of the natural world and responds to it as such."], ["Self-validation", "Validating yourself — to yourself and to people you trust. Acknowledging your own experience before you seek acknowledgement from others. The practice of being a fair witness to yourself rather than applying a harsher standard than you would apply to anyone else.\n\nBuying yourself flowers. Small gestures of care directed at yourself rather than always outward. The question worth asking is: do I give to myself with the same generosity that I give to others? If not — that gap is both a symptom of the patterns and a place to begin repairing them."]]
  },
  stresstrauma: {
    title: "Stress, Trauma and Complex Trauma",
    badge: "Stress vs Trauma",
    bc: "bg-violet-50 border-violet-200",
    tc: "bg-violet-100 text-violet-700",
    body: "The words stress and trauma are used interchangeably in everyday language but they describe significantly different things clinically. The distinction matters because the tools that help, and the timescale of recovery, are different for each.",
    secs: [["Stress — a response to demand", "Stress is the nervous system responding to a demand that exceeds available resources — a deadline, a conflict, a period of overload. Stress is normal, universal, and in moderate amounts adaptive. It sharpens focus and mobilises the system to meet the challenge.\n\nThe key feature of stress is that it resolves. When the demand passes, the nervous system returns to baseline. Cortisol drops. The muscles release. The mind quietens.\n\nChronic stress occurs when the demands do not pass. The system remains mobilised for weeks or months, producing cumulative harm: immune depletion, hormonal disruption, sleep problems, cognitive impairment, mood instability. But it is still, in principle, a response to a current situation. Change the situation and the stress begins to resolve.\n\nThe practical test: Is the nervous system responding to something actually happening now? If reducing the demand would reduce the response — that is stress."], ["Trauma — when the past stays present", "Trauma occurs when an experience overwhelms the nervous system's capacity to process and integrate it. The event is too much, too fast, too soon, or too repeated. The ordinary mechanisms for filing an experience into memory and moving on do not complete. The event stays live — encoded in the body and the nervous system — as if it were still happening.\n\nThe defining feature of trauma is not what happened. It is what happens inside the person as a result. Two people can experience the same event and one is traumatised and one is not, depending on their developmental history, available support, and the state of their nervous system at the time.\n\nBessel van der Kolk describes trauma as the body continuing to mobilise in response to a threat that is no longer present. The nervous system is responding accurately to its internal state — but that internal state reflects the past, not the present. This is why trauma reactions can appear disproportionate to the current situation. They are not disproportionate to what they are actually responding to.\n\nSingle-incident trauma — a car accident, an assault, a sudden loss — produces PTSD symptoms: intrusive memories, hypervigilance, avoidance, emotional numbing. With good support it can be processed and integrated."], ["Complex trauma — when it happened over time", "Complex trauma (C-PTSD) is different from single-incident PTSD in important ways not yet fully reflected in mainstream diagnostics.\n\nComplex trauma is developmental — it occurs during childhood within the attachment relationship itself. Not a single overwhelming event but repeated, chronic experience of neglect, emotional unavailability, inconsistency, abuse, enmeshment, or parentification. Because it happens during the period when the nervous system, brain, and attachment architecture are being formed, it shapes the very structures through which the person later experiences the world.\n\nThe effects of complex trauma are therefore not primarily symptoms following a remembered event. They are structural — built into the nervous system baseline, the relational templates, the sense of self, and the capacity for emotional regulation.\n\nMany people with complex developmental trauma do not identify as traumatised because there was no single dramatic incident to point to. The harm was ambient — the cumulative effect of a thousand ordinary interactions in which the child's authentic self was not seen, met, or safe. This is among the most important things to understand about developmental trauma: the absence of something that should have been there is just as formative as the presence of something that should not have been.\n\nJudith Herman, who described complex PTSD in 1992, identified the core features: difficulties with emotional regulation, disturbances of consciousness and memory, changes in self-perception, disturbances in relations with others, alterations in systems of meaning. These are not symptoms of an event. They are the architecture of a self that had to adapt to an environment that could not support its development."], ["Why the distinction matters", "If someone is experiencing stress, the intervention is environmental and behavioural — reduce the demand, restore resources, regulate the acute activation. The nervous system can return to baseline because it was functioning from baseline before.\n\nIf someone is experiencing trauma, the intervention needs to reach further back. The nervous system is not returning to a regulated baseline because it never had a stable regulated baseline to return to. The relational patterns in this app — the over-responsibility, the eggshell-walking, the disappearing, the compulsive caretaking, the loop — are not responses to current stress. They are old architecture. They were built in conditions that no longer exist, but the nervous system does not know that yet.\n\nThis is why insight alone is rarely enough. Understanding the pattern does not automatically dissolve it. The nervous system needs repeated new experience — particularly within safe relationship — to build the neural pathways that were never laid down. This is slower than insight. It is also more durable.\n\nAnd it is possible. The hippocampus grows new neurons throughout life. The nervous system can learn. The window of tolerance can widen. The fantasy bond can be grieved. The parts carrying the old material can be met and allowed to rest."], ["References", "Herman, J. (1992). Trauma and recovery. Basic Books. | van der Kolk, B. (2014). The body keeps the score. Viking. | Walker, P. (2013). Complex PTSD: From surviving to thriving. Azure Coyote. | Porges, S.W. (2011). The polyvagal theory. Norton. | Fisher, J. (2017). Healing the fragmented selves of trauma survivors. Routledge."]]
  },
  cbt: {
    title: "Cognitive Behavioural Therapy — Core Tools",
    badge: "CBT",
    bc: "bg-orange-50 border-orange-200",
    tc: "bg-orange-100 text-orange-700",
    body: "Epictetus wrote in the first century: it is not the things themselves but what we make of them that causes discomfort. CBT is the clinical operationalisation of that insight. Situations do not cause emotions directly — our reactions do, and those reactions happen across three channels that constantly influence each other: thoughts, feelings in the body, and behaviour. Pull on one and the others shift. This is both the problem and the solution. CBT is recommended by NICE as a first-line treatment for depression, anxiety, OCD, PTSD, eating disorders, phobias, and substance misuse — one of the most extensively researched psychological interventions available.",
    secs: [["The three-component model", "When something happens, a thought arises — usually rapidly and without much awareness. That thought produces a physical sensation (tension, heaviness, racing heart, the pit in the stomach). The sensation and the thought together generate a behavioural impulse — to avoid, to attack, to withdraw, to overcompensate.\n\nThe loop runs in all directions. Thoughts shape feelings. Feelings shape thoughts — when mood is low, the mind tends to generate low-mood-consistent thoughts even about unrelated things. Behaviour shapes both — avoiding something you fear teaches the mind that the thing is dangerous, confirming the fear. Approaching it teaches the opposite.\n\nThe clinical use of this: you do not have to interrupt the loop at the thought level. Changing behaviour changes thoughts and feelings. Changing the physical state changes thoughts and behaviour. Any entry point into the loop will affect the whole system."], ["Automatic thoughts and hot thoughts", "Automatic thoughts are the rapid, habitual commentary the mind produces throughout the day — usually without awareness. They are not deliberate reasoning. They arise spontaneously in response to situations and are shaped by years of accumulated experience, belief, and developmental history.\n\nExamples: they are ignoring me, I always get this wrong, nobody actually wants me here, I should have handled that better, this is never going to improve.\n\nThey feel like facts. They are not facts. They are interpretations — the meaning the mind has automatically assigned to an event, based on existing templates. Two people in the same situation will have different automatic thoughts based on their different histories, and will consequently feel and behave differently.\n\nThe clinical power of noticing automatic thoughts: simply becoming aware that a thought is a thought — not a fact — creates a small but significant distance from it. This is called metacognition: the ability to observe your own thinking. It does not resolve the thought. It reduces the degree to which you are fused with it and driven by it.\n\nHow to catch automatic thoughts: when a strong emotion arrives, ask — what was just running through my mind? What does this situation mean to me? What am I afraid this means? The thought is often found in the answer to those questions.\n\nHot thoughts: within any cluster of automatic thoughts, there is usually one that carries the most emotional charge — the thought most responsible for the intensity of the feeling. This is sometimes called the hot thought. It is worth identifying specifically because it is the most productive target for restructuring. The hot thought is often the most catastrophic, the most self-referential, or the most connected to core belief. Finding it is the first step in working with it.\n\nThe critical self: a particular category of automatic thought that functions as an internal critic — a running commentary of self-evaluation, self-blame, and self-comparison. The critical self often speaks in the second person (you always get this wrong) or uses should, must, and never. It developed as an internalised voice — often from an early environment where criticism was frequent or approval was conditional. It can feel like honesty or self-awareness but is usually neither accurate nor helpful."], ["The hot cross bun — mapping your emotion right now", "The hot cross bun is a practical tool for mapping the four components of an emotional experience in the moment. It takes its name from its shape — four quadrants arranged like the sections of a hot cross bun.\n\nDraw a cross dividing a circle into four sections, or simply use the four headings below:\n\nThoughts — what is running through your mind right now? What are you telling yourself about what happened? What does this mean to you or about you? These can be words, sentences, images, or predictions.\n\nFeelings — what emotion are you experiencing? Name it in one word if you can. And at what intensity — mild, moderate, strong? Emotions are one word: anxious, ashamed, angry, sad, hollow, flat, panicked, helpless.\n\nBody — what physical sensations are present? Tightness, heaviness, heat, constriction, racing heart, shallow breath, the pit in the stomach, nausea, numbness, tension in the jaw or shoulders? Where exactly in your body?\n\nBehaviour — what are you doing, or what are you pulled to do? Withdraw, go quiet, over-explain, pursue, avoid, overwork, eat, drink, scroll, check?\n\nOnce you have all four filled in, look at how they connect. Which came first — the thought or the feeling? Is the behaviour making things better or worse? Is the body sensation telling you something the thought has not named yet?\n\nThe hot cross bun makes the loop visible. Once you can see all four components at once, you can choose where to intervene. You do not have to start with the thought. Sometimes the fastest entry point is the body — a breath, a movement, a grounding tool — which then makes the thought more accessible. Sometimes naming the behaviour that is maintaining the loop is the place to start.\n\nIn the context of Relatz: the first four steps of the app are essentially a guided hot cross bun. Body sensation (step 2), story/thought (step 3), core belief (step 4). The pattern identification at step 1 gives the context. You can use the hot cross bun independently of the full seven steps when you just need to get a quick read on what is happening.", "diagram"], ["The ABC model", "The ABC model (Ellis, 1955) maps the connection between events and emotional responses.\n\nA — Activating event: something happens. A comment is made, a message does not arrive, a situation occurs.\n\nB — Belief: the meaning automatically assigned to A. This is the critical step. The same event produces completely different responses in different people depending on the belief that mediates it.\n\nC — Consequence: the emotional and behavioural response — which follows from B, not from A.\n\nThe insight: we tend to experience C as caused directly by A. CBT interrupts this. Between A and C there is always a B — and B is where change is possible. The event is often not within our control. The belief is.\n\nIn practice: when you notice a strong emotional reaction, ask — what did I just tell myself about what happened? That is your B. Is it accurate? Is it the only possible interpretation?"], ["Six questions for restructuring a thought", "When a thought is identified that is driving distress, these six questions help examine it from different angles. Work through as many as feel relevant.\n\n1. What is the effect of believing this thought — and what would change if I did not?\nThis forces a pragmatic assessment: is the thought actually useful? If believing it makes everything worse without providing any accurate information, that is worth knowing.\n\n2. What is the evidence for this thought, and what is the evidence against it?\nThis is not about positive thinking — it is about accuracy. Treat the evidence for as a prosecution case and deliberately look for the defence. What does the evidence actually show?\n\n3. Is there an alternative explanation?\nAutomatic thoughts are assumptions, not facts. Generating a list of other possible explanations does not require believing any of them. It loosens the grip of the original assumption by making visible that it is one interpretation among several.\n\n4. What is the worst that could happen — and would I survive it? What is most likely?\nAnxious thinking fixates on worst cases and treats them as probable. Fleshing out the full range — worst, best, most realistic — recalibrates the assessment. And asking what you would actually do if the worst happened usually reveals more resilience than the anxiety suggests.\n\n5. What would I say to a close friend in this situation?\nThis question depersonalises. The advice we give others is often significantly more accurate and compassionate than the running commentary we direct at ourselves. If the standard you apply to yourself would not be applied to someone you care about, that gap is information.\n\n6. What can I actually do about this?\nThis redirects from rumination to agency. Brainstorm all options without filtering — including impractical ones. Then identify which are actually worth trying. Shifting from passive to active orientation reduces the emotional intensity of most problems."], ["Countering each distortion", "The cognitive distortions (see full list in the Cognitive Distortions button) each have a specific countering approach.\n\nAll-or-nothing thinking: Find the spectrum between the two extremes. What lies between success and failure, competent and incompetent? You are not looking for the positive pole — you are looking for the grey.\n\nOvergeneralisation: Is this single event actually evidence of a permanent pattern, or is it one incident? Find exceptions. Are there times when it was not true?\n\nMental filter: You are attending to one piece of information and filtering out the rest. What is being filtered out? What would the full picture look like?\n\nDiscounting the positive: When you dismiss good evidence, ask — would I dismiss this if it happened to someone else? Why does positive evidence not count?\n\nJumping to conclusions / mind reading: This is an assumption, not a fact. What are the other possible explanations? How confident can you actually be without evidence?\n\nFortune telling: What is the full range of outcomes from worst to best? How likely is each one? What is the most realistic?\n\nCatastrophising: If the worst actually happened, would you survive it? What would you do? How would it feel in a month, a year?\n\nShould statements: What is the rule behind the should? Where did it come from? What is the effect of applying it rigidly? What would a more flexible version look like?\n\nLabelling: What information does this label leave out? What else are you, or are they?\n\nPersonalisation: What other factors contributed to this? What is your actual percentage of responsibility — not zero, not one hundred?"], ["Opposite action", "Marsha Linehan, the developer of Dialectical Behaviour Therapy, described opposite action as a behavioural tool for modulating intense emotion in the moment. The principle: every emotion carries an action urge. Acting on that urge intensifies the emotion. Acting opposite to it reduces it.\n\nCommon emotion-urge pairings:\nAnger → urge to attack or confront. Opposite: withdraw briefly, do something kind, release physical tension.\nFear/anxiety → urge to avoid or escape. Opposite: approach the feared thing deliberately and stay with it.\nSadness → urge to withdraw and isolate. Opposite: engage with people, move the body, do something even slightly pleasurable.\nDisgust → urge to push away. Opposite: approach and sit with it until the intensity reduces.\n\nOpposite action works best when the emotion is not actually providing useful information — when the fear is not about real danger, when the anger is disproportionate, when the sadness is being fed by avoidance rather than genuine loss.\n\nIt requires full commitment for at least several minutes. Half-hearted opposite action does not work. The awkwardness and artificiality at the start is part of the mechanism — you are acting against the biological pull of the emotion, and that takes deliberate effort."], ["Behavioural activation", "Behavioural activation is the CBT treatment for depression and shutdown states. It reverses the logic that most people apply: I will do things when I feel better. The evidence consistently shows the direction runs the other way — doing things produces the feeling better, not the other way around.\n\nDepression reduces activity. Reduced activity deepens depression. Behavioural activation deliberately breaks this cycle by scheduling rewarding activity before motivation arrives.\n\nThe activities do not need to feel enjoyable in advance. They need to happen. Two categories are useful: pleasure activities (things that provide enjoyment or sensory satisfaction) and mastery activities (things that produce a sense of competence or time well spent). Both work. Neither requires feeling ready first.\n\nThis tool is directly relevant to the freeze and withdrawal patterns in this app — The Invisible One, Shut Out, Freeze types, Going Home collapse — where the pull is toward disappearing rather than engaging, and where the nervous system has moved into hypoarousal.\n\nThe mechanism: activity provides new evidence against the belief that nothing helps. It also activates the body, which begins to shift the stuck-off nervous system state from the outside in."], ["Exposure — approaching rather than avoiding", "Avoidance maintains anxiety. This is one of the most robustly established findings in clinical psychology. When we avoid something we are afraid of, the fear does not reduce — it grows. The avoidance prevents us from gathering evidence that the feared outcome is either unlikely or survivable, so the mind continues to generate increasingly frightening stories about it.\n\nExposure works by systematically approaching what has been avoided, in graduated steps from least to most challenging, and staying with each step long enough for the anxiety to naturally reduce. The reduction always comes — anxiety cannot sustain its peak indefinitely. When the person stays with the feared situation and the catastrophe does not occur, the mind begins to update.\n\nExposure is relevant across many of the patterns in this app. The person with The Performance avoids situations where they might be seen as inadequate. The person with Walking on Eggshells avoids directness. The One-Way Friend avoids asking for reciprocity. The avoidance in each case maintains the belief that the feared outcome would be unmanageable. Graduated approach, with support, provides the evidence that it would not.\n\nA note: exposure works through the body as well as through evidence. Staying with the feared situation until the body settles — the heart rate slows, the tension releases — teaches the nervous system directly that the situation is survivable."], ["References", "Beck, A.T. (1979). Cognitive therapy of depression. Guilford Press. | Beck, J.S. (2011). Cognitive behavior therapy, 2nd ed. Guilford Press. | Ellis, A. (1962). Reason and emotion in psychotherapy. Lyle Stuart. | Linehan, M.M. (2014). DBT skills training manual, 2nd ed. Guilford Press. | Seligman, M.E.P. (1991). Learned optimism. Knopf. | Burns, D.D. (1980). Feeling good. William Morrow. | Martell, C.R., Dimidjian, S. & Herman-Dunn, R. (2010). Behavioral activation for depression. Guilford Press. | Leahy, R.L. (2018). Cognitive therapy techniques, 2nd ed. Guilford Press."]]
  }

  wot: {
    title: "Window of Tolerance",
    badge: "Window of Tolerance",
    bc: "bg-emerald-50 border-emerald-200",
    tc: "bg-emerald-100 text-emerald-700",
    body: "The window of tolerance is a concept developed by Daniel Siegel and elaborated by Pat Ogden. It describes the zone of nervous system arousal within which a person can function effectively — able to think and feel simultaneously, process experience, relate to others, and learn. Outside this window in either direction these capacities are impaired.",
    secs: [
      ["Inside the window", "Within the window of tolerance the ventral vagal system is sufficiently online that the person can be present. Thoughts and feelings are accessible simultaneously. They can be moved without being overwhelmed. This is the state in which therapy, genuine connection, and meaningful learning take place.\n\nThe width of the window varies enormously between individuals and is shaped by developmental history. A person who grew up in a safe, attuned environment with a caregiver who helped regulate them during distress typically has a wide window. A person who experienced chronic early dysregulation, trauma, or inadequate co-regulation typically has a narrow window — relatively small amounts of activation tip them into hyperarousal or hypoarousal.\n\nThe window can also narrow temporarily under stress, sleep deprivation, illness, or relational conflict — and can widen through good sleep, movement, co-regulation with a safe person, and therapeutic work."],
      ["Hyperarousal — above the window", "Above the window the sympathetic nervous system has taken over. The person is flooded — overwhelmed with activation they cannot think through. Symptoms include panic, rage, racing thoughts, intrusive memories, impulsivity, and the inability to process incoming information accurately.\n\nIn this state cognitive approaches (talking, reasoning, challenging thoughts) are largely ineffective because the thinking brain is offline. The priority is regulation first — returning to the window — before any processing can occur. This is why body-first tools (breathing, grounding, movement) are more useful than cognitive tools when someone is highly activated.\n\nThe trauma trigger typically produces hyperarousal — a rapid escalation that bypasses the cortex. The person is not overreacting. They are reacting to what the nervous system has registered, which may be a present cue that matches a past threat."],
      ["Hypoarousal — below the window", "Below the window the dorsal vagal system has taken over. The person is shut down — dissociated, numb, flat, unable to feel or engage. Symptoms include emotional emptiness, cognitive fog, physical heaviness, disconnection from body and surroundings, and the sense of watching events from a distance.\n\nHypoarousal is less immediately visible than hyperarousal and is sometimes mistaken for calm. The person may appear quiet and composed while inwardly experiencing profound disconnection.\n\nReturning from hypoarousal requires gentle activation — small movements, orienting to the environment, noticing sensory details, slow rhythmic motion. The person needs to be brought up toward the window rather than calmed down toward it."],
      ["Widening the window", "A primary goal of trauma-informed therapy is to widen the window of tolerance — to increase the range of activation the person can experience without losing function. This happens gradually through repeated experiences of activation within the therapeutic relationship being met with attunement rather than overwhelm, returning to regulation from mild dysregulation, and slowly carefully processing traumatic material in titrated doses.\n\nSiegel calls this titration — small enough pieces of the difficult material that the person can stay within the window while processing rather than being flooded. Each successful return from activation trains the nervous system that it can go further and come back. The window gradually expands.\n\nThe nervous system learns through experience, not through insight. Understanding the window conceptually is useful. Having repeated experiences of regulated activation is what actually changes the width."],
      ["References", "Siegel, D.J. (1999). The developing mind. Guilford Press. | Ogden, P., Minton, K. and Pain, C. (2006). Trauma and the body. Norton. | Levine, P.A. (1997). Waking the tiger. North Atlantic Books."]
    ]
  },
  tre: {
    title: "TRE — Trauma and Tension Release Exercises",
    badge: "TRE",
    bc: "bg-green-50 border-green-200",
    tc: "bg-green-100 text-green-700",
    body: "TRE was developed by David Berceli. The core insight is that the body has a natural built-in mechanism for discharging survival activation — a spontaneous tremoring response — and that in modern cultures this has largely been suppressed. We have learned to hold still and control physical expression. In doing so we interrupt a process the nervous system was designed to perform automatically.",
    secs: [
      ["The tremor mechanism", "When animals survive a threat they shake. The deer chased by a predator, once safe, trembles through its whole body before returning to normal. The tremoring is not distress — it is discharge of the adrenalin and muscular tension mobilised for survival. After the shaking the animal carries no residue.\n\nHumans have the same mechanism. Infants tremble when frightened. Adults shiver after near-misses. These are the same process — the body attempting to complete the discharge cycle.\n\nThe psoas muscle is central to TRE. It runs from the lumbar spine through the pelvis to the femur and is sometimes called the fight-or-flight muscle because it is the first to contract when threat is detected. In chronic stress and unresolved trauma it remains chronically contracted. TRE specifically targets this muscle to initiate tremoring."],
      ["What happens in a session", "TRE uses a series of simple physical exercises — stretches and positions that progressively fatigue the leg muscles — to create conditions for tremoring to begin spontaneously. The tremors typically start in the legs and may spread through the pelvis and spine. They are involuntary — the person does not make them happen, they allow them to happen.\n\nThis distinction matters. TRE does not require skill or understanding. The body knows how to do it. The work is in learning not to suppress it.\n\nMany people initially find the involuntary nature unsettling. With repeated practice the tremoring becomes familiar and is experienced as deep release."],
      ["What it helps with", "TRE has been used with veterans, survivors of violence and natural disasters, and people with chronic stress, anxiety, PTSD, and chronic physical tension. Physiological effects include reduction in cortisol, decreased chronic muscle tension, improved sleep, reduced anxiety, and gradual widening of the window of tolerance as the nervous system repeatedly completes activation cycles.\n\nTRE is not a replacement for trauma therapy. It addresses the physiological residue stored in muscles and fascia. Combined with IFS, SE, or relational therapy it can significantly accelerate the physiological component of healing."],
      ["Cautions", "TRE is generally safe for self-directed practice once the basic sequence has been learned from a certified TRE provider. The main caution is titration — not doing too much too soon. If tremoring becomes very intense the person can stop it at any time by straightening the legs and resting.\n\nNot recommended without provider support for people in acute psychiatric crisis or active dissociation."],
      ["References", "Berceli, D. (2008). The revolutionary trauma release process. Namaste Publishing. | Levine, P.A. (1997). Waking the tiger. North Atlantic Books. | van der Kolk, B. (2014). The body keeps the score. Viking."]
    ]
  },
  cft: {
    title: "Compassion Focused Therapy",
    badge: "CFT",
    bc: "bg-rose-50 border-rose-200",
    tc: "bg-rose-100 text-rose-700",
    body: "CFT was developed by Paul Gilbert and draws on evolutionary psychology, neuroscience, and Buddhist philosophy. Its central insight is that the brain contains three distinct emotion regulation systems — threat, drive, and soothing — and that many psychological difficulties, particularly those rooted in shame and self-criticism, involve a chronically overactive threat system and an underdeveloped soothing system.",
    secs: [
      ["The three emotion regulation systems", "Paul Gilbert describes three distinct systems the brain uses to regulate emotion and motivation.\n\nThe threat system evolved first and is the most powerful. It detects danger and mobilises fight-flight-freeze. When active it narrows attention to potential threats, generates anxiety, anger, and disgust, and biases thinking toward the negative. In people with developmental trauma the threat system has been calibrated to a high-threat environment and remains chronically activated in ordinary situations.\n\nThe drive system motivates goal-seeking, achievement, and acquisition. Drive is not inherently problematic — but when it runs in the service of the threat system (achieving to avoid shame, working to prevent abandonment) it never produces satisfaction or rest.\n\nThe soothing system evolved from mammalian attachment — the calming that occurs in the presence of a safe other. It produces feelings of contentment, safeness, and affiliation. In people with developmental trauma the soothing system is often significantly underdeveloped. Safe connection was not reliably available so the neural pathway for self-soothing was never strongly established. CFT works directly on developing the soothing system — building the capacity for self-compassion not as a concept but as a felt physiological state."],
      ["Shame and the self-critical mind", "Paul Gilbert identifies shame as a threat-system emotion that functions differently from guilt. Guilt is about what I did. Shame is about what I am. When something goes wrong, guilt says I behaved badly and I can repair this. Shame says I am bad and this confirms what I have always feared about myself.\n\nThe self-critical voice that accompanies shame is not motivating — despite what many people believe about their own self-criticism. Research consistently shows that self-criticism increases anxiety, depression, and avoidance. It is a threat-system response to perceived inadequacy, not a genuine attempt at self-improvement.\n\nThe compassionate alternative is not permissiveness or lowered standards. It is the quality of response a genuinely wise and caring person would offer — one that acknowledges difficulty honestly, holds it with warmth rather than contempt, and supports motivation to change from care rather than fear."],
      ["Compassionate mind training", "Gilbert describes what he calls the compassionate self — not a fixed personality trait but a capacity that can be developed and strengthened. Compassionate mind training involves developing awareness of the threat system and the self-critical voice without being fused with it; practising the physiological state associated with the soothing system (slow breathing, softened posture, warm expression); and gradually learning to respond to difficulty with the care one would extend to someone else in the same situation.\n\nKristin Neff parallel work on self-compassion identifies three components: self-kindness (treating oneself as one would treat a good friend), common humanity (recognising that suffering and imperfection are part of shared human experience rather than signs of individual failure), and mindfulness (holding painful thoughts and feelings in balanced awareness). Neff research shows that self-compassion is a significantly stronger predictor of psychological wellbeing than self-esteem."],
      ["References", "Gilbert, P. (2009). The compassionate mind. Constable. | Gilbert, P. (2010). Compassion focused therapy. Routledge. | Neff, K. (2011). Self-compassion. William Morrow."]
    ]
  },
  act: {
    title: "Acceptance and Commitment Therapy",
    badge: "ACT",
    bc: "bg-teal-50 border-teal-200",
    tc: "bg-teal-100 text-teal-700",
    body: "ACT was developed by Steven Hayes and sits within the third wave of cognitive behavioural therapies. Rather than targeting the content of thoughts and feelings, ACT focuses on the relationship with inner experience. The goal is psychological flexibility — the ability to be fully present, open to experience, and to act in accordance with chosen values even when difficult thoughts and feelings are present.",
    secs: [
      ["The six core processes", "Steven Hayes describes six interconnected processes that together build psychological flexibility.\n\nCognitive defusion: learning to see thoughts as thoughts rather than facts. I am having the thought that I am worthless is a fundamentally different relationship to that thought than believing it as fact. Defusion does not require believing the thought is false — it creates distance from the automatic authority the mind grants its own productions.\n\nAcceptance: making room for difficult thoughts, feelings, and sensations rather than struggling to eliminate them. Experiential avoidance is a primary driver of psychological suffering. What we resist persists. Acceptance is not resignation. It is the willingness to have an experience without making it the organising principle of behaviour.\n\nPresent moment awareness: flexible attention to the here and now.\n\nValues: what matters most, at the level of chosen direction rather than specific goals. Values are not rules or obligations — they are ongoing directions. Goals are achieved and finished. Values are never completed, only lived toward.\n\nCommitted action: building patterns of behaviour consistent with values even in the presence of difficult thoughts and feelings.\n\nThe observing self: the perspective from which all experience is noticed — the I that notices thoughts, feelings, sensations, and memories without being defined by any of them. Connecting with the observing self provides stable ground from which the other processes can operate."],
      ["Experiential avoidance and the relational patterns", "Most patterns in this app involve experiential avoidance. The person in The Grey Zone avoids the vulnerability of asking directly. The person in Crossing My Line avoids the discomfort of saying no. The Invisible One avoids the anxiety of being seen. The Over-Responsible avoids the guilt of not doing enough.\n\nIn each case the avoidance temporarily reduces the unpleasant feeling — but maintains and strengthens the pattern. The ACT question is not how do I feel better about this but what would I do here if I were acting from my values rather than from the avoidance of discomfort."],
      ["Defusion techniques", "Russ Harris, whose book The Happiness Trap brought ACT to a wider audience, describes a short repertoire of defusion practices.\n\nNaming: I notice I am having the thought that... Adds the observer layer between self and content.\n\nThe mind as a storyteller: recognising that the mind generates a continuous narrative — much of it threat-detection — and that the narrative is not the same as reality.\n\nLeaves on a stream: imagining thoughts as leaves floating past on a stream. No need to stop them, follow them, or push them away.\n\nThank you mind: when the inner critic speaks, a brief internal acknowledgement — thanks for that, mind — rather than argument or compliance. This is not dismissal. It is non-fusion."],
      ["References", "Hayes, S.C., Strosahl, K.D. and Wilson, K.G. (2011). Acceptance and commitment therapy, 2nd ed. Guilford Press. | Harris, R. (2008). The happiness trap. Exisle Publishing. | Hayes, S.C. and Smith, S. (2005). Get out of your mind and into your life. New Harbinger."]
    ]
  },
  eft: {
    title: "Emotionally Focused Therapy",
    badge: "EFT",
    bc: "bg-pink-50 border-pink-200",
    tc: "bg-pink-100 text-pink-700",
    body: "EFT was developed by Sue Johnson and Les Greenberg in the 1980s, drawing on attachment theory as a map for adult intimate relationships. It is one of the most empirically supported approaches for couples therapy. The central premise is that relationship distress is fundamentally an attachment disruption — and that surface behaviours (criticism, withdrawal, conflict) are secondary to the underlying attachment fears driving them.",
    secs: [
      ["The EFT cycle", "Sue Johnson describes relationship conflict as a dance — a repeating pattern of interactions that takes on a life of its own beyond the intentions of either partner.\n\nThe most common cycle is pursue-withdraw. One partner, experiencing disconnection as threat, moves toward the other with criticism, demands, or emotional intensity. The other, experiencing this pursuit as overwhelming or unsafe, withdraws — becoming quiet, logical, or absent.\n\nThe pursuing partner experiences the withdrawal as confirmation of abandonment and pursues harder. The withdrawing partner experiences the pursuit as confirmation of inadequacy and withdraws further. Both are responding to attachment fear. Neither is the problem. The cycle is the problem.\n\nEFT works by helping partners step outside the cycle and access the primary attachment emotions underneath the surface behaviour — the fear, the longing, the grief — that are driving the pattern but are rarely spoken directly."],
      ["Primary and secondary emotions", "A key EFT distinction is between secondary emotions — the ones most visible in conflict — and primary emotions — the attachment feelings underneath.\n\nThe person who criticises and pursues typically shows anger and frustration. These are secondary. The primary emotion is usually fear of abandonment, grief about disconnection, or desperate longing for reassurance that they matter.\n\nThe person who withdraws typically shows nothing — neutrality, logic, absence. The primary emotion underneath is usually shame (I am failing, I am not enough), fear of overwhelming the other, or helplessness in the face of the other person distress.\n\nWhen partners can access and express primary emotions rather than secondary ones the interaction changes. It is much harder to remain withdrawn from someone who says I am terrified you will leave than from someone who says you never listen."],
      ["The three stages", "Stage one — de-escalation: mapping the cycle, identifying each partner position in it, and beginning to access the primary emotions underneath. Both partners develop a shared understanding of the cycle as the common enemy rather than each other.\n\nStage two — restructuring the bond: the more emotionally vulnerable work. Each partner is helped to access and express their deepest attachment needs directly to the other. The pursuer learns to express the fear beneath the anger. The withdrawer learns to emerge and become present. New bonding events occur — moments of genuine contact that begin to update the internal working model.\n\nStage three — consolidation: integrating the new interaction patterns and consolidating a new narrative about the relationship."],
      ["Connection to the patterns in this app", "Every pattern in this app involves some version of the pursue-withdraw dynamic. The Loop is the classic EFT cycle. The Grey Zone involves one partner fearing to pursue for clarity while the other withdraws from commitment. Walking on Eggshells involves withdrawal in the face of volatility that functions like pursuit.\n\nSue Johnson phrase for what people fundamentally need in attachment relationships: Are you there for me? Can I reach you? Will you respond to me? Will you come when I need you?\n\nThese are the fundamental questions of the attachment system. When the answer is reliably yes, the nervous system can rest. The difficult behaviours in relationships — the pursuit, the criticism, the withdrawal, the control — are not character flaws. They are attachment strategies."],
      ["References", "Johnson, S.M. (2004). The practice of emotionally focused couple therapy, 2nd ed. Routledge. | Johnson, S.M. (2008). Hold me tight. Little Brown. | Greenberg, L. and Johnson, S.M. (1988). Emotionally focused therapy for couples. Guilford Press."]
    ]
  },
  sleep: {
    title: "Sleep and Rest",
    badge: "Sleep",
    bc: "bg-slate-50 border-slate-200",
    tc: "bg-slate-100 text-slate-700",
    body: "Sleep is not optional. It is a core stabiliser for mood, attention, emotional regulation, pain sensitivity, and resilience. When sleep is disrupted, distressing thoughts feel louder, stickier, and harder to step back from. The nervous system, already under pressure, loses its primary restoration mechanism.",
    secs: [
      ["Why sleep matters", "Research on sustained sleep deprivation shows clear performance decline that is both dramatic and largely invisible to the person experiencing it.\n\nPeople underestimate their own impairment. Subjective sleepiness adapts: you stop feeling as tired as you are while the deficit accumulates.\n\nSleep loss also profoundly affects emotional regulation. The amygdala becomes 60% more reactive to negative stimuli under sleep deprivation. The prefrontal cortex — the part that modulates emotional responses — becomes less active. The result: increased irritability, reduced frustration tolerance, heightened reactivity to minor annoyances, and less capacity to reappraise negative situations. What feels like a character problem is often a sleep problem."],
      ["The tired yet wired paradox", "Hyperarousal is the core mechanism underlying chronic insomnia — a state of heightened alertness that keeps the body and mind on high alert even when exhausted.\n\nCognitive and emotional hyperarousal: racing thoughts, rumination, worry, the mind treating nighttime as problem-solving time, intrusive thoughts, catastrophic thinking, heightened anxiety about sleep itself.\n\nSomatic hyperarousal: racing heart, muscle tension especially in the neck, shoulders, and jaw, temperature dysregulation, night sweats, heightened sensitivity to sounds and lights, the feeling of being wired but tired.\n\nThe hyperarousal cycle: poor sleep creates more hyperarousal, which makes sleep harder, which creates more hyperarousal. The harder you try to sleep the more alert you become. Sleep requires letting go, not effort.\n\nReplace: I must sleep. With: I am practising rest.\n\nProtector parts often become active around sleep. The Worrier keeps you alert scanning for problems. The Perfectionist demands you sleep perfectly or you have failed. The Controller tries to force sleep and monitors constantly. The Critic blames you for not sleeping. These are not character flaws. They are protective strategies working too hard in the wrong context."],
      ["Sleep foundations", "The most powerful single intervention is a consistent wake time. Set one and keep it even after a poor night.\n\nMorning light: get outside soon after waking. Natural daylight anchors the body clock and reduces evening hyperarousal.\n\nBed association: go to bed only when sleepy. Use the bed for sleep only. If you are awake for more than 15 to 20 minutes get up, do something low-light and boring, return when sleepy. This retrains the association bed = sleep rather than bed = awake and worried.\n\nCaffeine: experiment with stopping caffeine early afternoon. It can disrupt sleep hours later even when tolerance is established.\n\nAlcohol: suppresses REM sleep, increases wakings in the second half of the night. It may help you fall asleep; it makes you sleep worse.\n\nDarkness: even small amounts of light disrupt sleep quality. Blackout curtains or an eye mask, and covering LED lights.\n\nMovement earlier in the day: stress builds energy in the body. Movement helps release it — discharging fight-or-flight activation that accumulates through the day. Yoga, Tai Chi, walking all support sleep."],
      ["The wind-down and the night toolkit", "Create a 30 to 60 minute buffer before sleep: lower light, quieter inputs, a predictable sequence.\n\nContainment before bed: write a short note titled for tomorrow — one line only, close the notebook, return to grounding. This stops the pattern of reinforcing wakefulness with extended thinking.\n\nScheduled worry time: set aside 10 to 20 minutes at a fixed earlier time in the day to write worries. At night, the response to looping thoughts becomes: I have a time for this tomorrow.\n\nIf thoughts keep looping: use a consistent phrase — not solving this now, this is a night thought, night thinking is not reliable thinking, tomorrow problem, WAIT — Why Am I Thinking about this now.\n\nIf you wake at night and panic rises: turn on a small dim light, name the date and location quietly, sit up, place feet on the floor, press down for ten seconds. Then choose one grounding method only: 5-4-3-2-1 senses, body contact points, gentle rocking, or bilateral sound — sound that alternates gently between left and right ear, mimicking natural rhythmic patterns and supporting nervous system regulation.\n\nThe night distress card: turn on dim light, feet on floor, 5-4-3-2-1, grounding object, calming audio, one boundary phrase — I am resting now. Contact support if safety is not secure."],
      ["CBT-I and working with thoughts at night", "CBT-I (Cognitive Behavioural Therapy for Insomnia) is recommended as first-line treatment for persistent insomnia ahead of medication.\n\nCommon sleep-specific distortions: all-or-nothing (if I don\'t sleep well the day is ruined), fortune telling (I know tonight will be terrible), catastrophising (this will ruin my life), emotional reasoning (I feel exhausted so I must have slept terribly), should statements (I must sleep in a particular way or I cannot function), labelling (I am an insomniac, I am broken).\n\nThe CBT mood log for sleep: write the trigger situation, the automatic thoughts and belief ratings, the emotions and intensity, identify the thinking errors, write a modified thought that is 100% true and that contradicts the distorted one. The modified thought must be genuinely true — you cannot challenge a thought that is actually accurate.\n\nDigital CBT-I works for many people and is accessible when face-to-face therapy is not available.\n\nRemember: night thinking is not reliable thinking. The amygdala is more reactive, the prefrontal cortex is less active, perspective is narrowed, catastrophic thinking dominates. If a thought feels urgent at 3am it will almost always feel more manageable in daylight."],
      ["References", "Walker, M. (2017). Why we sleep. Scribner. | Harvey, A.G. (2002). A cognitive model of insomnia. Behaviour Research and Therapy. | Spielman, A.J. et al. (1987). A behavioral perspective on insomnia. Psychiatric Clinics. | Porges, S.W. (2011). The polyvagal theory. Norton. | NICE guidelines on insomnia and CBT-I."]
    ]
  },
  support: {
    title: "Crisis Support and Resources",
    badge: "Get Support",
    bc: "bg-red-50 border-red-200",
    tc: "bg-red-100 text-red-700",
    body: "If you are in crisis or need support right now, these services are available. You do not need to be at the point of breakdown to reach out. All of the services below are free.",
    secs: [
      ["Immediate crisis — call or text now", "999: Emergency services. If you or someone else is in immediate danger.\n\nNHS 111: Urgent medical or mental health support that is not an immediate emergency. Available 24 hours. Has a dedicated mental health option.\n\nSamaritans: 116 123. Free, 24 hours a day, 365 days a year. No judgement. You do not have to be suicidal to call.\n\nSHOUT: Text SHOUT to 85258. Free, 24 hours. Text-based crisis support for when you cannot speak out loud.\n\nPAPYRUS (under 35): 0800 068 4141. Text: 88247."],
      ["Mental health support lines", "Mind: 0300 123 3393. Monday to Friday 9am to 6pm.\n\nCALM: 0800 58 58 58. 5pm to midnight every day.\n\nRethink Mental Illness: 0808 801 0525.\n\nAnxiety UK: 03444 775 774."],
      ["Finding local support", "Hub of Hope: hubofhope.co.uk — enter your postcode to find local mental health services.\n\nMind Local: mind.org.uk/information-support/local-minds\n\nNHS Urgent Mental Health: search NHS urgent mental health plus your area, or ask 111 to connect you."],
      ["If you are in distress right now", "Put the phone down and put your feet on the floor. Press them down. Feel the ground.\n\nName three things you can see in the room.\n\nBreath in for four counts, out for six. If breathing makes it worse, stop and return to feet and floor.\n\nText or call someone you trust.\n\nIf you are not safe, call 999 or NHS 111 now."],
      ["For supporters", "Stay calm — your regulated nervous system supports their regulation. Reduce stimulation: low light, quiet voice, minimal instructions. Offer one simple option at a time. If they are not safe, call 999."]
    ]
  },
  dissociation: {
    title: "Dissociation",
    badge: "Dissociation",
    bc: "bg-blue-50 border-blue-200",
    tc: "bg-blue-100 text-blue-700",
    body: "Dissociation is a disruption in the normally integrated functions of consciousness, memory, identity, emotion, perception, behaviour, and sense of self. It exists on a spectrum from the ordinary and universal — highway hypnosis, daydreaming, the temporary disconnection of a difficult conversation from felt reality — to the clinically significant: depersonalisation, derealisation, amnesia, and the structural divisions of complex dissociative disorders. It is not a rare or exotic phenomenon. It is one of the most common responses to overwhelming experience, and it is present, in varying degrees, in almost every presentation involving trauma.",
    secs: [
      ["Dissociation as a survival response", "Dissociation is not a malfunction. At its origin, it is an adaptive survival response — the nervous system’s most radical option when neither fight, flight, nor freeze is sufficient to manage overwhelming experience.\n\nWhen threat is inescapable and overwhelming — when there is nowhere to run, no possibility of fighting back, and no one to provide protection — the mind does something remarkable: it leaves. Not literally, but experientially. Awareness narrows or detaches. The sense of self separates from the body, the pain, the unbearable reality. Time becomes unreliable. The event is experienced, if at all, from a distance.\n\nThis detachment serves several functions. It reduces the subjective suffering during inescapable threat. It allows the person to continue functioning when direct engagement with reality would be impossible. It compartmentalises the overwhelming experience so that ordinary functioning can continue afterwards. The cost is paid later: the compartmentalised experience was not fully processed, and the material remains unintegrated — available to intrude as flashback, somatic activation, or emotional flooding, but not available as a coherent narrative located firmly in the past.\n\nThe polyvagal perspective: dissociation in its more profound forms corresponds to the dorsal vagal state — the collapse, shutdown, and immobilisation of the most ancient branch of the autonomic nervous system. The person who dissociates severely is in the same physiological state as an animal playing dead: the nervous system has withdrawn to its most fundamental conservation mode."],
      ["The dissociation spectrum", "The spectrum of dissociation runs from normative to severely disruptive, and most people’s experience falls somewhere along it without constituting a clinical disorder.\n\nNormative dissociation: highway hypnosis — arriving at a destination without conscious memory of the journey. Absorption in a book or film. Daydreaming. The transient detachment of being told bad news. These involve a temporary shift in attention and awareness that resolves without residue.\n\nDepersonalisation: the experience of being detached from one’s own mental processes, body, or sense of self. Feeling like an outside observer of one’s own thoughts, feelings, or actions. A sense of being unreal, robotic, or not fully present as a person. The experience is distressing precisely because the person knows it is occurring — they have not lost contact with reality, but they have lost contact with themselves.\n\nDerealisation: the experience of the external world as unreal, dreamlike, distant, or artificial. Objects seem different in size or shape. Other people seem unfamiliar. The surroundings feel like a film set. Again, the person knows this is distorted — the distress comes from the discrepancy between perception and knowledge.\n\nAmnesia: gaps in memory for personal information, significant life events, or specific periods of time. Can be discrete (a specific traumatic event that has no autobiographical memory) or more extensive. Traumatic amnesia is different from ordinary forgetting — it involves the active sequestration of material that was too overwhelming to integrate.\n\nStructural dissociation: Van der Hart, Nijenhuis, and Steele’s Theory of Structural Dissociation (2006) describes how the personality can be divided into distinct parts under chronic overwhelming experience. An Apparently Normal Part (ANP) manages daily functioning and avoids traumatic material. One or more Emotional Parts (EPs) hold the traumatic experience and the survival responses. Complex trauma presentations often involve multiple EPs with their own distinct nervous system states, emotional responses, and patterns of activation."],
      ["Dissociation and the relational patterns", "Dissociation is present across many of the relational patterns in this app, though it is rarely named directly.\n\nThe freeze response and dissociation: the freeze type described in this app is the most dissociative of the four survival types. The disconnection, the absence quality, the feeling of being present but not really there — these are dissociative features of the dorsal vagal shutdown state. The freeze type’s difficulty accessing emotions, the sense of life observed from a slight distance, the numbness — all reflect dissociative processes.\n\nThe fawn response and dissociation: the Adapted Child quality of the fawn response — the selflessness, the absence of authentic preference, the seamless attunement to what others need — involves a dissociation from one’s own inner experience. The fawning person is not consciously suppressing their needs. They have, to varying degrees, dissociated from them. The self is not being overridden; it is not being experienced.\n\nEmotional numbing in avoidant patterns: the dismissing, avoidant presentation — the person who is calm, self-sufficient, and apparently unaffected — often involves significant dissociation from emotional experience. The positive self-model is partly maintained by not feeling the distress that would challenge it. The disconnection is not deliberate.\n\nFlashbacks as dissociative intrusion: a flashback is, technically, a dissociative phenomenon — a fragment of implicit memory breaking through the barrier between past and present, activating as if it is happening now. The person is partially in the past and partially in the present simultaneously. Dual awareness — the capacity to be in contact with the traumatic material while remaining anchored in the present — is what allows the material to be processed without retraumatisation."],
      ["Grounding and working with dissociation", "Working with dissociation requires understanding the difference between two kinds of movement: toward integration (therapeutic) and toward flooding or retraumatisation (harmful).\n\nGrounding: techniques that restore contact with the present moment when dissociation has increased. Sensory grounding works by activating the present-moment sensory system — the five senses — which competes with the dissociative drift. Naming five things you can see. Feeling the contact of your feet on the floor. The temperature of water on your hands. A strong taste or smell. Physical movement. These are not distraction techniques — they are interventions that restore the person to their body and to the present moment when the dissociation has lifted them out of both.\n\nOrienting: a specific technique from Somatic Experiencing — slowly moving the head and eyes to scan the environment, as an animal does after a threat has passed. Orienting communicates to the nervous system that the threat is over and the environment is safe. It activates the social engagement system and begins to move the person out of freeze.\n\nThe window of tolerance: working with dissociative material requires staying within the window of tolerance — below the threshold of overwhelm that triggers either hyperarousal or dissociative shutdown. The dual awareness required for trauma processing (feeling it and knowing it is the past simultaneously) is only available within the window. Titrated, pendulating approaches to traumatic material — as in Somatic Experiencing and EMDR — are designed to keep the person within the window while gradually increasing contact with the traumatic material.\n\nThe therapeutic relationship: for people with significant structural dissociation, the therapeutic relationship itself is the primary instrument. The consistent, attuned, non-overwhelmed presence of the therapist provides the co-regulatory resource that allows the person to gradually increase contact with dissociated material without the system collapsing into shutdown."],
