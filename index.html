ousal states."\n  }, {\n    name: "TIPP",\n    time: "5-10 mins",\n    desc: "A four-part DBT distress tolerance tool for high activation states. Temperature: run cold water over your wrists or splash your face — cold directly triggers the body\'s physiological brake on the stress response. Intense exercise: move vigorously for 1-2 minutes — throw something soft, do jumping jacks, run on the spot — to burn through the activated energy rather than suppressing it. Paced breathing: slow the breath right down with a longer exhale than inhale. Progressive muscle relaxation: tense each muscle group for 5 seconds then fully release, working from feet to face. Use one or all four depending on intensity."\n  }, {\n    name: "Urge surfing",\n    time: "5-10 mins",\n    desc: "When the urge to pursue, check, text, or seek reassurance builds, treat it like a wave rather than an instruction. Notice where it lives in the body. Name its intensity on a scale of 1-10. Watch it rise without acting on it. Research on reward circuitry shows that urges peak and then reduce — they are not permanent states. The urge is not evidence that the action is needed. It is a conditioned response that can be observed rather than obeyed. Each time you ride it rather than act on it, its grip weakens slightly."\n  }],\n  "Disorganised": [{\n    name: "Extended exhale",\n    time: "5-10 cycles",\n    desc: "Breathe in for 4 counts and out for 8. The longer exhale is more important than the inhale. When the nervous system is oscillating between activation and shutdown, the extended exhale directly stimulates vagal tone and begins to interrupt the push-pull cycle."\n  }, {\n    name: "One foot on the floor",\n    time: "30 secs",\n    desc: "Press one or both feet firmly into the floor and notice the weight, pressure, and temperature. This proprioceptive signal tells the brainstem you are here, now, in your body, with ground beneath you. It does not resolve the confusion — it provides a stable point from which to notice it."\n  }, {\n    name: "Sensory anchoring",\n    time: "1-2 mins",\n    desc: "Name 5 things you can see, 4 you can touch, 3 you can hear, 2 you can smell, 1 you can taste. When the nervous system oscillates between activation and shutdown, sensory grounding interrupts the loop by bringing attention to what is actually present right now."\n  }, {\n    name: "Single focus",\n    time: "30-60 secs",\n    desc: "Pick one object in the room and look at it steadily. Describe it to yourself in detail — colour, texture, shape, size. Narrowing attention to one concrete external thing interrupts the oscillating internal state without suppressing it."\n  }, {\n    name: "Butterfly tapping",\n    time: "2-3 mins",\n    desc: "Cross your arms over your chest and gently and alternately tap your left shoulder with your right hand, then your right shoulder with your left hand. Slow, rhythmic, alternating. This bilateral stimulation — activating one hemisphere then the other — helps settle the oscillation between activated and shutdown states. It works at the neurological level rather than through thought. It can be done discreetly on your knees or a table if you are in a shared space."\n  }],\n  "Uncertainty": [{\n    name: "Belly breathing",\n    time: "5-7 cycles",\n    desc: "Breathe in for 4 counts so the belly rises. Hold 2. Breathe out for 4-6 counts. Anxious overthinking is accompanied by chest breathing that perpetuates the threat state. Moving the breath into the belly disrupts this feedback loop."\n  }, {\n    name: "Label the thought",\n    time: "Immediately",\n    desc: "Say or write: I notice I am thinking... or I notice I am trying to work out... Naming the loop is not the same as being in the loop. This small act of observation activates the prefrontal cortex and creates a sliver of distance between you and the rumination."\n  }, {\n    name: "Sensory anchoring",\n    time: "1-2 mins",\n    desc: "Name 5 things you can see, 4 you can touch, 3 you can hear, 2 you can smell, 1 you can taste. Uncertainty loops live in the future. Sensory input exists only in the present. This is one of the most reliable interruptions available."\n  }, {\n    name: "Externalise and close",\n    time: "5 mins",\n    desc: "Write down what you are trying to work out — the question, the loop, the uncertainty. Then close the page. You are not solving it. You are placing it somewhere outside your body so the nervous system can stop holding it internally. This can interrupt compulsive internal processing."\n  }, {\n    name: "Pattern interrupt",\n    time: "Immediately",\n    desc: "When you become aware of going down the rumination loop, interrupt it with a sudden physical action before it takes hold. Stand up. Clap your hands once. Say out loud: not now. Shake your hands out. The interruption does not need to make sense — it works by breaking the neural groove of the loop at the moment of entry rather than trying to argue your way out of it once you are already in it. Do not try to stop ruminating. Interrupt the pattern at the very beginning."\n  }, {\n    name: "STOP",\n    time: "1-2 mins",\n    desc: "A four-step mindfulness pause for the moment you notice the anxiety loop beginning. Stop what you are doing completely. Take one slow deliberate breath. Observe — what am I thinking? What am I feeling? What is happening in my body right now? Proceed with awareness of what you have just observed rather than on automatic. This is a brief, portable interruption that works because it inserts a moment of conscious observation between the trigger and the habitual response."\n  }],\n  "Imbalance": [{\n    name: "Depletion check",\n    time: "2-3 mins",\n    desc: "Place one hand on your chest and one on your belly. Ask yourself: what does my body actually need right now? Not what the situation needs. Not what the other person needs. What do I need? Sit with whatever arrives without immediately acting on it. Hearing your own need is the beginning of rebalancing."\n  }, {\n    name: "Wall push",\n    time: "3-5 reps",\n    desc: "Place your palms flat against a wall and push firmly for 5 counts, then release with a slow exhale. Repeat 3-5 times. When the nervous system has been depleted by over-giving or over-responsibility, the body has often gone flat. The wall push mobilises it — proprioceptive pressure restores a felt sense of your own strength and physical presence before any words are needed. It is particularly effective when you need to say no or hold a limit and the body is resisting. The body learns it first.\\n\\nVariation: Press both feet firmly into the floor for 5 counts in live situations where a wall is not available."\n  }, {\n    name: "Name one need",\n    time: "Immediately",\n    desc: "Ask: what is one thing I need right now that has nothing to do with this other person? It can be small — water, quiet, movement, fresh air, five minutes alone. Name it and then give it to yourself if you can. This is not selfishness. It is the beginning of balance."\n  }, {\n    name: "Gentle movement",\n    time: "2-5 mins",\n    desc: "Stand up and move in any way that feels natural — stretch, roll your shoulders, walk around. When the nervous system is depleted from over-giving the body often holds very still. Small movement discharges accumulated stress and helps restore a felt sense of being in your own body rather than theirs."\n  }],\n  "Responsibility": [{\n    name: "Separation breath",\n    time: "3-4 breaths",\n    desc: "Take a slow breath and as you exhale, consciously notice that your body is physically separate from theirs. You are in your own body. Their feelings are in their body. They are adjacent, not merged. Repeat 3-4 times, noticing the physical boundary between you."\n  }, {\n    name: "Wall push",\n    time: "3-5 reps",\n    desc: "Place your palms flat on a wall and push firmly for 5 counts, then release. Repeat 3-5 times. When you have been absorbing another person\'s emotional state or carrying their life alongside yours, the body needs a concrete signal that it has its own boundary and its own strength. The wall push provides this — the resistance is real, the pressure is yours, the release belongs to you. It is a physical practice of the limit before the verbal one.\\n\\nVariation: Press both feet firmly into the floor for 5 counts in situations where the wall push is not practical."\n  }, {\n    name: "Belly breathing",\n    time: "5 cycles",\n    desc: "Breathe in for 4 counts and out for 6. Breathe for yourself, not for the situation."\n  }, {\n    name: "Gentle movement",\n    time: "2-5 mins",\n    desc: "Walk, stretch, or shake out your hands. When you have absorbed another person\'s emotional state into your body, movement helps to discharge it. This is not avoidance — it is giving the nervous system a way to process what it has taken on so it can be set down."\n  }],\n  "Boundaries": [{\n    name: "Wall push",\n    time: "3-5 reps",\n    desc: "Place your palms flat against a wall or solid surface and push firmly for 5 counts — really push, feel the resistance — then release with a slow exhale. Do this 3-5 times. This works because proprioceptive pressure signals the brainstem that you have physical agency and a physical boundary. The nervous system does not distinguish at this level of processing between pushing a wall and holding a position — the body learns it first and then the words become available. Particularly effective in fawn and freeze states where the body has gone passive and compliant. Use it before a difficult conversation, after being dominated in one, or when you feel you have lost yourself in an interaction.\\n\\nVariation: If you are in a meeting or family situation where pushing a wall would be noticed, press both feet firmly and deliberately into the floor for 5 counts instead. Same mechanism — proprioceptive grounding, felt sense of your own boundary, restoration of agency through the body. Discreet and effective."\n  }, {\n    name: "Extended exhale",\n    time: "5-7 cycles",\n    desc: "Breathe in for 4 counts and out for 8 counts. In fawn and compliance states the breath is often shallow and quick. The long exhale activates the parasympathetic system and helps bring the body back from automatic accommodation to conscious choice."\n  }, {\n    name: "Foot grounding",\n    time: "30 secs",\n    desc: "Feel both feet on the floor and press them down deliberately. Notice your own weight and the ground beneath you. Your body has physical reality and physical limits. This is a starting point for the internal experience of a boundary."\n  }, {\n    name: "Single sensory focus",\n    time: "30-60 secs",\n    desc: "Pick one thing you can feel — the temperature of your hands, the texture of what you are wearing, the pressure of the chair. Fawn and freeze states involve disconnection from the body\'s signals. Any sensory contact begins to restore that connection."\n  }, {\n    name: "Power pose",\n    time: "1-2 mins",\n    desc: "Stand with your feet wide, hands on hips or arms open, chin slightly raised. Hold for 1-2 minutes and breathe slowly. Embodied cognition research shows that expansive postures genuinely shift the internal state — the body does not simply express confidence, it can generate it. When you have been in a fawn or compliance state the body has made itself small. Deliberately taking up space reverses this at a physiological level before any words are needed. Use it before a difficult conversation, in a bathroom before a hard meeting, or any time you need to feel your own size."\n  }],\n  "Withdrawal": [{\n    name: "Wall push",\n    time: "3-5 reps",\n    desc: "Place both palms flat on a wall or solid surface and push firmly for 5 counts — really push, feel the resistance — then release with a slow exhale. When the nervous system has moved into shutdown or withdrawal, proprioceptive pressure sends direct signals to the brainstem that you are present and have agency. This is more reliable than thinking your way out of a freeze state because it bypasses the thinking mind entirely and works at the level of the body. The felt sense of your own strength pushing against something solid can mobilise a system that words and reasoning cannot reach.\\n\\nVariation: Press both feet deliberately and firmly into the floor for 5 counts if a wall is not available. Particularly useful in live situations — a difficult visit, a tense meeting — where you need to restore a felt sense of presence and agency without anyone noticing."\n  }, {\n    name: "Full release",\n    time: "2-3 times",\n    desc: "Tighten your whole body firmly for 5-7 seconds — hands, arms, shoulders, jaw, legs. Then let go completely with a long exhale and allow everything to soften. This interrupts the shutdown state by going all the way in to tension first, then releasing it."\n  }, {\n    name: "Shake it out",\n    time: "30-60 secs",\n    desc: "Stand up and shake your hands, arms, and shoulders loosely. Movement discharges stored stress from the nervous system. The withdrawal state keeps the body very still — any movement, however small, begins to shift it."\n  }, {\n    name: "Voo sound",\n    time: "3-5 rounds",\n    desc: "Breathe in slowly and on the exhale make a low extended voo sound felt deep in the chest and belly. The vibration directly stimulates the vagus nerve through the vocal cords and chest wall. Three to five rounds is usually enough to feel a small shift toward presence."\n  }, {\n    name: "Progressive relaxation",\n    time: "5-10 mins",\n    desc: "Work through each muscle group from feet to face. Tense firmly for 5-7 seconds — feet, calves, thighs, abdomen, hands, arms, shoulders, face — then release completely with a slow exhale. Let each group fully soften before moving to the next. When the nervous system is in shutdown, the body holds a kind of frozen tension that can be released through this deliberate cycle of tension and release. The contrast between the tense state and the released state gives the nervous system something to work with that passive relaxation alone does not."\n  }]\n};\n\n// ── PATTERNS ─────────────────────────────────────────────────────────\nvar patterns = [{\n  name: "Too Much, Too Soon",\n  color: "border-red-300 bg-red-50",\n  dot: "bg-red-400",\n  ns: "Hyperactivation",\n  cue: "Fast intensity, big promises, quick closeness, early commitment",\n  body: ["Urgent and activated", "Chest tight with excitement", "Dopamine rush - hard to think clearly", "Slightly overwhelmed", "Restless energy, can\'t stop thinking about them", "Heart racing", "Pulled in before I\'ve decided", "Flooded - too much too fast"],\n  story: ["This is special - rare and real", "This could really be it", "I don\'t want to lose this", "The connection feels undeniable", "Fast closeness means something", "If I pull back I\'ll lose them", "I should match their energy"],\n  beliefs: [\'"I must secure this quickly"\', \'"If I slow down I will lose it"\', \'"This intensity means it is real"\', \'"I have to keep up or they will go"\', \'"Fast connection is proof of something real"\'],\n  schemas: ["Abandonment / Instability", "Emotional Deprivation", "Dependence / Incompetence"],\n  parts: ["Pleaser / Fawner", "Reassurance Seeker", "Dependent"],\n  att: "Anxious",\n  dev: "Inconsistent caregiving",\n  neg: [\'"I am not lovable unless I secure this"\', \'"If I slow down they will leave"\', \'"I cannot get what I want"\', \'"I am not enough as I am"\'],\n  pos: [\'"I am lovable at my own pace"\', \'"Real connection does not require urgency"\', \'"I can slow down and still be chosen"\'],\n  pause: "This is fast. I do not need to match the pace.",\n  regulate: "Slow breathing. Ground your feet. Delay responding by one hour.",\n  shift: "Reduce disclosure. Watch for consistency, not heat.",\n  boundary: "I prefer to take things slowly.",\n  reset: "Return focus to yourself. Track what they do, not what they say.",\n  rc: ["What are they actually doing - not saying?", "Is the pace sustainable or a pattern?", "Am I choosing this or just matching theirs?", "What would I want if I slowed down?"],\n  comms: [{\n    ctx: "Setting the pace",\n    say: "I am enjoying getting to know you and I want to take this at a pace that feels right for me."\n  }, {\n    ctx: "When you feel pressured",\n    say: "I need to slow things down a little. That is not me pulling back — it is me being honest."\n  }, {\n    ctx: "Naming what you need",\n    say: "I would like more time before we move this fast. I hope that works for you too."\n  }]\n}, {\n  name: "Too Deep, Too Soon",\n  color: "border-fuchsia-300 bg-fuchsia-50",\n  dot: "bg-fuchsia-400",\n  ns: "Disorganised",\n  cue: "Fast vulnerability, emotional flooding, intense early sharing",\n  body: ["Emotionally flooded", "Pulled in fast and overwhelmed", "Unsettled but deeply attracted", "Intensity in the chest", "Confusion and pull together", "Like falling - no ground beneath", "Rapidly attached before I know them", "An urgency I can\'t explain"],\n  story: ["This is real intimacy", "We are deeply connected already", "This depth means safety", "No one has understood me like this", "This intensity is what love feels like", "I have never felt this before"],\n  beliefs: [\'"Closeness equals intensity"\', \'"Real intimacy feels overwhelming"\', \'"Depth now means this is real"\', \'"If it is not intense it is not enough"\', \'"This is what I have been looking for"\'],\n  schemas: ["Enmeshment / Undeveloped Self", "Emotional Deprivation", "Abandonment / Instability"],\n  parts: ["Dependent", "Reassurance Seeker", "Care Taker"],\n  att: "Disorganised",\n  dev: "Deprivation + intensity bonding",\n  neg: [\'"Real love must feel overwhelming"\', \'"I am only lovable when deeply needed"\', \'"Calm connection means something is missing"\'],\n  pos: [\'"Quiet consistent connection is real"\', \'"Calm is not the absence of love"\', \'"I can be close and still be myself"\'],\n  pause: "This feels intense. I can slow it without losing it.",\n  regulate: "Stabilise first. Step back from the emotional current. Breathe before responding.",\n  shift: "Pace your disclosure. Real connection builds over time.",\n  boundary: "I prefer to build things gradually.",\n  reset: "Create space. Return to your own baseline before re-engaging.",\n  rc: ["Is this intimacy or intensity?", "Do I know who this person actually is yet?", "Am I bonding to the feeling or to them?", "What would I think in two weeks?"],\n  comms: [{\n    ctx: "Slowing the depth",\n    say: "I want to get to know you properly. Can we let this build at a more natural pace?"\n  }, {\n    ctx: "Naming the intensity",\n    say: "I find this connection meaningful and I also need a bit more time for it to feel solid rather than just intense."\n  }, {\n    ctx: "Grounding yourself",\n    say: "I need to come back to my own pace here. That is not about you — it is about what works for me."\n  }]\n}, {\n  name: "The Grey Zone",\n  color: "border-amber-300 bg-amber-50",\n  dot: "bg-amber-400",\n  ns: "Uncertainty",\n  cue: "Vague intentions, low effort, unclear direction, hard to read",\n  body: ["Anxious and restless", "Mind looping, can\'t settle", "Mentally exhausted from thinking", "Tight in the stomach", "Searching for clues", "Hyper-focused on every signal", "Sleep disturbed - replaying interactions", "Something feels unresolved, always"],\n  story: ["There must be something here", "If I figure it out it will settle", "Maybe they do mean it", "I just need more information", "The connection is real it is just complicated", "Maybe I am asking for too much"],\n  beliefs: [\'"I must work this out"\', \'"Clarity will come if I think harder"\', \'"Ambiguity means I am missing something"\', \'"I should not need things to be clear"\', \'"If I figure them out I will feel safe"\'],\n  schemas: ["Abandonment / Instability", "Emotional Deprivation", "Vulnerability to Harm"],\n  parts: ["Intellectualises", "Pessimistic", "Fixer"],\n  att: "Anxious",\n  dev: "Emotional unavailability",\n  neg: [\'"I cannot trust my judgment"\', \'"I am not good enough to deserve clarity"\', \'"If I was more lovable they would be clearer"\'],\n  pos: [\'"I can trust my perceptions"\', \'"I deserve clarity"\', \'"Ambiguity is information, not a problem to solve"\'],\n  pause: "This is unclear. I do not need to solve it.",\n  regulate: "Notice the loop. Put your hands on your lap. Shift attention to the body.",\n  shift: "Ask once clearly. Then observe behaviour - not possibility.",\n  boundary: "I am looking for clarity.",\n  reset: "Tolerate not knowing. Let reality show you who they are.",\n  rc: ["What are they actually doing consistently?", "How long have I been uncertain?", "Would I tolerate this in a friendship?", "What does the behaviour - not the potential - tell me?"],\n  comms: [{\n    ctx: "Asking for clarity",\n    say: "I need to understand where we are. Can we be direct with each other about that?"\n  }, {\n    ctx: "Naming the uncertainty",\n    say: "I have been uncertain for a while now and I am not able to keep investing without more clarity."\n  }, {\n    ctx: "Setting a limit",\n    say: "I am looking for something with a clear direction. I want to know if that is what this is."\n  }]\n}, {\n  name: "The Loop",\n  color: "border-violet-300 bg-violet-50",\n  dot: "bg-violet-400",\n  ns: "Disorganised",\n  cue: "Hot-cold, push-pull, mixed messages, criticism then closeness",\n  body: ["Confused and on edge", "Adrenaline spikes, can\'t relax", "Vigilant and braced for the next shift", "Emotionally up and down", "Exhausted from monitoring", "Protest anger rising then subsiding", "Physically tense, jaw tight", "Addicted to the relief when warmth returns"],\n  story: ["There is a reason for this", "If I get it right it will settle", "I can stabilise this", "They are not always like this", "I should try harder to understand", "The good t ent"],\n  att: "Anxious",\n  dev: "Emotional neglect",\n  neg: [\'"I am only valuable for what I produce"\', \'"I am not worth investing in beyond my usefulness"\', \'"My needs for reciprocity are unreasonable"\'],\n  pos: [\'"I deserve relationships that value me, not just what I offer"\', \'"Reciprocity is a reasonable expectation"\', \'"My worth is not what I provide"\'],\n  pause: "I am giving more than I am receiving. I can stop.",\n  regulate: "Feel where the depletion sits in your body. Let it tell you something true.",\n  shift: "Match energy. Give at the level you receive — nothing more.",\n  boundary: "I am happy to support when there is genuine mutuality in this.",\n  reset: "Relationships built entirely on your usefulness are not relationships — they are transactions.",\n  rc: ["If I stopped providing value would this person still invest in me?", "Am I confusing being needed with being valued?", "What would I think if I watched a friend accept this dynamic?", "What is keeping me in this arrangement?"],\n  comms: [{\n    ctx: "Naming the condition",\n    say: "I am happy to contribute when there is genuine exchange in both directions."\n  }, {\n    ctx: "Checking the relationship",\n    say: "I want to understand how this relationship works for both of us."\n  }, {\n    ctx: "Being direct",\n    say: "I need this to be reciprocal. I want to know if that is how you see it too."\n  }]\n}, {\n  name: "The Underminer",\n  color: "border-rose-300 bg-rose-50",\n  dot: "bg-rose-400",\n  ns: "Uncertainty",\n  cue: "Agreed to your face but works against you sideways, passive aggression, credit taken, subtle sabotage",\n  body: ["Something is off but hard to name", "Doubting my own perception of what happened", "A low vigilance that never quite settles", "Checking my work more than I should have to", "Replaying conversations looking for the gap", "Vague unease around this person", "Reluctance to share ideas in case they are taken", "Exhausted by the effort of not b naging the family atmosphere"\', \'"If I tell the truth something will break"\'],\n  schemas: ["Emotional Inhibition", "Subjugation", "Defectiveness / Shame"],\n  parts: ["Pleaser / Fawner", "Avoidant", "Intellectualises"],\n  att: "Fawn",\n  dev: "Intrusive caregiving",\n  neg: [\'"My real self is not acceptable"\', \'"Honesty is dangerous"\', \'"I must manage others to stay safe"\'],\n  pos: [\'"I can be honest without being responsible for everyone\\\'s reaction"\', \'"My experience is real even if unspoken"\', \'"The truth is available to me even if not to them"\'],\n  pause: "I am managing the atmosphere again. That is not my job.",\n  regulate: "Notice the constriction. Let yourself exhale. Your real thoughts are not dangerous.",\n  shift: "Name one true thing — first to yourself, then to one safe person outside the system.",\n  boundary: "I would rather be honest than keep the peace on this one.",\n  reset: "Systems that require you to disappear are not family — they are management contracts.",\n  rc: ["What would I say if there were no consequences?", "Who decided these rules and when?", "What does maintaining the silence cost me?", "Is there anyone in this family system I can be fully honest with?"],\n  comms: [{\n    ctx: "Naming your experience",\n    say: "I experience this differently from how it has been described."\n  }, {\n    ctx: "Choosing honesty",\n    say: "I would rather be honest here than manage the atmosphere."\n  }, {\n    ctx: "Speaking the truth",\n    say: "I am going to say something true. I hope we can sit with it."\n  }]\n}, {\n  name: "Carrying the Family",\n  color: "border-orange-300 bg-orange-50",\n  dot: "bg-orange-400",\n  ns: "Responsibility",\n  cue: "You became the emotional carer — the one who holds it together, mediates, supports everyone else",\n  body: ["The weight of it before I even pick up the phone", "Guilt if I am unavailable", "Other people\'s feelings arriving in my body as my own", "Never quite off duty", "Tiredne _POOL = [{\n  title: "Sunlight moving",\n  desc: "Sunlight moving through leaves or across a wall. The way it shifts. Staying with it for ten seconds — not explaining it, not photographing it, just noticing it."\n}, {\n  title: "A smell from somewhere safe",\n  desc: "A smell that belongs to a time or place that felt safe. Coffee first thing in the morning. The particular smell of old books. Rain on warm pavement. Let the body register where it lands."\n}, {\n  title: "An animal nearby",\n  desc: "A dog, a cat, a bird doing something utterly unbothered. Animals have no relationship with what should be happening. Their presence can briefly interrupt the loop."\n}, {\n  title: "The quality of afternoon light",\n  desc: "There is a particular quality to light in late afternoon — the angle, the warmth, the way it changes colour. This is a glimmer that arrives reliably, for free, every day that isn\'t overcast."\n}, {\n  title: "Water sounds",\n  desc: "Rain on a roof. A tap running. The sea. A river. Water sounds activate something ancient and pre-verbal in the nervous system. They signal: this environment has what is needed to survive."\n}, {\n  title: "A moment of genuine laughter",\n  desc: "Not performed laughter but genuine unexpected laughter — the kind that arrives before the thinking mind can weigh whether it is appropriate. Let it be real. Let it last its natural length."\n}, {\n  title: "Warm hands or feet",\n  desc: "The physical sensation of warmth — hands around a mug, feet under a blanket, sun on the back of the neck. Warmth signals safety to the body at a very basic level. Stay with the sensation."\n}, {\n  title: "Something that grew",\n  desc: "A plant that was not there before. A bud that has opened. Anything that grew without being told to. Growth is a sign that the conditions for life are present. Let that register."\n}, {\n  title: "A piece of music landing",\n  desc: "The specific moment when a piece of music lands somewhere in the body — not just heard but felt. The chest, the throat, behind the sternum. That place it goes. Stay with it rather than moving to the next track."\n}, {\n  title: "Eye contact that landed as kind",\n  desc: "A moment of eye contact with a stranger, a colleague, an animal that registered as warm rather than neutral or threatening. The nervous system notices this. Most people pass over it. Don\'t."\n}, {\n  title: "Something done well",\n  desc: "Something small completed — a cup of tea made exactly right, a sentence written that said the thing, a difficult phone call handled well. Not the performance of it, but the quiet fact of it."\n}, {\n  title: "The end of a hard thing",\n  desc: "The moment after something hard finishes. The car journey over, the difficult conversation done, the appointment complete. The specific release that arrives in the body. That is a glimmer. Let it be."\n}, {\n  title: "Sky",\n  desc: "Sky — particularly early morning or at dusk. The sense of scale. Something about the visual openness of sky activates the orienting response and briefly releases the narrow focus of threat detection."\n}, {\n  title: "A memory of ease",\n  desc: "A memory of a time when things felt genuinely easy, genuinely good — not a problem to be solved, just a moment that was. Let it be vivid for thirty seconds. The body does not fully distinguish past from present when the felt sense is real."\n}, {\n  title: "Bare feet on ground",\n  desc: "The soles of the feet in contact with earth, grass, sand, or even cold floor. The proprioceptive signal of ground beneath the body is among the most basic safety signals the nervous system receives."\n}, {\n  title: "Silence that is not tense",\n  desc: "Actual quiet — not the silence before something difficult, but the silence that is simply empty and fine. This is rarer than it sounds. When it occurs, let it be noticed."\n}, {\n  title: "Someone remembering something about you",\n  desc: "When someone remembers a small specific thing about you — that you prefer this, that you mentioned that, that you once said a particular thing. Being held in someone\'s mind is a genuine glimmer."\n}, {\n  title: "The smell of something cooking",\n  desc: "Something being cooked — bread, garlic, coffee, anything that signals that someone is making warmth and nourishment available. This activates an ancient association with being cared for."\n}, {\n  title: "Movement that feels good",\n  desc: "A stretch that releases something. A walk where the body finds its rhythm. The shoulders dropping. Physical ease — the body not held against itself for a moment. Stay with the ease rather than moving on."\n}, {\n  title: "Colour that arrives",\n  desc: "A colour that arrives as vivid — the particular orange of a flower, the green of a lit-up tree, the blue at the edge of the sky near the horizon. Colour perception is sharpest in the ventral vagal state. Noticing it is its own evidence."\n}, {\n  title: "A safe person\'s voice",\n  desc: "The specific sound of a voice that registers as safe — familiar, warm, not requiring anything from you right now. Even a voicemail. Even a memory of it. Let the body recognise it."\n}, {\n  title: "Something that has lasted",\n  desc: "An old building, an old tree, a family heirloom, a friendship that has continued through many changes. The sense of something that has endured. Continuity is a form of safety signal."\n}, {\n  title: "Your own breath, noticed",\n  desc: "The breath, just as it is right now — not corrected, not deepened, just observed. It has been happening without your involvement this entire time. That is worth one moment of attention."\n}, {\n  title: "A door closing on a difficult thing",\n  desc: "A literal door closing — on a room, a day, a conversation, a week. The physical act of a door closing carries genuine symbolic and somatic weight. Let the click of it land."\n}, {\n  title: "Being in the right place at the right time",\n  desc: "A small moment of synchrony — arriving just as something good begins, bumping into someone you were thinking of, the weather being exactly what was needed. Coincidence as a glimmer. It happens more often than it is noticed."\n}];\nfunction pickGlimmers() {\n  var shuffled = [].concat(GLIMMERS_POOL).sort(function () {\n    return Math.random() - 0.5;\n  });\n  return shuffled.slice(0, 6);\n}\n\n// ── QUICK GROUNDING POOL ─────────────────────────────────────────────\nvar GROUND_POOL = [{\n  name: "Feet on floor",\n  steps: "Press both feet firmly into the floor. Feel the weight of your body going down through your legs. Notice the texture and temperature beneath your feet. Stay here for 30 seconds. You are here, now, in this body, in this room."\n}, {\n  name: "4-7-8 breath",\n  steps: "Breathe in through your nose for 4 counts. Hold for 7. Breathe out slowly for 8. The long exhale directly activates the vagus nerve and puts the brake on sympathetic activation. Two rounds is enough to feel a shift."\n}, {\n  name: "Cold water",\n  steps: "Run cold water over your wrists and inner forearms for 30 seconds, or briefly splash your face. Cold temperature triggers a physiological brake on the stress response — the fastest available reset for high activation."\n}, {\n  name: "5-4-3-2-1",\n  steps: "Name 5 things you can see. 4 you can touch right now. 3 you can hear. 2 you can smell. 1 you can taste. Rumination lives in the future. Sensory input only exists in the present. This interrupts the loop."\n}, {\n  name: "Wall push",\n  steps: "Place both palms flat on a wall and push firmly for 5 counts — really push, feel the resistance. Release with a slow exhale. Repeat 3 times. Proprioceptive pressure signals the brainstem that you have physical agency and a boundary. The body learns it before the mind does."\n}, {\n  name: "Belly breath",\n  steps: "One hand on your chest, one on your belly. Breathe so only the belly hand moves. In for 4, out for 6. Keep the chest still. Three slow cycles. Moving the breath down out of the chest disrupts the feedback loop that keeps threat activation running."\n}, {\n  name: "Shake it out",\n  steps: "Stand up and shake your hands, arms and shoulders loosely for 30 seconds. Animals discharge stress through movement after a threat passes. The same mechanism works for us. Any movement, however small, begins to shift a frozen or activated state."\n}, {\n  name: "Name what you see",\n  steps: "Look around the room and slowly name 10 objects you can see — out loud if possible, silently if not. Say each one fully. The act of naming activates the prefrontal cortex and begins to bring the thinking brain back online."\n}, {\n  name: "Hand on chest",\n  steps: "Place one hand flat on your chest. Feel your own warmth and the movement of your breath. Say quietly: I am here. I am safe enough right now. The physical contact activates the same neural pathway as being touched by someone safe — because the skin cannot tell the difference."\n}, {\n  name: "Voo breath",\n  steps: "Breathe in slowly. On the exhale make a long low VOO sound felt deep in your chest and belly. The vibration directly stimulates the vagus nerve through the vocal cords and chest wall. Three rounds is usually enough to feel a small but real shift toward presence."\n}, {\n  name: "Box breathing",\n  steps: "Breathe in for 4. Hold for 4. Out for 4. Hold for 4. Repeat 4 times. Used by emergency services and military for rapid regulation. The equal-sided rhythm signals to the nervous system that the environment is predictable and safe enough."\n}, {\n  name: "Orient the room",\n  steps: "Slowly turn your head and look around the full space you are in. Let your eyes rest on each thing briefly before moving on. This activates the orienting response — the nervous system\'s signal that you have scanned for threat and the environment is safe. Do it slowly. Let the eyes soften."\n}, {\n  name: "Butterfly tap",\n  steps: "Cross your arms over your chest and alternately tap each shoulder — left,
