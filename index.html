      ["The physiology of self-compassion", "Paul Gilbert’s Compassion Focused Therapy provides a neurobiological account of why self-compassion works at the level of the nervous system.\n\nGilbert identifies three emotion regulation systems that parallel Porges’ polyvagal states. The threat system (fight/flight/freeze) is activated by self-criticism just as it is by external threat. The self-critical voice is registered by the amygdala as a source of danger. Chronic self-criticism therefore keeps the threat system chronically activated — producing the same physiological effects as sustained external threat: elevated cortisol, suppressed immune function, disrupted sleep, and narrowed cognitive capacity.\n\nThe soothing system — activated by warmth, safe connection, and care — is the system that self-compassion directly targets. When a person extends genuine warmth toward themselves, the same physiological response is engaged as when warmth is received from another: oxytocin release, reduction in cortisol, activation of the parasympathetic nervous system, and a shift toward the ventral vagal state in which genuine rest, healing, and integration are possible.\n\nThis is why the tone of the self-compassion practice matters as much as the content. A person can think the right self-compassionate words while holding them in a cold, analytical way that produces no physiological shift. The warmth has to be felt in the body. This is also why the physical posture of compassion — hand on heart, gentle breath, relaxed shoulders — is not optional decoration. It is part of activating the soothing system.\n\nThe child who was raised without warmth will often find self-compassion activating grief — the grief of the warmth that was not received. This is not a failure of the practice. It is the practice working: the soothing system coming online and making contact with the unmet need it was designed to meet."],
      ["Self-compassion practices", "Neff and Germer’s Mindful Self-Compassion (MSC) programme provides structured practices that develop self-compassion as a skill.\n\nThe self-compassion break: a three-step practice for moments of difficulty. First: This is a moment of suffering. (Mindfulness — acknowledging what is present.) Second: Suffering is a part of life. (Common humanity — I am not alone in this.) Third: May I be kind to myself. (Self-kindness — offering care.) The practice interrupts the automatic movement from difficulty to self-attack by inserting all three components between the trigger and the response.\n\nThe friend letter: writing a letter to yourself about a situation of difficulty or shame from the perspective of a wise, caring friend who knows you well and loves you regardless. This activates self-kindness by using the perspective the person already has access to when caring for others.\n\nCompassionate body posture: placing one hand on the heart, taking a breath, and allowing the body to soften. Activates the soothing system physiologically before any words are introduced.\n\nSoothing touch: self-touch as a compassion delivery mechanism. The pressure of a hand on the chest or face activates the same oxytocin response as touch from another. For people who received very little safe physical comfort in childhood, this can be a significant and unfamiliar experience.\n\nThe compassionate self: taking a few moments to embody the qualities of a deeply compassionate person — wisdom, warmth, strength, care — and responding to one’s own difficulty from that embodied position. Used in CFT and MSC. Works through the imagination’s capacity to activate physiological states."],
      ["Self-compassion and the relational patterns", "Self-compassion is both an antidote to the relational patterns and a practice that the patterns will resist.\n\nThe fawn response resists self-compassion because it treats the self as not warranting care. Self-compassion directly challenges the belief that only others deserve attention and warmth.\n\nThe perfectionist resists self-compassion because it threatens the standard-maintenance system. If I am kind to myself when I fail, what will make me try harder? Self-compassion research answers directly: you will try harder, and more sustainably, because failure no longer threatens the self.\n\nThe self-sacrificing pattern mistakes self-compassion for selfishness. Neff’s research distinguishes self-compassion from self-indulgence: self-compassion attends to genuine need and promotes long-term wellbeing; self-indulgence pursues short-term comfort at the expense of genuine need.\n\nShame directly opposes self-compassion. Shame says: you do not deserve warmth. Self-compassion says: the pain itself is the reason warmth is needed. This is why shame often intensifies briefly when self-compassion is first practised — the compassion makes contact with the unmet need and the grief of its absence surfaces before the relief arrives.\n\nFor people with complex trauma histories, self-compassion is often not immediately accessible and may need to be approached gradually and with support. Fierce self-compassion — the protective, boundaried aspect of self-compassion that says this is not acceptable, I will not allow this — is often more accessible initially than the tender, soothing aspect, and is a valid entry point."],
      ["Reference", "Neff, K. (2011). Self-compassion: The proven power of being kind to yourself. William Morrow. | Neff, K. & Germer, C. (2018). The mindful self-compassion workbook. Guilford Press. | Gilbert, P. (2009). The compassionate mind. Constable. | Gilbert, P. (2010). Compassion focused therapy. Routledge. | Neff, K.D. & Vonk, R. (2009). Self-compassion versus global self-esteem. Journal of Personality, 77(1)."]
    ]
  },
  shame: {
    title: "Shame",
    badge: "Shame",
    bc: "bg-rose-50 border-rose-200",
    tc: "bg-rose-100 text-rose-700",
    body: "Shame is the most interpersonal of all emotions. It arises in relationship — in the gaze of an actual or imagined other who finds us wanting — and it can only be healed in relationship. It is the emotion underneath almost every pattern in this app: the defectiveness schema, the survival split, the conditions of worth, the fawn response, the perfectionist manager, the critical voice. Understanding shame is not peripheral to relational work. It is the centre of it.",
    secs: [
      ["Shame versus guilt — a clinical distinction", "The distinction between shame and guilt is one of the most clinically important in psychology, identified most clearly by June Price Tangney and colleagues across decades of research.\n\nGuilt is about behaviour. I did something bad. The self remains intact. There is a specific action to regret, repair, or change. Guilt motivates reparative action. It is compatible with empathy, responsibility, and growth. Research consistently shows that the capacity for guilt is associated with better psychological outcomes, less aggression, and more prosocial behaviour.\n\nShame is about the self. I am bad. The specific behaviour is evidence of a fundamental flaw in the person. There is nothing to repair because the problem is not what was done — it is who I am. Shame produces a global collapse of self-esteem rather than a targeted response to a specific action.\n\nThe consequences diverge sharply: guilt motivates approach and repair; shame motivates withdrawal, concealment, and either collapse or rage. Shame-prone people are more likely to be depressed, anxious, and aggressive, and less likely to take responsibility for their actions — not because they care less, but because shame overwhelms the capacity for reparative action. You cannot repair what you are.\n\nThe confound: shame and guilt often co-occur and are difficult to distinguish from the inside. The marker is the direction of the response. If the impulse is toward the person harmed (I need to apologise, make this right, understand what I did), that is guilt. If the impulse is away from all people (I need to hide, disappear, make myself smaller), that is shame."],
      ["The shame response — four directions", "John Bradshaw, building on Silvan Tomkins\' affect theory, identified four primary responses to shame. These map closely onto the four-F trauma responses and are often developmentally related to them.\n\nWithdrawal: the impulse to disappear. Go quiet, become small, exit the interaction, avoid situations that might trigger shame. In the body: collapse, lowered head, averted gaze, contracted posture. This is the freeze end of the shame response.\n\nAvoidance: preventing shame from occurring by avoiding situations where it might be activated. Perfectionism (if I am never wrong I will never be shamed), overachievement, social avoidance, never revealing anything real about oneself.\n\nAttacking self: turning the shame inward as self-criticism, self-blame, and self-harm. The internal critic that runs the shame script. This keeps the shame private and reduces the (often unconscious) fear that if others saw the shameful thing they would reject or abandon. Self-attack is a regulatory strategy: I shame myself before anyone else can.\n\nAttacking others: externalising the shame as contempt, criticism, or rage toward others. Blaming, humiliating, or dismissing others deflects the intolerable feeling of being found wanting. Research on domestic violence consistently finds shame as a precipitant of male-perpetrated violence: the shame of perceived humiliation or inadequacy, converted into rage and externalised.\n\nAll four responses maintain the shame rather than resolving it. Withdrawal and avoidance prevent the corrective relational experience that would challenge the shame belief. Self-attack reinforces it. Other-attack destroys the relationships that might provide it."],
      ["Toxic shame and the self", "John Bradshaw distinguished between healthy shame (the appropriate acknowledgement of human limitation and fallibility) and toxic shame (the internalisation of the belief that the self is fundamentally defective, unworthy, or unlovable).\n\nHealthy shame is relational information: I have limits. I am not omnipotent. I need others. I make mistakes. This is accurate and keeps the person appropriately embedded in human community.\n\nToxic shame is a developmental injury. It develops when shame is used systematically as a tool of control in early caregiving — when the child is shamed for having needs, for expressing emotions, for making mistakes, for being themselves. The repeated experience of being shamed by a person the child depends on for survival produces an internalisation: I am the problem. There is something wrong with me at the core. This belief then becomes the lens through which all subsequent experience is filtered.\n\nToxic shame is characterised by secrecy (the shameful thing cannot be revealed), silence (the shame cannot be spoken), and judgement (both internal self-judgement and anticipated judgement from others). Brené Brown\u2019s qualitative research identifies these three elements as the defining features and identifies their opposites — disclosure, speech, and non-judgement — as the antidote.\n\nThe relationship to early schemas: toxic shame is the experiential content of several schemas, particularly Defectiveness/Shame, Emotional Deprivation, and Abandonment. The schema is the cognitive structure; toxic shame is the felt sense underneath it."],
      ["Shame and the body", "Shame is a full-body experience. Silvan Tomkins\' affect theory describes shame as involving the collapse of positive affect — when interest or excitement or enjoyment are suddenly interrupted by the sense of being seen negatively. The physiological response includes: lowering of the head, averted gaze, slumped posture, blushing, a sensation of heat in the face and chest, constriction in the throat, and in some cases nausea or dissociation.\n\nPaul Gilbert\u2019s neuroscience of shame: shame activates the threat-detection system (amygdala, HPA axis) just as physical threat does. The body cannot distinguish between being rejected by the group — which in evolutionary terms meant death — and physical danger. Social shame is processed as survival threat. This explains the intensity of shame responses that can seem disproportionate to the triggering event.\n\nThe autonomic signature of shame: shame in its milder forms is a sympathetic activation (heat, blushing, activation). In its more intense forms it produces a dorsal vagal collapse — the freeze and shutdown response — which matches the experience of wanting to disappear, becoming small and still, losing access to words. The person in intense shame is in a state of nervous system shutdown, not just cognitive distress.\n\nThe body memory of shame: because shame is encoded at the somatic and autonomic level, it can be triggered by body sensations alone — postures, tones of voice, the quality of someone\u2019s gaze — before any conscious cognitive process has occurred. The body remembers being shamed before the mind does."],
      ["Shame resilience — what heals it", "Brené Brown\u2019s research on shame resilience identifies the antidotes to shame as the direct inverse of its maintaining conditions.\n\nNaming it: bringing shame into language reduces its intensity. The shame that cannot be spoken grows. The shame that is named in the presence of a safe other begins to lose its grip. This is not catharsis — it is the corrective relational experience that the shame system was waiting for.\n\nEmpathy: shame cannot survive empathy. When the thing we expected would produce rejection produces instead a response of I understand, me too, that makes sense — the shame belief is directly contradicted at the relational level. This is the mechanism behind shame dissolving in safe therapeutic relationships.\n\nCritical awareness: understanding where the shame came from — who shamed us, under what conditions, with what authority — helps the person recognise that the shame belief was authored by someone else in conditions of power. This does not eliminate the feeling, but it changes its meaning.\n\nSelf-compassion: treating the shamed part of the self with the warmth one would extend to a close friend in the same position. Kristin Neff\u2019s research shows self-compassion is more effective than self-esteem at protecting against shame-driven psychological damage, partly because self-compassion does not require the positive self-evaluation that shame directly undermines.\n\nVulnerability: choosing to be seen, in appropriate contexts, without performing invulnerability. Shame thrives in the gap between who we are and who we perform ourselves to be. Each genuine disclosure that is received with care narrows that gap."],
      ["Shame in the relational patterns", "Shame is the emotional substrate of almost every relational pattern in this app.\n\nThe fawn response: fawning is shame management. If I keep everyone around me comfortable and pleased with me, I can avoid the shame of being found wanting. The self-erasure of the fawn response is a continuous preemptive shame avoidance strategy.\n\nThe perfectionist: perfectionism is shame-driven. The perfectionist does not pursue excellence because they enjoy it. They pursue it because failing to be perfect will confirm the core shame belief. If I am perfect, they cannot shame me.\n\nThe controlling part: controlling environments and other people reduces the risk of situations that might activate shame — being caught inadequate, unprepared, or wrong.\n\nIntellectualising: remaining in the cognitive, analytical mode protects against contact with the somatic shame experience. The person who can explain everything about their childhood cannot feel the shame of what happened in it.\n\nAttachment insecurity: anxious attachment often has shame at its core (I am not enough, I am too much, I will be abandoned when they see who I am). Avoidant attachment often defends against shame through the positive self-model (I do not need anyone — the needlessness protects against the shame of dependency).\n\nThe schemas: Defectiveness/Shame, Emotional Deprivation, Abandonment, Mistrust/Abuse — all have shame woven through them. The schema is the belief structure; shame is the affective content underneath."],
      ["Reference", "Brown, B. (2010). The gifts of imperfection. Haz\e1lden. | Brown, B. (2012). Daring greatly. Gotham Books. | Tangney, J.P. & Dearing, R.L. (2002). Shame and guilt. Guilford Press. | Gilbert, P. (2009). The compassionate mind. Constable. | Bradshaw, J. (1988). Healing the shame that binds you. Health Communications. | Neff, K. (2011). Self-compassion. William Morrow. | Tomkins, S.S. (1963). Affect imagery consciousness, Vol. 2. Springer."]
    ]
  },
  hormones: {
    title: "Stress Hormones and the Body",
    badge: "Hormones",
    bc: "bg-orange-50 border-orange-200",
    tc: "bg-orange-100 text-orange-700",
    body: "The nervous system does not operate alone. Every state shift — from calm to activated, from safe to threatened, from connected to isolated — is mediated by a cascade of hormones that travel through the bloodstream and change the physiology of almost every organ in the body. Understanding these chemical messengers explains why stress feels the way it does, why chronic stress is so damaging, why connection is physiologically healing, and why some emotional experiences feel impossible to think your way out of. The body is not the background to psychological experience. It is the substrate of it.",
    secs: [
      ["Adrenalin — the fast alarm", "Adrenalin (epinephrine) is released by the adrenal medulla within seconds of a perceived threat. It is the first responder of the stress system.\n\nWhat it does: heart rate increases, blood pressure rises, breathing becomes shallow and rapid, large muscles receive a surge of glucose and oxygen, digestion halts, the immune system mobilises briefly, pain sensitivity temporarily reduces. The body is prepared for physical action within moments of the perceived threat.\n\nAs adrenalin is metabolised — a process that takes 20 to 40 minutes — the body may feel shaky, dizzy, or suddenly cold. These are not signs of collapse. They are the chemical breaking down after use.\n\nPeople vary significantly in adrenalin production and receptor density. The same situation produces very different physical responses in different people — this is partly neurobiological, not a measure of sensitivity or weakness.\n\nRelevance: panic attacks are largely adrenalin events. The physical symptoms — racing heart, chest tightness, dizziness, nausea, the feeling of dying — are adrenalin doing exactly what it was designed to do. Understanding this does not stop the panic, but it changes its meaning. The body is not breaking down. It is activating."],
      ["Cortisol — the sustained response", "Cortisol is released by the adrenal cortex following the adrenalin surge, sustained by the HPA (hypothalamic-pituitary-adrenal) axis. Where adrenalin acts in seconds, cortisol acts over minutes to hours. It is designed for sustained threat — for the period after the immediate alarm when the body needs to keep functioning under pressure.\n\nWhat it does in the short term: maintains elevated blood pressure, keeps glucose available, sustains the immune response, enhances memory consolidation of threatening events (this is why traumatic memories can be so vivid), and keeps the body mobilised.\n\nWhat chronic elevation does: cortisol in excess, sustained over weeks and months, is systematically toxic. It suppresses the immune system (increasing susceptibility to illness), disrupts reproductive hormones (reducing testosterone and oestrogen), impairs sleep architecture, damages the hippocampus (reducing memory capacity and increasing anxiety), increases cardiovascular risk, promotes inflammation, and contributes to metabolic disruption. At its most extreme, excess cortisol destroys neurons.\n\nThe HPA axis: the hypothalamus detects threat and releases CRH. The pituitary responds by releasing ACTH. The adrenal cortex responds by releasing cortisol. Cortisol then feeds back to the hypothalamus and pituitary to signal enough — a self-regulating system that chronic stress dysregulates. In people with complex trauma histories the HPA axis often shows persistent dysregulation: either chronically elevated baseline cortisol, or, in some presentations, abnormally low cortisol as the system burns out.\n\nRelevance: the fatigue, brain fog, immune problems, digestive disruption, and mood instability that accompany chronic stress are largely cortisol effects. This is not weakness. It is physiology."],
      ["Oxytocin — the bonding hormone", "Oxytocin is released by the posterior pituitary in response to safe touch, eye contact, attuned conversation, breastfeeding, orgasm, and the experience of being genuinely understood. It is sometimes called the bonding hormone or the love hormone, though these labels undersell its clinical significance.\n\nWhat it does: reduces amygdala reactivity, lowers cortisol, widens the blood vessels to the heart (directly protective against the cardiovascular effects of stress), promotes trust and approach behaviour, supports co-regulation, and deepens social bonding.\n\nKelly McGonigal’s work draws on Keller et al. (2011), a study of over 30,000 people across eight years. People who believed stress was harmful and who lacked social connection had significantly higher mortality. People who experienced high stress but had strong social connection did not. Oxytocin appears to be part of the mechanism: connection literally counteracts the cardiovascular damage of stress.\n\nThe paradox: oxytocin also sharpens in-group/out-group distinctions — it promotes trust and generosity toward those perceived as safe while potentially increasing suspicion of those perceived as outsiders. It is not a simple prosocial hormone. It is a social bonding hormone whose effects depend on the relational context.\n\nRelevance: safe relationship is not an emotional luxury. It is a physiological necessity. The therapeutic relationship, secure attachment, and genuine social connection have measurable hormonal effects that directly repair stress damage. This is the biological foundation of co-regulation."],
      ["Dopamine — reward, seeking, and intermittent reinforcement", "Dopamine is released in the nucleus accumbens and ventral tegmental area in response to reward, novelty, and — crucially — the anticipation of reward. It is the seeking hormone, not the pleasure hormone. The pleasure of the reward itself involves opioid systems; dopamine drives the motivation to pursue it.\n\nWhat it does: creates motivation, focus, and the drive to approach and seek. It is essential for learning, goal-directed behaviour, and the registration of what the environment offers.\n\nIntermittent reinforcement: the most important clinical fact about dopamine is that unpredictable, variable rewards produce a stronger dopamine response than consistent rewards. A slot machine that pays occasionally and unpredictably is neurologically more compelling than one that pays every time. This is the mechanism behind the pull of relationships with inconsistent partners: when warmth is unpredictable, the dopamine system becomes hyperactivated in the seeking of it. The craving is not a character flaw. It is dopaminergic conditioning.\n\nThe trauma connection: for people with unresolved fantasy bonds, an inconsistent partner activates the same dopaminergic seeking that the inconsistent caregiver originally produced. The pattern feels like love because it neurologically resembles the original template for love. This is why people often find consistent, reliable affection less compelling than it should be.\n\nAddiction: all addictive substances and behaviours work primarily through the dopamine system. Understanding this helps people be compassionate toward addictive patterns rather than moralising them."],
      ["Serotonin — regulation, mood, and the gut", "Serotonin is produced primarily in the gut (approximately 90% of the body’s serotonin is produced in the gastrointestinal tract) and acts as a neurotransmitter in the brain. It is involved in mood regulation, sleep, appetite, social behaviour, and the modulation of pain.\n\nWhat low serotonin does: depressive mood, increased anxiety, disrupted sleep, irritability, reduced pain tolerance, and digestive problems. Most antidepressants (SSRIs) work by preventing the reuptake of serotonin, increasing its availability in synapses.\n\nThe gut-brain connection: the enteric nervous system (the gut’s own neural network) and the gut microbiome both influence serotonin production and mood. This is why gut problems and mood problems so frequently co-occur, and why diet, exercise, and gut health are not peripheral to mental health treatment.\n\nSocial status: serotonin is also sensitive to perceived social status. Studies in primates show that dominant animals have higher serotonin levels, and that serotonin increases when an animal is treated with respect and decreases with social defeat or humiliation. Chronic experiences of being treated as lesser, dismissed, or powerless have a measurable serotonergic cost.\n\nRelevance: the fatigue, anhedonia, sleep disruption, and digestive problems that accompany depression and chronic stress are partly serotonin effects. The gut-mood connection explains why gut health is part of mental health, and why exercising, eating well, and sleep are not optional add-ons."],
      ["Oxytocin, stress, and the courage hormone", "Kelly McGonigal synthesises research suggesting that oxytocin is released not only in bonding contexts but also during stress itself — acting as a signal that drives the person toward connection as a coping response. In this framing, the stress response has two possible channels: the fight-flight-freeze channel (adrenalin and cortisol dominant) and the tend-and-befriend channel (oxytocin co-present), which was identified by Shelley Taylor and colleagues and is more commonly observed in people socialised toward caregiving.\n\nThe tend-and-befriend response: under stress, some people move toward connection, caregiving, and seeking support. This is not weakness or avoidance. It is an adaptive stress response with a hormonal profile that includes more oxytocin and is associated with better cardiovascular outcomes than pure fight-flight responses.\n\nThe implication for relational patterns: fawn responses may have a hormonal dimension. The pull toward appeasement and caretaking under stress is partly oxytocin-driven. Understanding this helps depathologise the fawn response while still recognising its cost when it is the only available strategy."],
      ["Reference", "Sapolsky, R.M. (2004). Why zebras don’t get ulcers, 3rd ed. Holt. | McGonigal, K. (2015). The upside of stress. Avery. | Taylor, S.E. et al. (2000). Biobehavioral responses to stress in females: Tend-and-befriend. Psychological Review. | Uvnäs-Moberg, K. (2003). The oxytocin factor. Da Capo Press. | Keller, A. et al. (2011). Does the perception that stress affects health matter? Health Psychology, 31(5)."]
    ]
  },
  memory: {
    title: "Memory, Implicit and Explicit",
    badge: "Memory",
    bc: "bg-violet-50 border-violet-200",
    tc: "bg-violet-100 text-violet-700",
    body: "One of the most important and least understood facts about trauma is that it is a memory problem — but not in the way most people think. The problem is not that trauma survivors remember too much. It is that they remember in the wrong system. Understanding how memory is encoded, stored, and retrieved explains why trauma responses feel automatic and bodily rather than chosen and cognitive, why ‘just thinking differently’ does not resolve them, and why the same situation can feel simultaneously in the past and completely present.",
    secs: [
      ["Two memory systems — explicit and implicit", "The brain has two fundamentally different memory systems that operate largely independently.\n\nExplicit memory (declarative) is conscious, verbal, and narrative. It has two sub-types:\nEpisodic memory: autobiographical memories of specific events with a sense of time and place. ‘I was at the kitchen table when she said that.’\nSemantic memory: general knowledge and facts. The capital of France. How to spell your name.\n\nExplicit memory is primarily encoded and retrieved through the hippocampus. It requires attention and conscious processing to form. It is the memory system most familiar from everyday experience — remembering, forgetting, learning facts. It develops fully by around age 3-4, which is partly why we have no explicit memories from infancy.\n\nImplicit memory (non-declarative) is unconscious, body-based, and automatic. It includes:\nProcedural memory: how to ride a bike, how to type, the muscle memory of learned skills.\nEmotional memory: the felt sense that a situation is dangerous, familiar, or safe — often without knowing why.\nSomatic memory: body responses that are conditioned by experience — the tightening in the chest in a specific kind of interaction, the startle response, the freeze.\n\nImplicit memory does not require conscious attention to form and cannot be consciously retrieved as a memory. It simply activates — as a feeling, a body response, an impulse, a mood state. It has no timestamp. There is no felt sense of ‘remembering’. It simply is, in the present tense."],
      ["How trauma encodes — the amygdala’s role", "Under ordinary circumstances, experience is encoded across both systems simultaneously: the hippocampus encodes the narrative (who, what, when, where) while the amygdala encodes the emotional and somatic significance (how dangerous was this? how much should I react to this next time?). The two systems communicate and the result is a coherent memory with both narrative and emotional content.\n\nUnder extreme stress or threat, this process is disrupted. The amygdala — the threat-detection centre — becomes hyperactivated and floods the system with stress hormones. High levels of cortisol and norepinephrine during encoding impair hippocampal function (the hippocampus is exquisitely sensitive to cortisol). The result: the emotional and somatic aspects of the experience are encoded strongly, while the narrative aspects are encoded poorly or fragmentarily.\n\nThis is why traumatic memories are often: vivid in sensory detail (sight, smell, sound, physical sensation) but fragmented or incomplete as narrative; experienced as happening now rather than then; triggered by partial cues that match the sensory encoding (a tone of voice, a smell, a body position, a time of year) rather than by explicit conscious recall; accompanied by body responses (heart rate, breathing, muscle tension, shutdown) that were part of the original event.\n\nThe amygdala does not understand past tense. A sensory cue that matches the encoding of a threatening experience activates the same response regardless of when the original event occurred. The nervous system is not confused. It is doing exactly what it was designed to do."],
      ["Flashbacks — implicit memory intrusions", "A flashback is not a conscious decision to remember. It is an implicit memory being activated by a cue in the present environment. The person is not ‘stuck in the past’. Their nervous system is responding to a present-moment trigger that partially matches the encoding of a past threatening experience.\n\nFlashbacks can be: fully visual and immersive (classic flashback); primarily somatic (body states from the original event without accompanying imagery — racing heart, difficulty breathing, the freeze response, nausea); primarily emotional (a sudden intense fear, grief, shame, or rage that seems disconnected from the present situation); or relational (interpersonal dynamics that trigger a patterned response as if the original relationship were being repeated — what psychodynamic models call transference).\n\nPeter Levine and Bessel van der Kolk both describe the body as the primary site of traumatic memory storage. Van der Kolk’s framing — the body keeps the score — is a statement about implicit memory: the body holds what the explicit memory system could not fully encode.\n\nThis explains why talking about trauma is often insufficient as a complete treatment. Narrative work in explicit memory does not automatically update implicit memory. The somatic, emotional, and procedural encodings require approaches that work at the body level — EMDR, Somatic Experiencing, brainspotting — to update."],
      ["Memory reconsolidation — why memories can change", "For most of the twentieth century, it was believed that consolidated memories were permanent — stable traces that could be suppressed (extinction) but not fundamentally altered. Research by Karim Nader and Joseph LeDoux in the early 2000s changed this.\n\nWhen a consolidated memory is retrieved, it briefly re-enters an unstable (labile) state for a window of several hours. During this window, the memory can be updated before being stored again — a process called reconsolidation. If something during this window contradicts or disconfirms the prediction encoded in the memory, the reconsolidated memory can be structurally different from the original.\n\nThis is the neurological mechanism behind why therapy can genuinely change the emotional content of traumatic memories, not just the person’s relationship to them. EMDR, coherence therapy, and somatic approaches all appear to work partly through reconsolidation: activate the memory (bring it into labile state), provide a mismatch experience (bilateral stimulation, a new somatic state, a contradicting felt experience), and allow reconsolidation to incorporate the new information.\n\nThe clinical implication: traumatic memories are not permanently fixed. The past is not unchangeable in the way that folk psychology suggests. What can change is not the facts of what happened but the emotional and somatic charge stored alongside those facts. The memory can shift from raw, present-tense, overwhelming to past-tense, integrated, bearable."],
      ["Infant and preverbal memory", "Explicit (narrative) memory requires a functioning hippocampus and the capacity for language. Neither is fully developed until approximately 3-4 years of age. This is why we have no conscious autobiographical memories from infancy — the hardware for explicit memory formation is not yet online.\n\nImplicit memory, however, is operational from birth. The infant’s nervous system is encoding the emotional and somatic patterns of caregiving from the first moments of life: the quality of touch, the tone of voice, the timing of response, the felt sense of being held or not held, seen or not seen, regulated or left dysregulated.\n\nThis is the neurological basis of internal working models and early schemas: the infant encodes the relational pattern long before they can form a narrative about it. The encoding is entirely implicit — a body-based, emotional template for what relationships feel like and what to expect from them.\n\nThe adult who cannot explain why certain interactions feel threatening, why certain tones of voice produce a visceral response, or why they freeze in specific relational configurations is not being irrational. They are responding to preverbal implicit memories that were encoded before language existed and that have never been updated because they could never be explicitly remembered and therefore never been consciously processed.\n\nThis is also why talking alone is limited for early relational trauma: you cannot narrate your way to an implicit memory that predates narrative."],
      ["The conscious and the unconscious", "The distinction between explicit and implicit memory maps closely onto what Freud called the conscious and unconscious mind — though the neuroscience provides a more precise account of the mechanism.\n\nThe unconscious, in this framework, is not a mysterious hidden chamber of repressed desires. It is the vast architecture of implicit memory, procedural learning, and automatic processing that runs below the threshold of conscious awareness. It includes the relational templates encoded in infancy, the somatic patterns of threat and safety, the emotional memories that activate without narrative context, and the automatic behaviours that were learned long before conscious choice was available.\n\nJohn Bargh’s research on automaticity consistently finds that the majority of human behaviour is initiated, guided, and completed outside conscious awareness. The conscious mind is more of a narrator than a decision-maker — constructing a story about what happened after the fact rather than directing behaviour in real time.\n\nThe therapeutic implication: change that only occurs at the level of conscious reasoning is often insufficient because the behaviour being changed is generated at the implicit level. This is why insight alone is not always enough: a person can understand their pattern perfectly and still enact it. The implicit memory that drives it has not been updated. This is also why somatic, relational, and experiential approaches to therapy — those that work at the body and relational level rather than purely the cognitive — are necessary for deep change."],
      ["Reference", "Van der Kolk, B. (2014). The body keeps the score. Viking. | Nader, K., Schafe, G.E. & LeDoux, J.E. (2000). Fear memories require protein synthesis in the amygdala for reconsolidation after retrieval. Nature, 406. | Levine, P.A. (2010). In an unspoken voice. North Atlantic Books. | Squire, L.R. (2004). Memory systems of the brain: A brief history and current perspective. Neurobiology of Learning and Memory. | Bargh, J.A. & Chartrand, T.L. (1999). The unbearable automaticity of being. American Psychologist."]
    ]
  },
  mindfulness: {
    title: "Mindfulness",
    badge: "Mindfulness",
    bc: "bg-sky-50 border-sky-200",
    tc: "bg-sky-100 text-sky-700",
    body: "Mindfulness is the capacity to pay attention to present-moment experience with intention and without judgement. Though rooted in Buddhist contemplative practice, it was introduced into mainstream clinical psychology by Jon Kabat-Zinn, who developed Mindfulness-Based Stress Reduction (MBSR) at the University of Massachusetts in 1979. The core insight is deceptively simple: most suffering is not caused by what is happening but by the mind’s relationship to what is happening — the rumination about the past, the dread of the future, the running commentary of judgement. Mindfulness trains the capacity to be with experience as it is, without adding to it.",
    secs: [
      ["The three components — intention, attention, attitude", "Shauna Shapiro and colleagues proposed that mindfulness practice can be understood through three interacting components.\n\nIntention is why you are practising. The intention shapes the practice. Practising mindfulness with the intention of reducing stress produces different effects than practising with the intention of understanding the nature of mind. Intention is not a destination — it is the orientation that informs every moment of practice.\n\nAttention is the capacity to notice what is actually happening in the present moment — in the body, in the senses, in the mind — rather than being absorbed in the narrative the mind is generating about it. This is the technical core of mindfulness practice: training attention to return to the present, repeatedly, without drama, whenever it wanders.\n\nAttitude is the quality of awareness brought to experience. This is what distinguishes mindfulness from bare attention. The same moment of noticing a painful emotion can be met with aversion, self-criticism, and tightening — or with curiosity, warmth, and non-interference. The attitude changes everything about what the practice does neurologically and psychologically. Non-judging, patience, beginner’s mind, trust, non-striving, acceptance, and letting go are the seven attitudinal foundations Kabat-Zinn identified as essential."],
      ["Decentring — the core mechanism", "The most important thing mindfulness practice produces is not relaxation, though relaxation may occur. It is decentring — the capacity to observe mental events (thoughts, feelings, impulses, sensations) as mental events rather than as facts about reality or as the self.\n\nThe untrained mind operates in a fused state: a thought that says I am worthless is experienced as a true report about reality. I am worthless feels identical to there is a chair in the room — both are taken as direct perception of the way things are. Mindfulness practice creates a small but crucial gap between the thought and the identification with it. The thought is still present. But the relationship to it changes: I notice I am having the thought that I am worthless.\n\nThis is identical to what ACT calls defusion and what CBT calls cognitive distancing. It is also the mechanism behind the IFS concept of the Self — the calm observing awareness that is distinct from the parts. Mindfulness is the practice that develops this observer capacity directly.\n\nDecentring does not make difficult experience disappear. It makes it workable. The same intensity of feeling, met with decentred awareness rather than fused reaction, produces less secondary suffering — less suffering about the suffering — and more capacity to respond intentionally rather than react automatically."],
      ["MBSR and MBCT — the clinical programmes", "Mindfulness-Based Stress Reduction (MBSR) is an eight-week structured programme developed by Kabat-Zinn. It includes sitting meditation, body scan, mindful movement (gentle yoga), and walking meditation, alongside psychoeducation about stress and the mind-body relationship. The original population was people with chronic pain and illness for whom medicine had reached its limit. The evidence base now covers depression, anxiety, cancer, fibromyalgia, cardiovascular disease, and immune function.\n\nMindfulness-Based Cognitive Therapy (MBCT) was developed by Zindel Segal, Mark Williams, and John Teasdale specifically for people with recurrent major depression. It integrates MBSR with cognitive therapy elements — particularly the ability to recognise and disengage from the thought patterns that trigger depressive relapse. The landmark 2000 trial found MBCT reduced relapse rates by approximately 50% in people with three or more previous depressive episodes. NICE now recommends it as a first-line treatment for recurrent depression. The mechanism is decentring: people learn to recognise early warning signs of depression and to step back from the catastrophic thinking patterns without being pulled into them.\n\nBoth programmes emphasise that mindfulness is not a relaxation technique. Relaxation may occur as a side effect. The practice is about developing a fundamentally different relationship with experience — one in which all experience, pleasant and unpleasant, can be met with open, curious, non-reactive awareness."],
      ["The neuroscience", "Three decades of neuroimaging research have established a clear neural profile of both mindfulness practice and experienced meditators.\n\nThe amygdala — the threat-detection centre — shows reduced reactivity in regular meditators and reduced grey matter density with sustained practice. This corresponds to the clinical observation that mindfulness practice reduces the hair-trigger reactivity of the nervous system to perceived threat.\n\nThe prefrontal cortex — the seat of executive function, emotional regulation, and the capacity to take a longer view — shows increased activity and connectivity with the amygdala in experienced meditators. Mindfulness appears to strengthen the regulatory pathway from prefrontal cortex to amygdala: the braking system becomes more responsive.\n\nThe default mode network (DMN) — a set of brain regions that activate during mind-wandering, self-referential thought, and rumination — shows reduced activity during mindfulness practice and reduced connectivity at rest in experienced meditators. The DMN is the neural substrate of the ruminating, narrative, self-focused mind. Less DMN activity corresponds to less rumination, less self-referential suffering, and more present-moment engagement.\n\nThe insula — the primary cortical site for interoception, the perception of internal body states — shows increased grey matter in long-term meditators. This corresponds to the development of the felt sense that Peter Levine describes as the entry point into somatic processing. Mindfulness practice, through body scan and breath awareness, directly trains interoceptive capacity."],
      ["Trauma-sensitive mindfulness", "Standard mindfulness instruction was not designed with trauma in mind and can be contraindicated or actively harmful for trauma survivors if taught without modification. David Treleaven’s trauma-sensitive mindfulness framework (2018) identifies several specific risks.\n\nClosed-eye meditation can trigger flashbacks and dissociation in people with trauma histories, because the internal focus reduces external orientation and can pull the person into stored material before they have the regulatory capacity to process it.\n\nBody scan practice can contact areas of stored activation — particularly in the torso and pelvis — and produce overwhelm, dissociation, or re-traumatisation if not titrated carefully.\n\nFocused attention on the breath can activate trauma responses in people for whom breath was affected during the traumatic event (suffocation, physical assault to the chest, sexual abuse).\n\nTrauma-sensitive adaptations include: open-eye practice, using external anchors (feet on floor, sound in the room) rather than internal body focus, grounding before and after practice, explicit permission to modify or stop, and careful attention to the window of tolerance throughout. Many trauma therapists integrate mindfulness as a resource capacity built carefully before being used in trauma processing, not as the processing method itself."],
      ["Mindfulness and the other models in this app", "Mindfulness is the common thread running beneath most of the frameworks in this library.\n\nDBT: mindfulness is the foundation skill. Wise Mind requires the decentred awareness that mindfulness trains. All other DBT skills depend on the capacity to observe one’s experience without being fused with it.\n\nACT: defusion and present-moment awareness are directly mindfulness-derived. Hayes developed ACT explicitly from mindfulness research.\n\nIFS: the Self — the calm, curious observing presence — is the experiential equivalent of decentred mindful awareness. Mindfulness practice develops Self energy directly.\n\nEmotionally Focused Therapy: the therapist’s empathic attunement requires the quality of presence that mindfulness trains. A therapist who cannot be with their own experience cannot be fully present to a client’s.\n\nPolyvagal theory: the ventral vagal state — safe, connected, regulated — is the state in which mindfulness practice is most accessible and most effective. Practice also helps widen the window of tolerance so that ventral vagal access becomes more frequent.\n\nSomatic Experiencing: the felt sense that Levine identifies as the entry point into SE work is developed through the interoceptive training that mindfulness provides. Mindfulness and SE share the commitment to body-based present-moment attention as the site of both the problem and the healing."],
      ["Reference", "Kabat-Zinn, J. (1990). Full catastrophe living. Delacorte Press. | Segal, Z.V., Williams, J.M.G. & Teasdale, J.D. (2002). Mindfulness-based cognitive therapy for depression. Guilford Press. | Shapiro, S.L., Carlson, L.E., Astin, J.A. & Freedman, B. (2006). Mechanisms of mindfulness. Journal of Clinical Psychology, 62(3). | Treleaven, D.A. (2018). Trauma-sensitive mindfulness. Norton. | Neff, K. (2011). Self-compassion. William Morrow."]
    ]
  },
  narrative: {
    title: "Narrative Therapy",
    badge: "Narrative Therapy",
    bc: "bg-amber-50 border-amber-200",
    tc: "bg-amber-100 text-amber-700",
    body: "Narrative therapy was developed by Michael White and David Epston in Australia and New Zealand in the 1980s, drawing on the work of Michel Foucault and Gregory Bateson. Its central premise is that people make sense of their lives through stories — and that the stories available to us are not neutral. They are shaped by culture, power, and the dominant narratives of the environments we grew up in. Problems arise not from within the person but from the stories that have been constructed about the person, often by others, often in conditions of unequal power. Narrative therapy works to separate people from those stories and to find and thicken alternative accounts of identity that have been obscured.",
    secs: [
      ["The person is not the problem", "The most quoted phrase in narrative therapy: the person is not the problem. The problem is the problem.\n\nThis is not a semantic distinction. It is a fundamental repositioning of how difficulty is understood. When the problem is located inside the person — you are depressed, you are anxious, you have borderline personality disorder — the person becomes the target of intervention. Identity and problem fuse. The person defends themselves. Hope narrows.\n\nWhen the problem is externalised — when Depression is a thing that visits you, when The Critical Voice is something that has taken up residence rather than something you are — the relationship between person and problem changes. The person is no longer the problem. They are someone with a relationship to a problem. That relationship can be examined, challenged, and renegotiated.\n\nExternalisation is not denial. The person is not absolved of responsibility for their actions. They are repositioned as an agent in relation to a problem rather than as an instance of one. From this position, change becomes conceivable."],
      ["Dominant and alternative stories", "White and Epston drew on Jerome Bruner’s narrative psychology and Foucault’s analysis of power and knowledge. People are storied beings. We understand ourselves through the narratives we construct from selected events across time. But narrative construction is never innocent. Some events are selected and emphasised; others are marginalised or ignored. The story that results is a partial account that gets lived as if it were the whole truth.\n\nDominant stories are the narratives that have taken hold and organised identity around a particular account. Common dominant stories in therapeutic work: I am fundamentally flawed. I have always been too much. I am the difficult one. I am not capable of real intimacy. These stories were often authored in conditions of limited power — by caregivers, institutions, or cultural forces that the person, especially as a child, had no capacity to challenge.\n\nAlternative stories are accounts of the person’s life that contradict the dominant story but have been overlooked, minimised, or not yet storied. Narrative therapy is the process of finding these alternative accounts, examining them carefully, and building them into a counter-narrative that is as detailed, historically grounded, and emotionally real as the dominant story."],
      ["Unique outcomes and re-authoring", "A unique outcome (White’s term) or sparkling moment (an earlier term) is any event, feeling, intention, thought, or action that falls outside the dominant story and cannot be explained by it. The moment when the depressed person helped a stranger, even briefly. The time the person who believes they are unlovable was clearly loved. The occasion when someone who sees themselves as without agency made a decision that changed something.\n\nThese moments exist in every person’s history. They are not invented. But they have not been storied — they have not been connected into a narrative that gives them weight and meaning. They remain as isolated incidents that the dominant story explains away (it was a fluke, it didn’t count, it wasn’t really me).\n\nNarrative therapy works by finding unique outcomes and asking a series of questions that develop them into an alternative account of identity: When did this happen? What does it say about you that you did this? Who would not be surprised to know this about you? What does this tell you about what you value? Who else has known this side of you?\n\nThis is re-authoring — the construction of a richer, truer, more complex account of identity that includes both the difficulty and the evidence of something that the dominant story has obscured."],
      ["Scaffolding conversations", "White developed a detailed map of therapeutic conversation based on Vygotsky’s concept of the zone of proximal development — the space between what a person can currently do alone and what they can do with support.\n\nScaffolding conversations move through four territories:\n\nLow-level distancing: describing the problem and its effects in specific, concrete terms. What does it do? When does it arrive? How does it affect different areas of life?\n\nMedium-level distancing: evaluating the effects. Is this okay with you? How do you feel about what this has taken from your life? This question — deceptively simple — is where the person’s own judgement and values enter the conversation.\n\nHigh-level distancing: justifying the evaluation. Why is this not okay? What does your objection to it say about what matters to you? What values are being expressed in your refusal to accept this?\n\nFar distancing: developing alternative identity conclusions. Given what you have just said about your values and what matters to you, what does this say about the kind of person you are and the kind of life you want?\n\nThe scaffolding moves from the specific to the general, from description to meaning, always following the person’s own articulation rather than the therapist’s interpretation."],
      ["Definitional ceremonies and outsider witnesses", "Narrative therapy developed innovative practices for thickening alternative stories beyond the therapy room. Definitional ceremonies involve an audience — people who are significant to the person — who witness the person’s re-authored account and respond to it in a structured way.\n\nOutsider witnesses are asked to respond not with evaluation or advice but with what resonated, what image was evoked, what it said about the person’s values, and what it stirred in their own life. This response structure prevents the witness from taking over the story or interpreting it and keeps the person as the primary author.\n\nThe effect is to give the alternative story an audience — to make it social and witnessed rather than fragile and private. Stories that are told only inside the therapy room can feel unreal outside it. Stories that have been witnessed by significant others acquire a different kind of weight and durability.\n\nThick description is the goal: an alternative account of identity that is rich enough, historically grounded enough, and witnessed enough to stand against the dominant story when it returns — as it will."],
      ["Narrative therapy and trauma", "Narrative therapy offers something specific to trauma work that more neurobiological approaches do not: a political and relational account of how the problem arrived. Trauma is not simply a biological event. It happens in a social context, often involves abuse of power, and is shaped by cultural narratives about who deserves what and whose experience is valid.\n\nFor people who have been gaslit, disbelieved, or whose experience has been systematically minimised, the narrative frame — your story was suppressed, the dominant account was authored by someone with more power, your experience is real and deserves to be storied — can be profoundly validating in a way that a focus on the nervous system alone cannot achieve.\n\nNarrative therapy also addresses what White called the absent but implicit — the values, commitments, and qualities of a person that are implied by their response to difficult experience. The person who is distressed by what happened to them is not just traumatised. Their distress is evidence of what they value, what they believe about how people should be treated, and what they know about their own worth. These implied commitments are the ground of the alternative story."],
      ["Reference", "White, M. & Epston, D. (1990). Narrative means to therapeutic ends. Norton. | White, M. (2007). Maps of narrative practice. Norton. | Freedman, J. & Combs, G. (1996). Narrative therapy: The social construction of preferred realities. Norton. | Morgan, A. (2000). What is narrative therapy? Dulwich Centre Publications."]
    ]
  },
  pct: {
    title: "Person-Centred Therapy",
    badge: "Person-Centred",
    bc: "bg-green-50 border-green-200",
    tc: "bg-green-100 text-green-700",
    body: "Person-centred therapy was developed by Carl Rogers in the 1940s and 1950s, and remains one of the most influential contributions to psychotherapy ever made. Rogers proposed something radical for its time: that the therapist’s theoretical knowledge and techniques are secondary to the quality of the relationship itself. Given the right relational conditions, people naturally move toward growth, healing, and fuller functioning. The therapist’s task is not to fix, interpret, or direct — it is to create the conditions in which the person’s own healing capacity can activate. This is not a passive position. It is one of the most demanding stances in clinical practice.",
    secs: [
      ["The actualising tendency", "Rogers proposed that every person carries an innate drive toward growth, complexity, and fuller functioning — what he called the actualising tendency. This is not optimism. It is a clinical observation, analogous to the biological drive of an organism toward health. A plant growing toward light through a crack in concrete is not being naively positive. It is expressing its nature under difficult conditions.\n\nThe actualising tendency does not disappear under trauma, neglect, or years of suppression. It goes underground. The symptoms that bring people to therapy — depression, anxiety, relational collapse, the sense that life has narrowed to something unliveable — are often the actualising tendency trying to express itself in the only directions still available. The work is not to install something new. It is to remove what is blocking what was always there.\n\nThis has a direct clinical implication: the person already knows, at some level, what they need. The therapist’s job is to create conditions in which that knowing can surface and be trusted."],
      ["The three core conditions", "Rogers identified three conditions that are both necessary and sufficient for therapeutic change. Without all three, he argued, therapeutic movement does not occur. With all three, it reliably does — regardless of the specific techniques used.\n\nUnconditional positive regard: the therapist holds the person in warm, non-judgemental acceptance — not of every behaviour, but of the person’s fundamental worth and the understandability of their experience. No part of the person is too much, too broken, or too shameful to be received. This is not agreement or approval. It is the refusal to place conditions on the person’s worth. For many people, this is an entirely new relational experience. It is also the direct clinical antidote to the conditional regard that shaped the core schemas.\n\nEmpathic understanding: the therapist tracks the person’s internal experience with precision and communicates that tracking back — not as interpretation, not as reflection of content, but as resonant understanding of what it is like to be this person in this moment. Rogers described this as entering the private perceptual world of the other and moving about in it delicately without making judgements. When genuine empathy is received, people often report feeling known in a way they have rarely or never experienced.\n\nCongruence (genuineness): the therapist is real in the relationship. There is no therapeutic mask, no professional persona maintained at a distance from actual experience. The therapist’s internal experience is available to the relationship and, where relevant, expressed. Congruence is not self-disclosure as technique. It is the absence of the false front that makes genuine contact impossible."],
      ["Conditions of worth", "Rogers’ developmental model describes how the actualising tendency becomes distorted. The infant has an innate need for positive regard — warmth, care, approval from caregivers. When positive regard is made conditional — when it is given only for certain behaviours, feelings, or expressions and withdrawn for others — the child learns to introject these conditions. They begin to evaluate their own experience not by how it feels but by whether it will earn approval.\n\nThese introjected conditions of worth are Rogers’ equivalent of schemas. They operate as an internal censor: certain feelings, impulses, and aspects of self are acceptable and can be acknowledged; others are threatening and must be denied or distorted. The person loses access to their own organismic valuing process — the body’s natural sense of what is growth-promoting versus what is harmful.\n\nThe therapeutic relationship offers the corrective experience: positive regard that is genuinely unconditional. Over time, the person begins to internalise a less conditional relationship with their own experience. Feelings that were previously too dangerous to acknowledge become accessible. The organismic valuing process begins to function again."],
      ["The fully functioning person", "Rogers described the outcome of successful therapy as the fully functioning person — not a fixed end-state but a way of being in process. Characteristics include:\n\nOpenness to experience: able to receive all experience — pleasant and unpleasant — without defensive distortion. Feelings are accessible and informative rather than threatening.\n\nExistential living: living fully in each moment rather than being rigidly organised around the past or future. Flexible and adaptive.\n\nOrganismic trust: trusting one’s own felt sense of what is growth-promoting rather than relying primarily on external approval or fixed rules.\n\nFreedom and responsibility: experiencing genuine freedom of choice alongside responsibility for those choices.\n\nCreativity: able to adapt, create, and participate in the world freshly rather than through fixed patterns.\n\nThe fully functioning person is not someone who has resolved all difficulty. They are someone who has the internal resources to move through difficulty without losing access to themselves."],
      ["Rogers and the neuroscience of relationship", "Rogers developed his model from clinical observation, decades before the neuroscience that now supports it. What he described as the necessary and sufficient conditions for therapeutic change maps closely onto what contemporary neuroscience describes as the conditions for nervous system regulation and neural change.\n\nUnconditional positive regard creates the safety signal that shifts the autonomic nervous system from threat to ventral vagal regulation — the state in which learning, integration, and genuine relational contact are possible.\n\nEmpathic attunement activates the social engagement system and supports co-regulation. The experience of being deeply understood produces oxytocin release and reduces cortisol.\n\nCongruence — the therapist’s genuine presence rather than a performed role — supports the client’s nervous system to remain in contact with a real, regulated other rather than relating to a professional persona. This is the neurological basis of the therapeutic relationship as co-regulatory container.\n\nDan Siegel’s interpersonal neurobiology, Allan Schore’s right-brain-to-right-brain model of therapeutic change, and Stephen Porges’ polyvagal theory all provide neurobiological grounding for what Rogers described relationally. The conditions he identified are not just good practice. They are the relational equivalent of the biological conditions for neural plasticity."],
      ["Person-centred and other models", "Person-centred therapy is sometimes positioned as the soft, supportive approach in contrast to the active interventions of CBT, EMDR, or somatic work. This misrepresents it. The three core conditions are not techniques that can be added to any model. They are a way of being in relationship that is both demanding and precise.\n\nThat said, the person-centred relationship is the container within which every other therapeutic approach operates. EMDR without genuine empathic attunement is a procedure. Somatic Experiencing without unconditional positive regard is intrusive. DBT skills taught without congruence are a manual.\n\nMost experienced trauma therapists operate from an integrated position in which the relational quality described by Rogers is the ground, and specific techniques are applied within that ground when they serve the person’s process. The research on what makes therapy effective consistently finds that the quality of the therapeutic relationship is the strongest predictor of outcome — stronger than the specific model used. Rogers identified this decades before the research confirmed it."],
      ["Reference", "Rogers, C.R. (1951). Client-centred therapy. Houghton Mifflin. | Rogers, C.R. (1961). On becoming a person. Houghton Mifflin. | Rogers, C.R. (1957). The necessary and sufficient conditions of therapeutic personality change. Journal of Consulting Psychology, 21(2), 95–103. | Kirschenbaum, H. & Henderson, V.L. (Eds.) (1989). The Carl Rogers reader. Houghton Mifflin."]
    ]
  },
  dbt: {
    title: "Dialectical Behaviour Therapy",
    badge: "DBT",
    bc: "bg-indigo-50 border-indigo-200",
    tc: "bg-indigo-100 text-indigo-700",
    body: "Dialectical Behaviour Therapy was developed by Marsha Linehan in the late 1980s, originally for people with borderline personality disorder and chronic suicidality — a population for whom standard CBT was proving insufficient. Linehan, who later disclosed her own experience of severe mental illness, built DBT around a central dialectic: the simultaneous acceptance of the person exactly as they are and the necessity of change. Neither pole alone is therapeutic. Validation without change leaves suffering in place. Change without validation is experienced as invalidating and breaks the therapeutic relationship. DBT holds both.",
    secs: [
      ["The biosocial theory — why DBT skills are needed", "Linehan’s biosocial theory proposes that emotional dysregulation — the core problem DBT addresses — develops from the interaction of biological emotional sensitivity and an invalidating environment.\n\nBiological sensitivity means some people are born with a nervous system that responds more intensely and more quickly to emotional stimuli, and returns to baseline more slowly. This is not a deficit — it is a trait that carries gifts (empathy, intensity, creativity) alongside costs.\n\nAn invalidating environment is one that consistently communicates that a person’s internal experiences are wrong, inappropriate, or not real. This includes environments of abuse or neglect, but also well-intentioned environments that consistently minimise, dismiss, or pathologise emotional responses. The message received: what I feel is wrong. I should not feel this. I must not show this.\n\nThe combination produces a person who feels intensely, has limited tolerance for that intensity, has been given no tools to manage it, and has learned to mistrust their own internal experience. DBT provides the skills the environment failed to teach."],
      ["Distress tolerance — surviving the crisis", "Distress tolerance skills are for moments of acute crisis when the nervous system is flooded and change is not yet possible. The goal is to get through the moment without making things worse.\n\nTIPP — the fastest physiological regulation tools:\nTemperature: cold water on the face or wrists activates the dive reflex and rapidly lowers heart rate. Ice held in the hands. Splashing cold water on the face.\nIntense exercise: burns off the adrenalin. A fast walk, jumping jacks, shaking the body. Physical discharge of the mobilised energy.\nPaced breathing: slow the exhale longer than the inhale. In for 4, out for 6. The extended exhale activates the parasympathetic system.\nPaired muscle relaxation: tense a muscle group hard for 5 counts, release completely. Repeat through the body. The contrast between tension and release gives the nervous system something to work with.\n\nACCEPTS — distraction with purpose. Activities that fully occupy attention. Contributing to others. Comparisons that provide perspective. Emotions that are incompatible with the current distress. Pushing away temporarily. Thoughts that replace the crisis thoughts. Sensations that ground in the present body.\n\nSelf-soothe with the five senses: deliberately engage sight, sound, smell, taste, touch in ways that are genuinely soothing rather than numbing. This is an active skill, not passive avoidance.\n\nImproving the moment: prayer or connection to something larger, relaxation, one thing in the moment, brief vacation (ten minutes of something different), encouragement to self."],
      ["Emotion regulation — changing the emotional experience", "Emotion regulation skills work upstream of the crisis, building the capacity to modulate emotional responses before they become overwhelming.\n\nUnderstanding emotions: naming the emotion, identifying the prompting event, the body sensation, the action urge, the after-effects. Making the structure of the emotional experience visible reduces its power.\n\nCheck the facts: emotions are appropriate responses to what the mind believes is true. Before acting on an emotion, check whether the interpretation that generated it is accurate. Emotion regulation begins with accuracy.\n\nOpposite action: every emotion has an action urge. Acting on the urge intensifies the emotion. Acting opposite reduces it.\nAnger → urge to attack. Opposite: gentle approach, doing something kind, avoiding.\nFear → urge to avoid. Opposite: approach the feared thing and stay.\nSadness → urge to withdraw. Opposite: engage, move, do something pleasurable.\nShame → urge to hide. Opposite: disclose to a safe person, hold your head up.\nOpposite action requires full commitment for several minutes. Half-hearted opposite action does not work.\n\nABC PLEASE: Accumulate positive experiences. Build mastery through competence-building activities. Cope ahead by rehearsing difficult situations in advance. PLEASE addresses physical vulnerability: treat PhysicaL illness, balance Eating, avoid mood-Altering substances, balance Sleep, get Exercise.\n\nReducing vulnerability: the nervous system regulates more easily when basic physical needs are met. Sleep deprivation, hunger, and illness all shrink the window of tolerance before the day has begun."],
      ["Mindfulness — the core skill", "Mindfulness is the foundation skill in DBT. All other skills rest on the capacity to observe experience without immediately reacting to it or being fused with it.\n\nLinehan drew on Zen practice and translated it into concrete behavioural terms. Three What skills describe what you do in mindfulness: Observe (notice without words), Describe (put words on what is observed without evaluation), Participate (fully engage in the present activity).\n\nThree How skills describe how you do it: Non-judgementally (without evaluating as good or bad), One-mindfully (one thing at a time, fully present), Effectively (doing what works, not what is ‘right’ in principle).\n\nWise Mind is the central DBT concept: the state in which Emotion Mind (dominated by feeling) and Reasonable Mind (dominated by logic) are integrated. Wise Mind knows what is true and what to do. It is not a compromise between the two — it is a third state that transcends both. Most people can identify moments of Wise Mind from their own experience: a decision that was both felt and known to be right, without conflict between feeling and reason."],
      ["Interpersonal effectiveness — relationships and self-respect", "Interpersonal effectiveness skills address how to navigate relationships without damaging them or yourself.\n\nDEAR MAN is for getting what you need or saying no:\nDescribe the situation factually. Express how you feel using I statements. Assert what you want clearly. Reinforce why meeting your need benefits both people. Mindful — stay focused on your goal. Appear confident even if you do not feel it. Negotiate — know what you will and will not compromise on.\n\nGIVE is for maintaining the relationship:\nGentle (no attacks, threats, or contempt). Interested (listen, ask questions, appear interested). Validate (acknowledge the other person’s perspective as understandable given their experience). Easy manner (lighten up where possible, use humour, smile).\n\nFAST is for maintaining self-respect:\nFair to yourself as well as the other. Apologies only when genuinely warranted — not for existing or having needs. Stick to your values. Truthful — no agreeing to things you will not follow through on.\n\nThe skills are used independently depending on which goal is primary: getting what you need (DEAR MAN), maintaining the relationship (GIVE), or maintaining self-respect (FAST). Sometimes all three; sometimes one must be prioritised."],
      ["Radical acceptance", "Radical acceptance is one of DBT’s most important and most misunderstood concepts. It does not mean approving of what happened, condoning harm, or giving up on change. It means fully and completely acknowledging reality as it is — and stopping the additional suffering caused by fighting what cannot be changed.\n\nPain is inevitable. Suffering is optional. Linehan’s formulation: pain plus non-acceptance equals suffering. The same pain accepted is simply pain — real, present, and workable.\n\nWhat makes non-acceptance costly:\nIt keeps attention and energy directed at what cannot be changed rather than what can.\nIt generates secondary emotions — anger at the pain, shame about the anger, despair about the shame.\nIt maintains the nervous system in a state of resistance that produces chronic low-level activation.\n\nRadical acceptance is practised in the body as well as the mind. Linehan describes it as a physical letting go — a loosening of the resistance that the body holds. It often has to be practised many times before it takes hold. Each time the resistance returns, the practice is to notice it and return to acceptance. It is not a single decision. It is a repeated choosing."],
      ["DBT and developmental trauma", "Although DBT was developed for BPD, its underlying model maps directly onto the experience of developmental trauma. The biosocial theory — high biological sensitivity meeting invalidating environment — describes a significant proportion of people with complex PTSD histories, regardless of diagnosis.\n\nThe DBT skills fill a specific gap: they provide what was never taught. People raised in environments of neglect, chaos, or emotional invalidation often reach adulthood with no reliable tools for managing intense emotion, no models of effective interpersonal functioning, and a deeply ingrained mistrust of their own internal experience. DBT is one of the few approaches that directly addresses this skills deficit rather than only processing the history that created it.\n\nMany trauma-informed practitioners integrate DBT skills into broader trauma work. The distress tolerance tools are particularly valuable as stabilisation skills before trauma processing begins — expanding the window of tolerance so that the nervous system has more capacity for the deeper work."],
      ["Reference", "Linehan, M.M. (1993). Cognitive-behavioral treatment of borderline personality disorder. Guilford Press. | Linehan, M.M. (2014). DBT skills training manual, 2nd ed. Guilford Press. | Linehan, M.M. (2020). Building a life worth living. Random House."]
    ]
  },
  se: {
    title: "Somatic Experiencing",
    badge: "Somatic Experiencing",
    bc: "bg-teal-50 border-teal-200",
    tc: "bg-teal-100 text-teal-700",
    body: "Somatic Experiencing (SE) was developed by Peter Levine over several decades, beginning with his observation that animals in the wild do not develop the equivalent of PTSD despite being regularly exposed to life-threatening events. The reason, he concluded, is discharge. After a threat passes, animals shake, tremble, and move. The activation mobilised for survival is completed through the body before the animal returns to normal functioning. Humans interrupt this process — through social conditioning, shame about physical expression, the demands of civilised functioning — and the incomplete survival energy stays in the nervous system, forming the biological basis of trauma. SE is a body-first, non-cathartic approach to renegotiating that stored activation.",
    secs: [
      ["The felt sense", "The felt sense is a concept Levine drew from Eugene Gendlin’s Focusing work. It is the body’s internal experience of a situation — a diffuse, often pre-verbal sense of something that carries more information than any thought or emotion alone.\n\nThe felt sense is not the same as a named emotion. Sadness is an emotion. The heaviness in the chest, the slight contraction around the throat, the quality of the breath in a moment of grief — that is the felt sense. SE works primarily with sensation at this level, below the level of story and interpretation.\n\nWorking with the felt sense means slowing down and tracking what is actually happening in the body from moment to moment: where is there tightness? Warmth? Constriction? Movement? Stillness? What quality does the sensation have — sharp, dull, pulsing, spreading? This level of attention to body experience is the entry point into SE processing."],
      ["Titration — working in small doses", "One of SE’s central principles is that trauma cannot be processed all at once without risk of re-traumatisation. Titration is the practice of working with very small amounts of activation at a time — like adding drops of a strong acid to water rather than pouring it all in at once.\n\nIn practice: the therapist guides the client to touch the edge of activation — just enough to sense the body’s response — then return to a resource or neutral state before approaching again. Each small contact with the activation, followed by return to regulation, gradually expands the nervous system’s capacity to process what was overwhelming.\n\nThis is why SE often looks deceptively slow from the outside. The therapist may spend long periods on what appears to be very small body sensations. The slowness is deliberate. It is titration in action."],
