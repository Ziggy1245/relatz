      ["Pendulation — moving between activation and resource", "Pendulation is the rhythmic movement of attention between a site of body activation and a place of relative ease, neutrality, or resource within the same body.\n\nThe nervous system regulates through contrast, not suppression. Staying fixed in activation produces flooding. Staying fixed in resource produces dissociation. Moving slowly between the two — touching the activation, returning to the resource, touching again, returning — produces regulation. The wave motion of this alternation is what Levine calls the healing vortex countering the trauma vortex.\n\nPendulation also teaches the nervous system something experientially important: that activation is not permanent. The body moves. Sensations change. What felt stuck begins to have movement and direction. This embodied learning is more effective than any cognitive understanding of the same fact."],
      ["Completing the survival response", "SE understands trauma not as a memory problem but as an incomplete action problem. When a survival response — fight, flight, freeze — is activated but cannot complete, the energy mobilised for that response stays in the nervous system looking for completion.\n\nIn a freeze response, for example, the muscles needed for flight or fight are contracted and braced but unexpressed. The deer caught in headlights is not relaxed — it is in a state of intense, contained preparation for movement that never came. In humans, this can persist for years as chronic muscle tension, hypervigilance, the startle response, or the sense of being permanently braced for something.\n\nSE works by finding and completing these interrupted movements in small, safe doses. A person who froze during an attack might, in a session, notice the slight impulse to push or run in their arms or legs — and very slowly, with attention, allow that movement to complete. The nervous system registers the completion. The loop closes. The activation can discharge.\n\nThis completion is often accompanied by spontaneous shaking, trembling, sighing, yawning, warmth, or tears — the body’s natural discharge signals. These are not symptoms to suppress. They are the process working."],
      ["SIBAM — the five channels of experience", "Levine maps experience across five channels that SE uses to track and work with activation:\n\nSensation — the raw physical data: tightness, warmth, tingling, constriction, heaviness, vibration.\n\nImage — visual, auditory, olfactory impressions that arise spontaneously during processing. Images in SE are body-generated, not deliberately visualised.\n\nBehaviour — movement impulses, posture, gesture, breath patterns, facial expression.\n\nAffect — emotional tone: fear, grief, anger, tenderness, relief. In SE, affect is tracked as sensation before being named as emotion.\n\nMeaning — the thoughts, beliefs, and narrative the mind generates around the experience.\n\nTrauma tends to collapse these channels — sensation becomes overwhelming or absent, meaning becomes fixed and negative, behaviour becomes stereotyped. SE works to restore differentiation and flow across all five channels, which produces integration at the neural level."],
      ["Renegotiation rather than reliving", "SE explicitly does not ask clients to relive traumatic events in detail. Detailed narrative retelling of trauma activates the cortex and can re-traumatise by flooding the system without producing resolution.\n\nInstead, SE uses renegotiation: approaching the traumatic material through body sensation, completing the interrupted responses in small doses, and gradually allowing the nervous system to update its record of what happened. The memory itself is not the target. The body’s incomplete response to the memory is the target.\n\nThis is why SE clients often report that their memories of traumatic events change in quality after processing — not the facts of what happened, but the felt sense of it. What was vivid and present-tense becomes past-tense. What was overwhelming becomes bearable. The body knows the difference between then and now in a way it could not before."],
      ["SE and the polyvagal connection", "SE and polyvagal theory map closely onto each other. Levine’s mobilisation (fight/flight) corresponds to Porges’ sympathetic activation. Levine’s freeze/collapse corresponds to Porges’ dorsal vagal shutdown. Levine’s completion and discharge corresponds to the return to Porges’ ventral vagal safety.\n\nBoth frameworks understand trauma as a disruption to the autonomic nervous system’s capacity to regulate, and both identify the body — rather than the thinking mind — as the primary site of both the problem and the resolution.\n\nSE practitioners often integrate polyvagal-informed language and Dana’s concept of the social engagement system, using the therapeutic relationship itself as a co-regulatory resource that supports the nervous system’s capacity to process what it is holding."],
      ["Reference", "Levine, P.A. (1997). Waking the tiger: Healing trauma. North Atlantic Books. | Levine, P.A. (2010). In an unspoken voice: How the body releases trauma and restores goodness. North Atlantic Books. | Levine, P.A. & Frederick, A. (1997). Waking the tiger. North Atlantic Books. | Gendlin, E.T. (1982). Focusing. Bantam Books. | Porges, S.W. (2011). The polyvagal theory. Norton."]
    ]
  },
  brainspotting: {
    title: "Brainspotting",
    badge: "Brainspotting",
    bc: "bg-cyan-50 border-cyan-200",
    tc: "bg-cyan-100 text-cyan-700",
    body: "Brainspotting was developed by David Grand in 2003, emerging from his work with EMDR when he noticed that where a client held their gaze affected the depth of their trauma processing. The core axiom: where you look affects how you feel. A brainspot is an eye position that corresponds to a stored trauma or emotional activation in the subcortical brain — the brainstem, cerebellum, and limbic system — below the level of language and conscious thought. Unlike talk therapies that work top-down through language and cognition, brainspotting works bottom-up, accessing trauma where it is actually stored in the body and brain.",
    secs: [
      ["How a brainspot is found", "The therapist asks the client to bring up a disturbing memory, image, or body sensation and rate its level of disturbance. Using a pointer, the therapist slowly moves across the client’s visual field while the client tracks internally for shifts in body activation. A brainspot is located when the client notices increased activation, a blink, a wobble in the eye, a change in breathing, or a felt sense of resonance. That eye position is then held.\n\nThere are two primary positions: the Outside Window, where the therapist identifies the brainspot by reading the client’s body and face; and the Inside Window, where the client identifies the position themselves by tracking their own internal response. Both lead to the same subcortical processing."],
      ["What happens during processing", "Once the eye position is held, the client is guided to focus on the body sensation associated with the activation while the eye position is maintained. BioLateral sound — gentle tones alternating between left and right ear — supports bilateral brain stimulation and deepens the processing.\n\nThe therapist’s role is dual attunement: being simultaneously attuned to the client’s present-moment experience and to their own resonant response as a co-regulator. The therapeutic relationship is not background to brainspotting — it is the container that makes deep subcortical access possible.\n\nProcessing is non-directed. The therapist does not guide the client toward any particular content or conclusion. The subcortical brain leads. Material surfaces in the order the nervous system is ready to process it. This distinguishes brainspotting from more protocol-driven approaches."],
      ["The subcortical brain and why this matters", "Most trauma therapies work with the cortex — language, narrative, cognitive restructuring. Brainspotting works with the subcortical brain: the brainstem, cerebellum, basal ganglia, and limbic system. These are the regions where trauma is stored as body memory, procedural memory, and automatic response — not as narrative.\n\nThis is why trauma survivors often know intellectually that they are safe but cannot feel safe in the body. The cortex has updated. The subcortex has not. Brainspotting bypasses the cortex and accesses the stored material directly, through the eye-brain connection and the felt sense of body activation.\n\nGrand’s model draws on Stephen Porges’ polyvagal theory and Peter Levine’s somatic work. The held eye position keeps the window of processing open while the nervous system works through material it has been holding. Sessions can produce significant emotional release, body movement, spontaneous imagery, and a felt sense of shift or completion."],
      ["What brainspotting is used for", "Brainspotting was developed for trauma and PTSD, and the evidence base is strongest here. It is also used for:\n\nPerformance anxiety — sports, performance, public speaking, examinations. Grand initially developed the technique working with athletes.\n\nChronically held body pain and physical symptoms that have a somatic-emotional component.\n\nAddiction and compulsive behaviour — accessing the subcortical material driving the compulsion.\n\nComplicated grief and loss.\n\nBrainspotting tends to work quickly. Significant processing often occurs within a session or across a small number of sessions. This does not mean it is superficial — the depth of subcortical access means material can surface that has not responded to years of talk therapy."],
      ["Relationship to EMDR", "Brainspotting emerged from EMDR. Grand was a trained EMDR practitioner when, during a session, he noticed that a client’s eye became fixed in a particular position during a moment of deep processing. He began experimenting with holding that position rather than moving through the standard bilateral eye movement protocol.\n\nBoth approaches use bilateral stimulation and both access trauma through body-based processing. The key differences: EMDR uses a structured eight-phase protocol with a fixed set of procedures; brainspotting is more fluid, relational, and non-directive. EMDR moves the eyes; brainspotting holds a position. EMDR works more with the cortex through narrative processing; brainspotting works more with the subcortex through body-based processing.\n\nMany therapists train in both and move between them depending on what the client’s nervous system needs."],
      ["Reference", "Grand, D. (2013). Brainspotting: The revolutionary new therapy for rapid and effective change. Sounds True. | Grand, D. (2001). Emotional healing at warp speed. Harmony Books. | Hildebrand, A. et al. (2017). Efficacy of EMDR vs. brainspotting for treatment of PTSD. Journal of EMDR Practice and Research."]
    ]
  },

(function() {
  var typeOrder = ["Manager", "Firefighter", "Exile"];
  var grouped = {};
  typeOrder.forEach(function(t) { grouped[t] = []; });
  Object.keys(PARTS).forEach(function(name) {
    var p = PARTS[name];
    if (grouped[p.type]) grouped[p.type].push([name + " — " + p.type,
      p.desc +
      (p.gift ? "\n\nGift: " + p.gift : "") +
      (p.cost ? "\n\nCost: " + p.cost : "") +
      (p.belief ? "\n\nBelieves: " + p.belief : "") +
      (p.hear ? "\n\nNeeds to hear: \u201c" + p.hear + "\u201d" : "")
    ]);
  });
  typeOrder.forEach(function(t) {
    grouped[t].forEach(function(sec) { THEORY.ifs.secs.push(sec); });
  });

  Object.keys(SCHEMA).forEach(function(name) {
    var s = SCHEMA[name];
    var defs = [s.def, s.desc].filter(Boolean);
    var body = (defs[defs.length-1] || "") +
      (s.domain ? "\n\nDomain: " + s.domain : "") +
      (s.nc ? "\n\nNegative cognition: " + s.nc : "") +
      (s.pc ? "\n\nPositive cognition target: " + s.pc : "");
    THEORY.schemas.secs.push([name, body]);
  });

  Object.keys(ATT).forEach(function(name) {
    var a = ATT[name];
    var body = (a.desc || "") + (a.traits && a.traits.length ? "\n\nSigns: " + a.traits.join(" | ") : "") + (a.schemas ? "\n\nLinked schemas: " + a.schemas : "") + (a.change ? "\n\nWhat helps: " + a.change : "");
    THEORY.iwm.secs.push([a.title || name, body]);
  });

  THEORY.iwm.secs.push(["Secure attachment", "Develops when caregiving was consistent, attuned, and responsive. The child learns that reaching out brings comfort and that they are worthy of care.\n\nAs an adult: comfortable with both closeness and independence. Can seek support without panic and self-soothe without shutting down. Conflict is tolerable and repair is possible.\n\nInternal working model: positive self / positive others.\n\nSecurity can be developed in adulthood through repeated relational experiences that contradict the original insecure model — what Bowlby called earned security."]);

  THEORY.iwm.secs.push(["Avoidant / Dismissing attachment", "Develops when caregiving was consistently emotionally unavailable or rejecting of emotional needs. The child learns that expressing need brings distance, so they suppress the attachment system and become self-reliant.\n\nAs an adult: values independence, uncomfortable with closeness, minimises the importance of relationships. Emotions are intellectualised or dismissed. Closeness feels intrusive.\n\nInternal working model: positive self (I do not need others) / negative others (people are unreliable — better not to depend).\n\nNote: the positive self-model often conceals underlying shame. The avoidance protects against a vulnerability the person cannot consciously access.\n\nBartholomew distinguishes this Dismissing-Avoidant type from Fearful-Avoidant (Disorganised), which shares the avoidance of closeness but with a negative self-model and fear rather than self-sufficiency as the driver."]);
})();
