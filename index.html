      ["Reference", "Van der Hart, O., Nijenhuis, E.R.S. & Steele, K. (2006). The haunted self: Structural dissociation and the treatment of chronic traumatisation. Norton. | Putnam, F.W. (1997). Dissociation in children and adolescents. Guilford Press. | Levine, P.A. (2010). In an unspoken voice. North Atlantic Books. | Steele, K., Boon, S. & Van der Hart, O. (2016). Treating trauma-related dissociation. Norton. | Dell, P.F. & O’Neil, J.A. (Eds.) (2009). Dissociation and the dissociative disorders. Routledge."]
    ]
  },
  innercritic: {
    title: "The Inner Critic",
    badge: "Inner Critic",
    bc: "bg-red-50 border-red-200",
    tc: "bg-red-100 text-red-700",
    body: "The inner critic is the internal voice that evaluates, judges, compares, and finds the self wanting. Almost everyone has one. For many people, it is the loudest and most constant voice in their inner world — more reliable than kindness, more available than encouragement, more persistent than almost any other internal presence. Understanding where it comes from, what function it originally served, and how it maintains itself is one of the most practically useful things therapy can offer — because the inner critic is involved in almost every pattern of psychological suffering.",
    secs: [
      ["Where the inner critic comes from", "The inner critic is not an innate feature of the self. It is a developmental acquisition — an internalisation of the evaluating voices of the early environment.\n\nChildren are exquisitely sensitive to how they are regarded by their caregivers. Approval and disapproval, praise and criticism, warmth and withdrawal — these signals are registred with survival-level attention because, for a dependent child, the approval of the caregiver is not merely pleasant but necessary. A child who loses the approval of their caregiver has lost access to their primary source of safety and regulation.\n\nIn environments where approval was conditional — where love, safety, or care depended on being good enough, well-behaved, high-achieving, undemanding, or emotionally contained — the child learns to monitor themselves through the lens of the caregiver’s standards. The critical voice of the parent becomes internalised as the child’s own critical voice. The external evaluation is turned inward and made automatic.\n\nThis is not a pathological process in itself. All children internalise parental standards and use them for self-regulation. The problem arises when the standards were unrealistic, the criticism was harsh or chronic, the approval was unpredictable, or the child’s authentic self was consistently found wanting. In those conditions, the internalised critic is not a useful guide to appropriate behaviour — it is a chronic source of shame, self-attack, and the suppression of authentic self-expression.\n\nIn IFS terms, the inner critic is a manager or firefighter: a protective part that developed to perform a function — to motivate, to prevent shame, to keep the system safe from external criticism by providing it first. In TA terms, it is the Critical Parent ego state, running a recording of the evaluating voice from the early environment. In schema therapy, it is the Demanding Parent or Punitive Parent mode."],
      ["What the critic is trying to do", "This is the most important clinical insight about the inner critic: it is trying to help. Its methods are destructive and its standards are often impossible, but its intention — at the level at which it operates — is protective.\n\nThe critic as motivator: if I criticise myself harshly when I fail, I will be motivated to try harder and therefore less likely to fail again. The logic is not wrong — harsh self-criticism can produce short-term performance. But it produces performance driven by fear of shame rather than genuine engagement, and it is associated with worse long-term performance, more anxiety, more burnout, and less creativity.\n\nThe critic as pre-emptive shamer: if I attack myself before others can, I am in control of the shaming process. The attack comes from inside rather than outside. This reduces the felt vulnerability to external judgment.\n\nThe critic as standard-keeper: the critic monitors whether the person is living up to the standards that, in the original environment, produced safety. If the standard was always high-achieving, the critic polices achievement. If the standard was always calm and undemanding, the critic attacks emotional expression.\n\nThe critic as punisher: some inner critics are not simply harsh — they are actively punishing. This reflects an environment in which punishment preceded love or approval — where the child learned that suffering was the price of safety. The critic punishes because punishment was the expected response to failure, and the punishment feels, paradoxically, more familiar than kindness.\n\nUnderstanding the protective intention does not neutralise the critic. But it changes the clinical approach: rather than fighting the critic, the work involves acknowledging its protective intention, demonstrating that there are more effective ways to achieve the same goal, and gradually offering the exiled part it is protecting an experience that does not require the critic’s surveillance."],
      ["How the critic maintains itself", "The inner critic is self-maintaining because it generates the conditions that appear to confirm its necessity.\n\nThe perfectionism loop: the critic sets an impossible standard. The person inevitably falls short. The critic interprets the shortfall as confirmation that the standard is justified — and increases the intensity of criticism. The person tries harder to meet the standard. Fails again. The critic intensifies. The loop is self-sealing.\n\nThe shame spiral: the critic attacks the self, producing shame. Shame produces withdrawal and self-concealment. Withdrawal reduces the corrective relational experiences that would challenge the critical beliefs. The critic’s view of the self is confirmed by the absence of disconfirming evidence. The shame deepens. The critic attacks more.\n\nThe avoidance cycle: the critic attacks so harshly in anticipation of failure that the person avoids attempting things. The avoidance prevents the gathering of evidence that would challenge the critic’s predictions. The person never discovers that they could have managed — because they never tried. The critic’s authority is maintained by the avoidance it generates.\n\nThe self-fulfilling prophecy: the critic’s running commentary produces the emotional states (anxiety, shame, self-consciousness) that most reliably impair the performance it is supposedly motivating. The performance is undermined by the criticism directed at it. The critic then interprets the impaired performance as confirmation of its original assessment."],
      ["The critic across the therapeutic models", "The inner critic appears in every major therapeutic model in this library, each of which names it differently and offers a different account of how to work with it.\n\nIFS: the inner critic is a manager or firefighter part — a protective part carrying polarised beliefs about what the self needs to do to survive. The IFS approach is not to fight the critic but to develop curiosity about it: what is it protecting? What is its positive intention? What does it fear would happen if it stopped? The goal is the transformation of the critic from a harsh overseer into an ally that can hold standards without punishment.\n\nCFT: Paul Gilbert’s Compassion Focused Therapy identifies self-criticism as a threat-system activation — the same physiological system as external threat. CFT works to activate the soothing system through compassionate self-directed imagery and tone, directly counteracting the threat activation that self-criticism produces.\n\nSchema therapy: the inner critic is the Demanding Parent or Punitive Parent mode — an internalised version of the critical caregiver. Schema therapy uses limited reparenting to provide the experience of being evaluated with warmth and fairness rather than harshness, and mode work to develop the Healthy Adult as an alternative to the Punitive Parent.\n\nTA: the inner critic is the Critical Parent ego state, running a recording of the early evaluating environment. TA work builds the Adult ego state capacity to assess the Critical Parent’s commentary — to hear it, evaluate its accuracy, and choose whether to act on it rather than being automatically governed by it.\n\nSelf-compassion (Neff): the antidote is not self-esteem (which requires positive self-evaluation the critic prevents) but self-compassion — extending to the self the same warmth one would offer a close friend. Research consistently finds self-compassion more effective than self-criticism at motivating improvement, sustaining effort, and protecting wellbeing."],
      ["Working with the inner critic", "Several practical approaches to the inner critic are supported across therapeutic models.\n\nExternalising: giving the critic a name, an image, or a voice separate from the self — treating it as a part rather than as the whole self speaking truth. When the critic is externalised, it can be observed rather than automatically obeyed. What does it sound like? Whose voice is it? What age does it feel? When does it get loudest?\n\nNoticing the trigger: the critic is often dormant until a specific class of situations activates it. Identifying the triggers — failure, visibility, need, vulnerability, comparison — reveals the specific fears it is managing. The trigger is often the exact situation in which the person most needs kindness and least receives it internally.\n\nTracking the physical experience: the inner critic has a bodily signature — often a contraction, a heaviness, a tightening, a change in posture. Noticing the bodily experience of the critic’s arrival creates a small but significant space between the critic and the self.\n\nThe self-compassion break: Neff’s three-step practice specifically interrupts the critic’s loop. This is a moment of suffering (mindfulness). Suffering is part of life (common humanity). May I be kind to myself (self-kindness). Each step addresses one of the critic’s maintaining conditions: the isolation (others manage fine), the identification (this is what I am), and the harshness (I deserve this).\n\nThe friend question: what would you say to a close friend who had done the same thing, made the same mistake, or experienced the same failure? Most people would not speak to a friend the way the inner critic speaks to them. Noticing the discrepancy is itself therapeutic — it reveals that the standard being applied to the self is one that would be regarded as cruel if applied to someone else."],
      ["Reference", "Gilbert, P. (2009). The compassionate mind. Constable. | Neff, K. (2011). Self-compassion. William Morrow. | Schwartz, R.C. (2021). No bad parts. Sounds True. | Young, J.E., Klosko, J.S. & Weishaar, M.E. (2003). Schema therapy. Guilford Press. | Johnson, S.M. (1994). Character styles. Norton. | Stone, H. & Stone, S. (1993). Embracing your inner critic. HarperOne."]
    ]
  },
  attachmentpractice: {
    title: "Attachment in Practice",
    badge: "Attachment in Practice",
    bc: "bg-rose-50 border-rose-200",
    tc: "bg-rose-100 text-rose-700",
    body: "The Internal Working Models entry in this library describes the theory and research foundations of attachment. This entry translates that theory into recognisable everyday experience — what secure, anxious, avoidant, and disorganised attachment actually look like in adult relationships, how they feel from the inside, and how they interact with each other. For most people, recognising their own pattern in concrete behavioural terms is the beginning of the real work.",
    secs: [
      ["Secure attachment in practice", "Securely attached adults — whether through original secure experience or earned security — tend to have relationships that feel fundamentally different from the other three patterns.\n\nIn relationship: they can ask for what they need without catastrophising. They can tolerate disagreement without it feeling like the end of the relationship. They can repair after conflict — acknowledge their part, hear the other person’s experience, and reconnect. They are generally comfortable with intimacy without losing themselves, and comfortable with separateness without anxiety.\n\nUnder stress: they can reach for support without feeling that needing it is shameful or dangerous. They can regulate independently when support is not available and co-regulate when it is. They do not tend to interpret ambiguous signals from partners as evidence of abandonment.\n\nIn conflict: they can stay curious about what the other person is experiencing. They can hold their own perspective and the other person’s perspective simultaneously. They repair more easily than other patterns because repair does not require the global reassessment of the relationship’s safety.\n\nToward earned security: secure functioning is available to people who were not securely attached in childhood. The evidence from Main’s research is clear: processing one’s own history, understanding the patterns, and having sustained safe relational experience moves the attachment organisation toward security. It is earned, not given — but it is genuinely available."],
      ["Anxious attachment in practice", "Anxiously attached adults — with a negative self-model and positive other-model — tend to experience relationships as simultaneously vital and unreliable.\n\nIn relationship: they need significant amounts of reassurance but tend not to find it satisfying for long. The reassurance produces temporary relief but does not touch the underlying belief. They monitor their partner’s emotional state and availability with high sensitivity — picking up on the smallest shifts in mood, tone, or attention. They tend to interpret ambiguous signals negatively.\n\nUnder stress: they pursue contact and reassurance, often intensely. The hyperactivated attachment system drives approach behaviour — more contact, more checking, more seeking confirmation. Protest behaviour (tears, anger, increased demands) is the attachment system’s way of demanding a response from an unavailable figure.\n\nIn conflict: they can become flooded quickly. The conflict feels like evidence of their worst fears — that the relationship is at risk, that the partner is withdrawing. They may pursue resolution before they have access to their regulated Adult. Repair is important to them but can be complicated by the residue of flooding.\n\nWith an avoidant partner: anxious and avoidant attachment are a common pairing, partly because each activates the other’s core fear. The anxious person’s pursuit activates the avoidant person’s withdrawal. The avoidant person’s withdrawal activates the anxious person’s pursuit. The cycle is self-maintaining and can be difficult to exit without both partners understanding what is happening.\n\nThe underlying wound: often a history of inconsistent caregiving — the caregiver was available and warm sometimes, but unpredictably so. The child’s attachment system remained chronically activated because availability was never reliable enough to allow relaxation."],
      ["Avoidant attachment in practice", "Avoidantly attached adults — with a positive self-model and negative other-model — tend to experience relationships as involving a tension between wanting connection and feeling threatened by it.\n\nIn relationship: they tend to value independence and self-sufficiency. They are often described by partners as emotionally unavailable, difficult to reach, or not really present in the relationship. They may struggle to identify or express emotional needs — not necessarily as a choice but because the connection to those needs has been reduced through the deactivating strategies developed in childhood.\n\nUnder stress: they tend to withdraw rather than seek contact. The deactivating attachment system reduces awareness of need and pulls toward self-reliance. They may find their partners’ need for reassurance or emotional engagement overwhelming or irrational.\n\nIn conflict: they often withdraw or shut down. The flooding that anxious partners experience, avoidant partners experience as a need to exit. They may need time alone to regulate before they can engage productively. This timing mismatch — the anxious partner needing immediate reconnection, the avoidant partner needing space — is one of the most common sources of escalation in anxious-avoidant partnerships.\n\nThe underlying wound: often a history of consistent but emotionally unavailable caregiving — the caregiver was reliably present in a physical and practical sense but was not emotionally responsive or was dismissive of emotional expression. The child learned to deactivate their attachment needs to maintain the relationship with a caregiver who did not respond to them."],
      ["Disorganised attachment in practice", "Disorganised attachment — which develops when the caregiver is simultaneously the source of threat and the source of comfort — produces a pattern that does not have a coherent strategy in the way secure, anxious, and avoidant do.\n\nIn relationship: the person may alternate between intense pursuit and sudden withdrawal, between deep trust and sudden fear, between openness and complete closure. Relationships can feel chaotic from the inside — the person genuinely does not know from moment to moment what they need or what they fear. They may be most activated by exactly what they most want — closeness, safety, being truly known.\n\nUnder stress: both attachment system activation and defensive shutdown can occur simultaneously or in rapid alternation. The person may approach and then freeze at the point of contact. Or they may pursue intensely and then become frightened by the closeness they pursued.\n\nIn conflict: conflict can be particularly dysregulating because it activates both the fear system and the attachment system simultaneously — the same combination that was present in the early environment where conflict meant both threat and the loss of the needed other. The window of tolerance for conflict can be very narrow.\n\nThe underlying wound: the caregiver was frightening — either through direct threat (abuse, unpredictable aggression) or through frightened behaviour (a parent in their own dissociative or trauma state who communicated fear without source). The child’s neurobiological predicament: the only solution to the fear is to approach the source of the fear. There is no coherent resolution to this dilemma, which is why the resulting pattern is described as disorganised."],
      ["How the patterns interact", "Understanding how different attachment patterns interact in relationships helps make sense of the otherwise puzzling dynamics that can feel impossible to exit.\n\nAnxious-avoidant: the most common clinical pairing. The anxious person’s need for closeness activates the avoidant person’s need for space. The avoidant person’s need for space activates the anxious person’s fear of abandonment. Each partner’s response is perfectly designed to trigger the other’s worst fear. Both are doing exactly what their nervous system learned to do. Neither is wrong. Both are suffering.\n\nAnxious-disorganised: the anxious person’s pursuit meets a pattern that is itself unpredictable — close and then suddenly gone, warm and then suddenly frightening. This can produce escalating anxiety in the pursuer and increasing chaos in the system.\n\nTwo avoidants: often described as parallel, comfortable, and distant. Both have learned to manage their attachment needs through self-sufficiency. The relationship can feel peaceful and also slightly hollow — the genuine intimacy that requires vulnerability is avoided by both.\n\nTwo anxious: high intensity, high reassurance-seeking, potential for mutual escalation under stress. The relationship can be very warm and also very volatile.\n\nThe good news: attachment patterns are not fixed. Sustained experience in a relationship with a different pattern — whether therapeutic, romantic, or friendship — can update the internal working model. The process takes time and is not linear. But the research on earned security establishes clearly that it is possible."],
      ["Reference", "Ainsworth, M.D.S. et al. (1978). Patterns of attachment. Erlbaum. | Main, M. & Solomon, J. (1986). Discovery of an insecure disorganised/disoriented attachment pattern. In T. Brazelton & M. Yogman (Eds.), Affective development in infancy. Ablex. | Levine, A. & Heller, R. (2010). Attached. Tarcher/Penguin. | Johnson, S.M. (2008). Hold me tight. Little, Brown. | Wallin, D.J. (2007). Attachment in psychotherapy. Guilford Press."]
    ]
  },
  somatic: {
    title: "Somatic Therapy",
    badge: "Somatic",
    bc: "bg-teal-50 border-teal-200",
    tc: "bg-teal-100 text-teal-700",
    body: "Somatic therapy is the collective term for approaches to healing that begin with the body rather than the mind. Where cognitive and verbal therapies work top-down — using thought, insight, and language to influence feeling and behaviour — somatic therapies work bottom-up, using awareness of body sensation, movement, breath, and physiological state to access and update material that verbal processing cannot reach. The rationale is not that talking is useless but that trauma, early relational experience, and the implicit memory of both are stored in the body at a level that precedes language — and that lasting change therefore requires engagement at that level.",
    secs: [
      ["Why the body — the case for bottom-up processing", "The case for somatic approaches rests on several converging lines of evidence.\n\nThe neuroscience of trauma encoding: as the memory entry in this library describes, traumatic experience is primarily encoded in implicit memory — in the amygdala, the body, the nervous system — rather than in the hippocampal narrative system. Implicit memory is procedural and somatic. It lives in the body’s responses, not in the story the mind can tell about it. Accessing and updating implicit memory requires engaging the systems in which it is stored.\n\nThe body as the site of the stress response: the fight, flight, and freeze responses are physiological events. The survival impulses that were mobilised and could not complete — the run that did not happen, the fight that was suppressed, the freeze that became chronic — are stored in the body as incomplete motor sequences and as patterns of held tension, restricted breath, and chronic activation or shutdown. Peter Levine’s observation from his study of animals: animals in the wild discharge the physiological activation of threat through spontaneous trembling and shaking after the danger passes. Humans, with our capacity for self-consciousness and social inhibition, interrupt this discharge — and the activation remains stored.\n\nBessel van der Kolk’s research: van der Kolk’s neuroimaging work demonstrated that when trauma survivors recalled traumatic events, Broca’s area — the brain’s primary language production centre — went offline. The body activated. The body’s response was present; the words were not. This is the physiological explanation for why trauma survivors often cannot speak about what happened, not as a psychological defence but as a literal neurological reality in the moment of activation. You cannot narrate what Broca’s area cannot produce.\n\nThe limitations of top-down alone: insight without somatic change produces understanding that does not transfer to the activated state. A person can know every schema, every attachment pattern, every polyvagal principle — and still freeze, fawn, or fight when their body is activated, because the body has not updated its pattern. The cognitive change and the somatic change need to happen together for durable transformation."],
      ["The felt sense — Gendlin and Focusing", "Eugene Gendlin, working with Carl Rogers in the 1960s, made an important observation: therapy outcome could be predicted from the first session by listening to how clients spoke about their experience. Those who went on to improve spoke with hesitation, reaching for words, checking internally against something — as if consulting a bodily sense of the matter that was just ahead of language. Those who did not improve spoke fluently and smoothly, reporting on their experience from outside it.\n\nGendlin called this internal bodily referent the felt sense — a whole, unclear, pre-verbal sense of a situation or issue that is felt in the body before it becomes thought or language. It is not an emotion (though it includes emotional quality). It is not a thought (though it generates them). It is a holistic, composite sense of something’s meaning that is available to attention in the body.\n\nFocusing is the practice Gendlin developed to help people access and work with the felt sense deliberately. The key moves: coming to an internal space of not-knowing; finding in the body a sense of a particular issue; approaching it with gentle curiosity rather than analysis; waiting for a word, image, or phrase that fits; noticing the bodily shift (what Gendlin called the felt shift) when the right description arrives.\n\nThe felt shift is the somatic signal that something has moved. It is a slight release, a softening, a change in the quality of the bodily sense — and it is reliably accompanied by a sense of something being recognised rather than merely thought. This is bottom-up processing: the body leading the mind, rather than the mind analysing the body from a distance."],
      ["Peter Levine and Somatic Experiencing", "Somatic Experiencing (SE), developed by Peter Levine over four decades, is the most systematically developed of the body-first trauma therapies. Its entry in this library describes the method. Here the focus is on its underlying rationale.\n\nLevine’s core observation, derived from his study of predator-prey dynamics: prey animals that are caught and then released do not develop trauma. They spontaneously discharge the mobilised survival energy through trembling and shaking, return to regulated baseline, and resume normal functioning. The tiger does not develop PTSD. The human often does — and the difference is not the experience of threat but the completion or incompletion of the physiological discharge.\n\nTrauma, in Levine’s model, is not the event but the incomplete biological response to the event — the survival energy that was mobilised and then frozen in the body when neither fight nor flight was possible or permitted. Healing involves completing the incomplete response: allowing the body to finish the defensive movement, discharge the held activation, and return to regulated baseline.\n\nTitration and pendulation: SE works with small amounts of activation (titration — taking manageable sips rather than flooding doses) and oscillates between tracking the traumatic activation and returning to resources (pendulation — moving between constriction and expansion, between activation and settling). This protects against retraumatisation, which is the risk of approaches that flood the person with traumatic material before the nervous system has the capacity to process it.\n\nThe vortex: Levine describes two vortices — the trauma vortex (the pull into the traumatic activation, the constriction and overwhelm) and the healing vortex (the resources, the aliveness, the capacity for expansion and pleasure). Healing involves building the healing vortex until it is strong enough to begin integrating material from the trauma vortex."],
      ["Pat Ogden and Sensorimotor Psychotherapy", "Pat Ogden’s Sensorimotor Psychotherapy (SP) integrates body-centred awareness with attachment theory and trauma processing. Where SE focuses primarily on the completion of thwarted survival responses, SP extends to the full range of body-based patterns that develop in the context of early relational experience.\n\nThe body tells the attachment story: Ogden observes that the body reflects the internal working model. The collapsed, contracted posture of the avoidantly attached person; the hypervigilant scanning of the anxiously attached; the frozen stillness of the disorganised. These are not just metaphors for psychological states. They are the physical form of the implicit relational template — the body’s enactment of what it has learned about safety, connection, and threat in relationship.\n\nSP works with what it calls somatic resources — the body’s own capacity for grounding, centering, and reaching. Noticing when the posture is collapsed and what happens when it is gently straightened. Feeling the contact with the floor. Noticing the impulse to reach or to turn away. Tracking what happens in the body when the therapist moves slightly closer or further. The body is the direct access point to the implicit relational knowing — and changing the body’s habitual postures, gestures, and responses is a way of updating the implicit model that the body carries.\n\nSP is particularly relevant to developmental trauma — the relational trauma of early caregiving — because the body’s patterns were formed in the relational context and need to be updated in a relational context. The therapeutic relationship is not just the container for the somatic work; it is the instrument of it."],
      ["Interoception — listening to the body", "Interoception is the perception of sensations arising from inside the body — heartbeat, breath, gut movement, temperature, muscle tension, the felt sense of emotional states. It is the body’s internal sensory system, distinct from exteroception (the senses directed outward) and proprioception (the sense of the body’s position in space).\n\nResearch by Antonio Damasio established that interoceptive awareness is essential to emotional processing and decision-making. His somatic marker hypothesis: the body generates somatic markers — felt bodily signals — that guide decision-making before conscious reasoning engages. People with damage to the interoceptive cortex (the insula) make consistently poor decisions and have difficulty registering emotional experience — because they cannot read the body’s signals.\n\nTrauma and interoceptive disruption: trauma survivors often show disrupted interoception — either hyperawareness of bodily sensation (the hypervigilant tracking of every physical signal as potential threat) or hypoawareness (numbness, disconnection from the body, alexithymia — the inability to identify one’s own emotional states). Both are adaptations to the unbearable quality of the body’s signals during and after traumatic experience.\n\nRestoring interoceptive awareness is a central task in somatic work. Not flooding the person with bodily sensation before they have the capacity to stay present with it — but gradually, titrated, developing the capacity to feel what is happening inside without being overwhelmed by it. This is what is sometimes called dual awareness or the observer position: the capacity to feel and to witness the feeling simultaneously.\n\nYoga, mindful movement, and body scan practices all develop interoceptive awareness. They are not peripheral to therapy. For people with significant interoceptive disruption, they may be its foundation."],
      ["The somatic approaches in this library", "This library contains dedicated entries for three somatic approaches, each of which represents a distinct development within body-first therapy. They are best understood in relation to each other.\n\nSomatic Experiencing (SE — Levine): primarily focused on completing thwarted survival responses and discharging frozen activation. The most biologically grounded of the three, drawing directly on the ethology of predator-prey trauma responses. Best suited to shock trauma — single-incident or accumulated experience in which the survival response was mobilised and could not complete.\n\nTension and Trauma Releasing Exercises (TRE — Berceli): a self-directed approach using a sequence of exercises that invoke the body’s own natural trembling mechanism. The tremor is not added from outside — it is activated from within by fatiguing the psoas and hip flexors, which are the muscles most involved in the curling, protective response of extreme threat. The trembling then moves up through the body, releasing held tension. TRE is accessible, self-directed, and requires no therapist, making it particularly relevant as a between-session resource and for contexts where clinical support is limited.\n\nBrainspotting (BSP — Grand): uses the relationship between eye position, visual field, and subcortical processing to locate and process traumatic material held below the level of language. The therapist helps the client find a brainspot — an eye position that activates a relevant somatic response — and then holds presence while the client processes what arises. BSP bridges body-based and relational approaches, using the therapist’s attunement as an active part of the processing.\n\nAll three share the fundamental premise of somatic therapy: the body is not the background to psychological experience. It is the primary site of it — and the road to healing runs through it."],
      ["Reference", "Van der Kolk, B. (2014). The body keeps the score. Viking. | Levine, P.A. (1997). Waking the tiger. North Atlantic Books. | Levine, P.A. (2010). In an unspoken voice. North Atlantic Books. | Ogden, P., Minton, K. & Pain, C. (2006). Trauma and the body. Norton. | Gendlin, E.T. (1978). Focusing. Everest House. | Damasio, A. (1994). Descartes\u2019 error. Putnam. | Berceli, D. (2007). The revolutionary trauma release process. Namaste Publishing."]
    ]
  },
  existential: {
    title: "Existential Therapy",
    badge: "Existential",
    bc: "bg-slate-50 border-slate-300",
    tc: "bg-slate-200 text-slate-700",
    body: "Existential therapy does not trace suffering to diagnosis, early conditioning, or the unconscious alone. It traces it to the conditions of human existence itself — to the inescapable facts of being alive: that we will die, that we are free and therefore responsible, that we are ultimately alone in our subjectivity, and that there is no inherent meaning waiting to be discovered. These are not problems to be solved. They are the given conditions within which every human life is lived. The task of existential therapy is not to eliminate anxiety about these realities but to help the person face them honestly, choose their response to them, and live with greater authenticity and depth as a result.",
    secs: [
      ["Irvin Yalom’s four ultimate concerns", "Irvin Yalom, whose work made existential therapy accessible to a broad clinical and general audience, organised the existential challenges into four ultimate concerns — what he called the givens of existence. Each produces its own characteristic anxiety, and each appears as a central theme in the clinical encounter.\n\nDeath: the awareness that we will die — and that everyone we love will die — is the most fundamental existential given. Yalom argues that much of what presents as anxiety, urgency, avoidance, or compulsive striving is existential death anxiety in disguise. The mid-life crisis, the obsessive pursuit of legacy, the terror of ageing, the inability to be present — all can be understood as strategies for managing the awareness of mortality. The therapeutic task is not to reduce death anxiety but to allow it to be faced — because facing death, paradoxically, is what allows life to be fully lived. Yalom’s clinical observation: nothing focuses the mind on what genuinely matters like the direct encounter with one’s own finitude.\n\nFreedom: human beings are radically free — condemned to choose, as Sartre put it. There is no essential nature, no predetermined destiny, no external authority that determines what we must do or who we must be. This freedom is terrifying because it means we are responsible for our choices, our lives, and the consequences of both. Bad faith — Sartre’s term — is the denial of this freedom: the claim that we had no choice, that we were forced, that we are simply who we are and cannot be otherwise. Existential therapy confronts bad faith with the question: in what ways are you choosing this, and what would you choose if you allowed yourself to choose freely?\n\nIsolation: however loved, however connected, each person inhabits a subjectivity that no one else can fully enter. We are born alone into our experience and we die alone. Even in the most intimate relationship, there is an irreducible gap. Existential isolation is not loneliness — it is the ontological condition of separate consciousness. The therapeutic task is not to close this gap (it cannot be closed) but to be able to be present with it, and to discover that genuine connection is possible even across it — that two separate islands can build a bridge.\n\nMeanlessness: the universe has no inherent meaning. Meaning is not discovered — it is created. But if meaning must be created, then nothing is guaranteed, and the effort of creation requires sustained commitment without external validation. Yalom describes the therapeutic task as helping people construct meaning that is genuinely their own — not the meaning handed down by family, culture, or religion, but meaning chosen and lived from the inside."],
      ["Existential anxiety versus neurotic anxiety", "Rollo May, whose 1950 book The Meaning of Anxiety established existential approaches in American psychology, drew a crucial clinical distinction between existential anxiety and neurotic anxiety.\n\nExistential anxiety (sometimes called ontological anxiety or angst) is the normal, unavoidable anxiety of being human. It arises from freedom, from uncertainty, from the awareness of death and limitation. It is not a symptom. It is the appropriate response to the actual conditions of existence. Attempting to eliminate it entirely is both impossible and counterproductive — it is the suppression of existential anxiety that produces the neurotic forms.\n\nNeurotic anxiety is existential anxiety that has been displaced, distorted, and made chronic through the strategies we use to avoid facing the underlying existential truths. Phobias, compulsions, addictions, the pursuit of certainty, conformity, busyness — all can be understood as strategies for avoiding the rawness of existential anxiety. The symptom is preferable to the existential confrontation it conceals.\n\nMay’s therapeutic implication: the task is not to reduce all anxiety but to distinguish existential anxiety from neurotic anxiety and to help the person face the former more directly. When existential anxiety can be borne — when death, freedom, isolation, and meaninglessness can be held with honest awareness — the neurotic strategies become less necessary. The symptom is the failed attempt to solve an existential problem with a psychological fix.\n\nThe daimonic: May also described what he called the daimonic — the elemental urges, drives, and energies (including aggression, sexuality, and the will to power) that are part of the natural human endowment and that produce destructiveness when denied or suppressed, but creativity and vitality when integrated. The daimonic is not the Freudian unconscious, though it overlaps with it. It is the raw life-force that needs form, direction, and conscious integration rather than repression."],
      ["Thrownness, facticity, and the three worlds", "Existential philosophy developed several concepts that have direct clinical utility. These emerged primarily from Martin Heidegger’s analysis of Dasein — being-in-the-world — and were developed into therapeutic applications by Heidegger’s contemporary Ludwig Binswanger and later by Emmy van Deurzen and Ernesto Spinelli.\n\nThrownness: we did not choose to be born, did not choose our bodies, families, culture, historical moment, or temperament. We are thrown into an existence we did not design, with givens we did not select. The awareness of thrownness — of the unchosen conditions that form the starting point of our existence — can produce either despair (I am trapped by what was given) or a particular kind of freedom (given that this is my starting point, what will I make of it from here?). Acceptance of thrownness is not resignation. It is the realistic starting point for authentic choice.\n\nFacticity: the concrete facts of a person’s existence — their body, their history, their social location, their relationships, their material circumstances. The tension in existential therapy is between facticity (what is given and cannot be changed) and transcendence (the freedom to respond to what is given). Authentic existence holds both: neither denying facticity through magical thinking nor denying transcendence through determinism.\n\nThe three worlds: van Deurzen describes human existence as occurring across three simultaneous worlds. The Umwelt (around-world): the physical, biological, natural dimension of existence — the body, the environment, birth, death. The Mitwelt (with-world): the social, relational dimension — how we exist with others, our roles, our relating. The Eigenwelt (own-world): the relationship with oneself — the inner world, the sense of self, the private experience that only I inhabit. Authentic existence requires attention to all three. Much clinical suffering involves the neglect or distortion of one dimension at the expense of the others."],
      ["Authenticity and bad faith", "Jean-Paul Sartre’s concept of bad faith describes the universal human tendency to deny our freedom by treating ourselves as if we were things — objects with fixed natures, determined by our roles, our histories, our character, or external forces.\n\nBad faith looks like: I have no choice in this matter. That is just who I am. I cannot help it. They made me this way. I must do this because of my role. It excuses behaviour, forecloses growth, and treats the person as an object moving through a predetermined channel rather than a subject continuously choosing within conditions.\n\nAuthenticity is the alternative: the willingness to acknowledge freedom and to choose consciously, including the choice to acknowledge choices that are difficult or uncomfortable. It does not mean doing whatever one wants. It means choosing with full awareness that one is choosing — including when one chooses to fulfil obligations, maintain commitments, or accept limits.\n\nThe clinical application: many of the relational patterns in this app involve elements of bad faith — the claim that one cannot set limits (I have to help, I cannot say no), that one cannot speak honestly (I must keep the peace), that one cannot change (I have always been like this). The existential perspective does not bypass the developmental and neurobiological accounts of why these patterns formed. It adds the layer of freedom: given that these patterns developed as they did, in what ways is the person now choosing to continue them?\n\nBad faith and self-compassion are not contradictory. The patterns developed for excellent reasons in difficult conditions. And the person retains freedom to respond differently — slowly, supported, and without self-blame — now. The existential challenge is not guilt but possibility."],
      ["Death awareness as a therapeutic resource", "Yalom’s most distinctive contribution to clinical practice is his argument that the direct confrontation with mortality — one’s own or another’s — is not only unavoidable but therapeutically valuable. He calls these encounters awakening experiences.\n\nA serious diagnosis, the death of someone close, a significant birthday, a natural disaster, a near-miss — any direct collision with the reality of death can produce what Yalom describes as a ripple effect: a reassessment of what matters, a shedding of the trivial, a renewed capacity for presence, a willingness to take the risks that had been indefinitely postponed.\n\nYalom draws on Heidegger’s concept of being-toward-death: the authenticity that becomes available when death is held in awareness rather than denied. The person who lives with conscious awareness of their mortality tends to choose more deliberately, to be more present, to invest in what genuinely matters rather than what seems urgent, and to be less vulnerable to what others think because the awareness of death relativises social comparison.\n\nThe clinical use of death awareness is not morbid. It is clarifying. Yalom’s famous question to patients who are avoiding a difficult conversation or a necessary change: if you were going to die in a year, would you make this same choice? The question does not always produce an immediate shift. But it locates the choice in its actual existential context — a life that is finite, therefore precious, therefore deserving of honesty."],
      ["Existential themes in the relational patterns", "Existential themes are present in almost every relational pattern, though they are often obscured by the psychological and neurobiological accounts that more immediately explain the pattern’s form.\n\nThe anxious pattern and death anxiety: the anxious attachment pattern is partly a response to the existential threat of isolation — the terror of being left alone with one’s own separate consciousness, which the hyperactivated attachment system equates, at some primal level, with death. The therapy that addresses only the schema and the nervous system response leaves the existential dimension untouched.\n\nThe fawn response and bad faith: the systematic suppression of authentic preference, need, and reaction in service of what others require is bad faith in its most thorough form. The fawning person has agreed, consciously or not, to treat themselves as an object whose function is determined by others’ needs. Existential work asks: who are you beneath the accommodation? What would you choose if the choice were genuinely yours?\n\nThe perfectionist and freedom: the perfectionist is often fleeing the existential terror of freedom — the recognition that there is no standard that will finally be good enough, no achievement that will settle the question of worth, no external validation that will replace the internal choice to regard oneself as acceptable. Perfectionism is a strategy for deferring the existential moment of self-acceptance indefinitely, always just over the next achievement.\n\nMeaning and the relational patterns: many people arrive in therapy not because something is wrong but because something is empty. Their life functions well by external measures and feels hollow internally. This is what Yalom calls the existential vacuum — the experience of meaninglessness that arrives when the strategies for managing it (busyness, consumption, conventional goals) no longer work. The task is not to provide meaning but to help the person create it."],
      ["Reference", "Yalom, I.D. (1980). Existential psychotherapy. Basic Books. | Yalom, I.D. (2008). Staring at the sun: Overcoming the terror of death. Jossey-Bass. | May, R. (1950). The meaning of anxiety. Ronald Press. | May, R. (1969). Love and will. Norton. | Sartre, J-P. (1943). Being and nothingness. Gallimard. | Heidegger, M. (1927). Being and time. Niemeyer. | van Deurzen, E. (2010). Everyday mysteries. Routledge. | Frankl, V.E. (1959). Man’s search for meaning. Beacon Press."]
    ]
  },
  transpersonal: {
    title: "Transpersonal Psychology",
    badge: "Transpersonal",
    bc: "bg-indigo-50 border-indigo-200",
    tc: "bg-indigo-100 text-indigo-700",
    body: "Transpersonal psychology is the branch of psychology that extends its inquiry beyond the personal — beyond the individual ego and its history — to include experiences of connection with something larger than the self: the numinous, the mystical, states of expanded awareness, and the domain of meaning, purpose, and spiritual experience. It was formally established in the late 1960s by Abraham Maslow, Stanislav Grof, and Anthony Sutich, who felt that mainstream psychology, even at its humanistic best, was not equipped to account for the full range of human experience. For many people in therapy, the most pressing questions are not only psychological but existential: Who am I beyond my patterns? What does this suffering mean? How do I live in the face of what I cannot control? Transpersonal psychology takes these questions seriously as clinical material.",
    secs: [
      ["Abraham Maslow — peak experiences and self-transcendence", "Abraham Maslow, who also founded humanistic psychology, first used the term transpersonal in the 1960s to describe experiences that go beyond the personal identity — moments in which the ordinary sense of self temporarily dissolves or expands into something larger.\n\nMaslow called these peak experiences: moments of profound awe, beauty, unity, or meaning that arrive unbidden and produce a felt sense of being in contact with something greater than ordinary personal experience. They can occur in response to nature, music, love, childbirth, meditation, prayer, grief, or encounter with death. They share certain characteristics: timelessness, a sense of wholeness, reduced self-consciousness, intrinsic meaning, and a quality of being simultaneously ordinary and extraordinary.\n\nMaslow extended his hierarchy of needs to include a level beyond self-actualisation: self-transcendence, in which the person’s motivation shifts from personal fulfillment to service of something beyond the self — a cause, a community, a spiritual reality. This is not escape from the self but the natural development of a self that has become secure enough to move beyond its own needs as the primary organising principle.\n\nThe clinical relevance: peak experiences are not pathological. They are often among the most significant experiences of a person’s life. A psychology that cannot receive them — that explains them away or pathologises them — loses contact with some of the most healing material a person brings to the work."],
      ["Stanislav Grof — non-ordinary states of consciousness", "Stanislav Grof’s contribution to transpersonal psychology grew from his research in the 1950s and 60s with LSD-assisted psychotherapy, later extended to the non-pharmacological technique he developed with his wife Christina called holotropic breathwork.\n\nGrof mapped the territory of non-ordinary states of consciousness — states produced by psychedelics, breathwork, meditation, fasting, hypnosis, near-death experiences, or spontaneous spiritual emergence — and found that they followed recognisable patterns that he organised into what he called the Basic Perinatal Matrices (BPM): stages of experience that appeared to correspond to the psychological experience of birth and that provided a framework for understanding the deep, pre-verbal material that ordinary verbal therapy could not reach.\n\nGrof identified four matrices ranging from the undifferentiated oceanic bliss of pre-birth experience through the constriction and agony of the birth passage to the breakthrough and expansion of emergence. He found that people reliably encountered biographical material, transpersonal content (experiences of unity, past lives, archetypal encounters), and perinatal themes in non-ordinary states, and that processing this material produced lasting therapeutic change.\n\nSpiritual emergency: Christina and Stanislav Grof developed the concept of spiritual emergency to describe what happens when the transpersonal dimension of experience breaks through without adequate preparation or support — appearing as a mental health crisis but actually representing a developmental process. Properly supported, what looks like a breakdown becomes a breakthrough. The crisis is the healing if it can be held with understanding rather than suppressed with medication alone.\n\nContemporary relevance: Grof’s work provides the theoretical foundation for contemporary psychedelic-assisted therapy research (MDMA for PTSD, psilocybin for depression and end-of-life anxiety), which has produced some of the most striking therapeutic outcome data in decades."],
      ["Carl Jung and the transpersonal unconscious", "Carl Jung can be regarded as the first depth psychologist to take transpersonal experience seriously as clinical material. His concept of the collective unconscious — a layer of the unconscious that is shared across humanity and expressed through universal symbols and patterns he called archetypes — is inherently transpersonal: it points to a dimension of psychic experience that is not personal history but something larger and older.\n\nJung’s archetypes — the Shadow, the Anima/Animus, the Self, the Great Mother, the Trickster, the Hero — are not just theoretical constructs. They are the living patterns that appear in dreams, symptoms, myths, religious imagery, and cultural expression across all cultures and historical periods. Encountering an archetype in the clinical encounter has a different quality from encountering a schema or a part: it feels numinous — charged with a quality of the sacred or the overwhelming.\n\nIndividuation: Jung’s term for the developmental process of becoming more fully oneself — integrating the Shadow (the disowned and rejected aspects of the self), making conscious what was unconscious, and moving toward the wholeness represented by the archetype of the Self. Individuation is the transpersonal equivalent of what IFS calls Self-leadership and what neuroplasticity research calls integration.\n\nSynchronicity: Jung’s concept of meaningful coincidence — events in the external world that coincide with internal psychological significance without causal connection. Whether understood literally or as a way of describing the meaning-making capacity of the psyche, synchronicity points to the person’s experience of being embedded in something larger than the mechanical causality of ordinary life.\n\nThe shadow in clinical work: Jung’s shadow is the most directly useful concept for relational pattern work. Everything the person cannot accept about themselves — the rage, the selfishness, the envy, the sexuality, the neediness — goes into the shadow and is projected onto others. Shadow integration is the recognition and reclamation of what was disowned: the anger that belongs to the person who calls themselves calm, the neediness that belongs to the person who calls themselves self-sufficient."],
      ["Roberto Assagioli — Psychosynthesis", "Roberto Assagioli, a contemporary of Freud and Jung, developed Psychosynthesis in the early twentieth century as a psychology that included both the depths of the unconscious and the heights of transpersonal experience. Where Freud mapped the lower unconscious (the repressed, the instinctual) and Jung extended to the collective unconscious, Assagioli added the superconscious: the region of the psyche that contains the higher human functions — creativity, inspiration, love, will, spiritual aspiration.\n\nThe egg diagram: Assagioli represented the psyche as an egg-shaped field containing three levels of unconscious (lower, middle, superconscious) surrounding a personal self at the centre, and a higher Self above and beyond the egg. The therapist’s task is to help the person develop a stable, observing I — the personal self — from which the whole field can be explored without being overwhelmed by any part of it.\n\nSubpersonalities: Assagioli’s concept anticipates IFS by several decades. He identified subpersonalities — distinct autonomous complexes within the psyche, each with their own perspectives, motivations, and patterns — and proposed that psychological health involves their integration under the direction of the personal self. The subpersonalities of Psychosynthesis and the parts of IFS are different expressions of the same fundamental clinical observation.\n\nWill: Assagioli gave particular attention to the will — not as willpower in the ordinary sense but as the capacity of the I to orient, to choose, and to align with values rather than being pulled by impulse or habit. He distinguished the personal will from the transpersonal will: the alignment of the personal self with the deeper movement of the higher Self."],
      ["Spiritual bypassing", "John Welwood coined the term spiritual bypassing in 1984 to describe the use of spiritual practice to avoid psychological work — to sidestep rather than move through the difficulties of personal and relational development.\n\nSpiritual bypassing looks like: meditating away anger rather than understanding its source and addressing its cause; using non-attachment as a reason not to feel grief; using acceptance as a reason not to take action; using the idea of no-self to avoid developing a coherent self; using karma or surrender to explain away the effects of abuse; using unconditional love to stay in relationships that are harmful.\n\nWelwood was clear that the problem is not the spiritual practice but the use to which it is put. Mindfulness, acceptance, non-attachment, and compassion are genuinely healing capacities. But they are not substitutes for the work of meeting one’s own shadow, grieving genuine losses, setting limits with real people, or processing embodied trauma.\n\nThe clinical marker of spiritual bypassing: when spiritual language appears, does it expand the person’s contact with their experience or reduce it? Does the concept of acceptance help the person feel the grief — or replace the grief? Does the notion of non-attachment allow genuine equanimity — or preempt genuine care? The test is always whether the spiritual material is being used to feel more or to feel less.\n\nThe integration: the most potent therapeutic work often occurs at the intersection of psychological and transpersonal — when personal history is understood and metabolised, and spiritual resources are genuinely rather than defensively available. This is what the contemplative traditions describe as mature spiritual development: not the bypassing of the personal but the transformation of it."],
      ["Meaning, purpose, and Viktor Frankl", "Viktor Frankl, who survived Auschwitz, developed Logotherapy — a psychotherapy organised around the premise that the primary human motivational force is the search for meaning, not pleasure (Freud) or power (Adler). He described the will to meaning as the fundamental driver of human existence, and the experience of meaninglessness — what he called the existential vacuum — as the core of much modern suffering.\n\nFrankl identified three sources of meaning:\nCreative values: what we give to the world — our work, our creations, our contributions.\nExperiential values: what we receive from the world — love, beauty, truth, encounter.\nAttitudinal values: the stance we take toward unavoidable suffering. This is the deepest source. Even in conditions where all other freedom has been stripped away, the person retains the freedom to choose their attitude — to find meaning in the suffering itself, to bear witness to something, to refuse to be reduced to a function of their circumstances.\n\nFrankl’s observation from the camps: those who retained a sense that their suffering had meaning — even the negative meaning of refusal, of testimony, of love maintained — survived at higher rates than those who had lost all sense of purpose. This is not a comfortable observation, and Frankl was careful not to use it as a moral injunction. It is a clinical and empirical observation about the biology of meaning.\n\nThe transpersonal dimension of meaning: for many people, the most profound sources of meaning are transpersonal — connection with something larger than individual life: a spiritual reality, a community, a cause, a relationship with the sacred. Psychology that cannot speak to these dimensions leaves half the person unaddressed."],
      ["Reference", "Maslow, A.H. (1970). Religions, values, and peak experiences. Viking. | Grof, S. (1985). Beyond the brain. SUNY Press. | Grof, S. & Grof, C. (1989). Spiritual emergency. Tarcher. | Jung, C.G. (1960). The structure and dynamics of the psyche. Routledge. | Assagioli, R. (1965). Psychosynthesis. Hobbs, Dorman. | Welwood, J. (2000). Toward a psychology of awakening. Shambhala. | Frankl, V.E. (1959). Man’s search for meaning. Beacon Press. | Wilber, K. (2000). Integral psychology. Shambhala."]
    ]
