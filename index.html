    body: "relatz is a self-awareness tool for understanding relational patterns. It maps what is happening in you right now across nine steps — connecting body, story, belief, schema, part, attachment, and the early environment that shaped it. Open the library at any time. Use the app when something is activated in you.",

  polyvagal: {
    title: "Polyvagal Theory, Window of Tolerance and the Nervous System",
    badge: "Nervous System",
    bc: "bg-teal-50 border-teal-200",
    tc: "bg-teal-100 text-teal-700",
    body: "Your nervous system is not a reflection of your personality. It is a biological system built for survival that automatically scans the environment for safety or danger and shifts between states accordingly. Understanding which state you are in is the beginning of being able to work with it rather than against it.",
    secs: [["The three nervous system states", "Stephen Porges identified three distinct states of the autonomic nervous system, each with its own physiology, set of behaviours, and felt sense.\n\nVentral vagal — safe and social: The parasympathetic brake is on, the social engagement system is active. In this state: calm, curious, connected, able to communicate and receive. Empathy, creativity, play, and genuine rest are all available here. The face is expressive, the voice has prosody, the eyes soften. This is not a luxury state. It is the state in which healing, learning, and genuine relationship occur.\n\nSympathetic — mobilised: The accelerator is pressed. The body is prepared for action — fight or flight. In this state: anxiety, anger, urgency, panic, restlessness, the compulsive urge to do something. The body floods with adrenalin and cortisol. Heart rate rises, breathing becomes shallow and rapid, muscles tense, digestion shuts down. The mind narrows to threat detection and survival calculation. This state is appropriate and necessary in genuine danger. It becomes a problem when it is the chronic baseline.\n\nDorsal vagal — immobilised: The oldest part of the system. When the threat is perceived as inescapable — when neither fight nor flight is available — the nervous system collapses into shutdown. In this state: numbness, helplessness, deep fatigue, depression, dissociation, disconnection, flat affect. The body conserves energy. The mind goes elsewhere. This is not weakness. It is the most ancient survival mechanism available."], ["Mobilisation — what happens in the body", "When the sympathetic nervous system activates, a cascade of physiological changes occurs simultaneously and automatically. The limbic system alone manages approximately 50 hormones and responds to perceived threat within milliseconds.\n\nAdrenalin: Surges through the bloodstream within seconds, flooding muscles with glucose and oxygen ready for physical action. It causes the heart to beat faster, blood pressure to rise, and the large muscles to tense and ready. As the adrenalin is eventually reabsorbed, the body may feel shaky and dizzy — this is not a sign of collapse but of the chemical breaking down after the event. People vary in how much adrenalin they produce and how many adrenalin receptors they carry, which partly explains why the same situation produces very different physical responses in different people.\n\nCortisol: Follows adrenalin to sustain the stress response. Necessary in short bursts — it motivates, focuses, and provides energy. In excess, or when chronically elevated, cortisol becomes systematically toxic. It shuts down the immune system, suppresses the reproductive system (reducing testosterone and oestrogen), inhibits muscle and bone growth, impairs the hippocampus and thus memory formation, and has been linked to increased risk of diabetes, depression, cardiovascular disease, and reduced lifespan. At its most extreme, excess cortisol destroys neurons. The body was designed for brief activation followed by complete recovery — not for months or years of sustained mobilisation.\n\nBreathing and the brain: Stress shifts breathing into the upper chest — shallow, rapid, oxygen-inefficient. This changes the carbon dioxide and oxygen balance in the blood. Less carbon dioxide causes the arteries to tighten, reducing blood flow to the brain. The brain becomes foggy, vision may blur slightly, hearing may feel altered. Dizziness can follow. The brain simultaneously starts burning glucose rapidly to fuel the threat-response, which can produce sugar cravings and mental fatigue.\n\nThe heart: The heart pumps faster. The muscles surrounding the heart tighten with adrenalin — in some people producing chest pain and shooting sensations that are commonly and understandably mistaken for cardiac symptoms. They are not. They are the adrenalin-filled muscles around a heart that is working hard.\n\nDigestion: The digestive system is put on hold. Blood flow diverts away from the gut toward the large muscles needed for action. The deer being chased on the savannah empties its bladder and vomits stomach contents in order to run faster. In humans this translates to nausea, sudden urgency, vomiting, irritable bowel symptoms, and the gut problems that appear mysteriously in people under chronic stress. The gut also stops absorbing some nutrients efficiently — including potassium, which under sustained stress can deplete to dangerous levels. Chronic sympathetic activation produces chronic digestive problems that may seem to have no obvious cause.\n\nHands, feet and skin: Energy is redirected to the large muscles and away from the extremities. The hands and feet may go cold, tingly, numb, or sweaty. The skin may flush or pale. These are all signs of blood being redistributed — not signs that something is wrong beyond the activation itself.\n\nImmune system: Initially the immune system readies itself for rapid healing — an intelligent preparation for physical injury. But sustained on standby over time, it depletes. Research published in 2018 studied over a million people and found that those under severe sustained stress were 47% more likely to develop immune disorders. The immune system, like every other system, was not designed to remain on high alert indefinitely.\n\nThe Fix response: Alongside fight and flight there is a fifth response — sometimes called Fix. This is the compulsive urge to resolve, manage, over-function, over-prepare, and overwork. The nervous system mobilises toward the problem rather than away from it. It looks productive. The person appears to be coping. Underneath, the same hormonal cascade is running — adrenalin, cortisol, shallow breathing, gut disruption, immune depletion. Fix responses keep the body in mobilisation just as reliably as fight or flight. The body eventually pays the same cost.\n\nThe good news — oxytocin: When a stressful situation is perceived as a challenge rather than a threat — when there is some sense of agency, meaning, or social connection — a different hormonal response is possible. Oxytocin, sometimes called the love or courage hormone, is released. It widens the blood vessels to the heart rather than constricting them, counters the effects of cortisol, and actively heals stress-related cardiovascular effects. Keller and colleagues in 2011 studied over 30,000 people over eight years and found that people who believed stress was harmful had a 43% higher risk of early death than those who did not. The belief about the stress mattered as much as the stress itself. This is not toxic positivity — it is neuroscience."], ["Immobilisation — what it does to the body", "When the dorsal vagal system activates, the body moves into conservation mode. This is the state designed for situations where neither fight nor flight is available — where the threat is inescapable and action is futile.\n\nHormones: Adrenalin drops but cortisol may remain elevated or dysregulated. The system loses the capacity to modulate its own activation. The person feels neither the urgency of fight-flight nor the calm of safety — just a heavy, hollow flatness.\n\nDigestion: Gut function slows. Blood pressure drops. The body reduces all non-essential activity. Nausea, bloating, constipation, and poor nutrient absorption are common in chronic freeze states.\n\nMind: Dissociation is the cognitive signature of immobilisation. The mind detaches from the body, from the present moment, from clear thought. Memory becomes unreliable. Time loses its texture. People in chronic freeze states often describe feeling like they are watching their life from behind glass. The world is present but not felt.\n\nThe healing direction: Movement is the primary way out of freeze. The body went still to survive — it needs movement to signal that the threat has passed. Any movement — walking, shaking, stretching, the wall push — begins the transition back toward mobilisation and then toward regulation. This is why physical activation tools come before cognitive ones in trauma work."], ["The window of tolerance", "Dan Siegel described the window of tolerance as the zone within which the nervous system can process experience without becoming overwhelmed or shutting down. Within the window: present, flexible, able to think and feel simultaneously.\n\nAbove the window — hyperarousal: all the symptoms of chronic sympathetic activation. Anxiety, panic, rage, restlessness, sleeplessness, flooding, hypervigilance. Stuck on.\n\nBelow the window — hypoarousal: all the symptoms of chronic dorsal vagal activation. Numbness, disconnection, dissociation, fatigue, depression, flat affect. Stuck off.\n\nCrucially: it can take 12 to 24 hours to return fully to the window of tolerance after significant activation. Alcohol and substances may create a temporary felt sense of regulation — but they suspend the process rather than completing it. The adrenalin and cortisol are still metabolising. True regulation requires time, safety, and ideally the presence of another regulated nervous system.\n\nThe window can be widened over time through consistent therapeutic work, safe relational experience, and repeated regulation practice. A person whose window was narrow in childhood — who grew up in a state of chronic activation or shutdown — can develop a broader window as an adult. This is neuroplasticity in practice."], ["Glimmers and anchors — working with what is already there", "Deb Dana introduced the concept of glimmers to describe the small, often fleeting moments when the nervous system briefly touches the ventral vagal state — the state of safety, connection, and aliveness. They are the neurological opposite of triggers.\n\nA trigger activates the survival system. A glimmer does the reverse — something in the environment briefly produces a felt sense of safety, warmth, or genuine presence. Sunlight through a window. A particular smell. A piece of music. A dog. The quality of light in a specific season. Eye contact with a stranger that lands as kind. These moments can feel almost too small to mention — and that is precisely why they go unregistered.\n\nFor many people who have been in prolonged states of danger, glimmers can produce guilt or shame — a sense of the hands being slapped away from something not permitted. What is important to understand neurologically is that these moments are not self-indulgence. They are the nervous system giving itself a brief opportunity to surface from survival mode into safety. Each time that happens and is noticed, the ventral vagal pathway is exercised. Over time, this builds capacity.\n\nAnchors are small things that can reliably return the nervous system to a state of safety — sounds, smells, textures, objects, voices, physical sensations, memories. A breathing practice. A particular piece of music. The feeling of feet on ground. The smell of something associated with a safe time. Anchors do not resolve what is hard. They provide something to hold while navigating it.\n\nImportant: neither glimmers nor anchors are intended to fix or resolve. They are momentary surfacings — ways of catching breath between the difficult periods. That is enough. That is the work.\n\nPractice: Once a day, notice one glimmer. It does not need to be significant. It needs to be real. Stay with it for ten seconds — long enough for the body to register it. Over time this trains the nervous system to scan for safety as well as for threat, building the ventral vagal network from the inside out."], ["Co-regulation — nervous systems affect each other", "States of mobilisation and immobilisation are contagious. A dysregulated nervous system in a room activates the threat-detection systems of the other nervous systems present — this is why spending prolonged time around chronically anxious, angry, or collapsed people is genuinely exhausting and dysregulating.\n\nThe state of regulated calm is equally contagious. This is the neurological basis of the therapeutic relationship — the therapist's regulated nervous system literally provides the co-regulatory environment within which the client's nervous system can begin to settle. It is also the basis of what happens between a securely attached caregiver and an infant — the infant's nervous system learns regulation through repeated experience of another regulated nervous system nearby.\n\nThis is why the relational work in this app matters. Identifying patterns is useful. But the actual repair happens in safe relationship — where the nervous system receives repeated evidence that connection is not dangerous, that it is possible to be fully known and not abandoned, and that regulation can be received from another rather than only managed alone.\n\nThe implication: first, allow yourself to recover. A regulated nervous system is contagious. You cannot share what you do not have."], ["Levine — how the body heals", "Peter Levine observed that animals in the wild do not develop the equivalent of PTSD, even when regularly exposed to life-threatening situations. The reason is discharge. After a threat passes, animals shake, shiver, breathe deeply, and move. The activation that was mobilised for survival is discharged through the body before the animal returns to normal functioning.\n\nHumans interrupt this process. Social conditioning, shame about physical expression, the demands of functioning in civilised environments — all suppress the natural discharge response. The activation stays in the body, unprocessed, contributing to the chronic states of hyperarousal or hypoarousal described above.\n\nThe tools in Somatic Experiencing work with this directly: completing the discharge that was interrupted, gently and in small doses, allowing the body to process what the mind could not. Pendulation — moving attention between the site of activation and a neutral or positive body area — prevents flooding while still allowing processing. The body completes what it was designed to complete."], ["References", "Porges, S.W. (2011). The polyvagal theory. Norton. | Dana, D. (2018). The polyvagal theory in therapy. Norton. | Dana, D. (2020). Polyvagal exercises for safety and connection. Norton. | Siegel, D.J. (1999). The developing mind. Guilford Press. | Levine, P.A. (1997). Waking the tiger. North Atlantic Books. | Levine, P.A. (2010). In an unspoken voice. North Atlantic Books. | Walker, P. (2013). Complex PTSD: From surviving to thriving. Azure Coyote. | van der Kolk, B. (2014). The body keeps the score. Viking."]]
  },
  iwm: {
    title: "Internal Working Models",
    badge: "Attachment Theory",
    bc: "bg-blue-50 border-blue-200",
    tc: "bg-blue-100 text-blue-700",
    body: "An internal working model (IWM) is the representational structure the mind builds from thousands of repeated early relational experiences. Bowlby described three elements: a model of the self (am I worthy of care?), a model of others (can they be trusted?), and a model of the relationship (what happens when I reach out?). The IWM operates largely below conscious awareness. It is not a belief you examine - it is the filter through which all relational experience is processed. IWMs are stable but not fixed. Change requires repeated new relational experiences incompatible with the existing model - the mechanism behind earned security.",
    secs: [["The four IWM types", "Secure (positive self / positive others): Comfortable with intimacy. Can seek support and self-soothe adaptively.\n\nPreoccupied (negative self / positive others): Craves closeness, fears abandonment. Strategy: hyperactivation - turn up the emotional signal to compel a response.\n\nDismissing-Avoidant (positive self / negative others): Self-reliant, emotionally closed. The positive self-model often defends against underlying shame. Strategy: deactivation.\n\nFearful-Avoidant / Disorganised (negative self / negative others): Wants connection and simultaneously fears harm. No coherent strategy - oscillates between both. Most closely associated with early trauma."], ["Reference", "Bowlby, J. (1969/1982). Attachment and loss, Vol. 1. Basic Books. | Bartholomew, K. & Horowitz, L.M. (1991). Journal of Personality and Social Psychology, 61(2), 226-244."]]
  },
  schemas: {
    title: "Early Maladaptive Schemas",
    badge: "Schema Therapy",
    bc: "bg-violet-50 border-violet-200",
    tc: "bg-violet-100 text-violet-700",
    body: "Early Maladaptive Schemas are deep pervasive patterns of belief about the self and relationships that develop when core childhood needs go unmet. Jeffrey Young identified 18 schemas in five domains. The schemas are not random - they are the belief structures encoded by specific types of insecure caregiving. The IWM is the structure; the schema is the belief the structure generates.",
    secs: [["The five schema domains", "1. Disconnection and Rejection: needs for safety, love, and belonging were unmet. Schemas: Abandonment/Instability, Mistrust/Abuse, Emotional Deprivation, Defectiveness/Shame, Social Isolation.\n\n2. Impaired Autonomy and Performance: needs for independence and competence were unmet. Schemas: Dependence/Incompetence, Vulnerability to Harm, Enmeshment/Undeveloped Self, Failure to Achieve.\n\n3. Impaired Limits: needs for realistic limits were unmet. Schemas: Entitlement/Grandiosity, Insufficient Self-Control.\n\n4. Other-Directedness: own preferences suppressed for others. Schemas: Subjugation, Self-Sacrifice, Approval-Seeking.\n\n5. Overvigilance and Inhibition: spontaneity suppressed. Schemas: Negativity/Pessimism, Emotional Inhibition, Unrelenting Standards, Punitiveness."], ["Reference", "Young, J.E., Klosko, J.S. & Weishaar, M.E. (2003). Schema Therapy: A Practitioner's Guide. Guilford Press."]]
  },
  ifs: {
    title: "Internal Family Systems",
    badge: "Parts Work",
    bc: "bg-rose-50 border-rose-200",
    tc: "bg-rose-100 text-rose-700",
    body: "IFS, developed by Richard Schwartz, understands the mind as a system of parts - each with its own perspective and protective role. Every part, however painful its current expression, developed for a good reason. The Critical part tried to manage shame before anyone else could. The Pleaser tried to prevent abandonment. The Controlling part was creating safety in a chaotic environment.",
    secs: [["The three layers", "Exiles carry the original wound — the schemas, the negative cognitions, the pain of unmet childhood needs. They are also the home of overwhelming emotions that were too big, too dangerous, or too unspeakable to be processed at the time: terror, grief, shame, rage, despair, longing. These emotions were not pathological — they were appropriate responses to what was happening. But in the environment in which they arose they could not be expressed, held, or regulated. So they were pushed down. Exiles are the parts that hold what could not be borne. They are the vulnerable parts the protectors work to keep hidden.\n\nManager Parts are proactive - they organise life to prevent the exile from being activated. Examples: Perfectionist, Pleaser, Intellectualiser, Fixer, Controlling.\n\nFirefighter Parts are reactive - they activate after the exile has been triggered to extinguish the pain fast. Examples: Angry, Reassurance Seeker, Dependent.\n\nThe Self is always present - calm, curious, compassionate - and is the target of all therapeutic work. It is never damaged, only obscured."], ["Structural dissociation connection", "Janina Fisher's model maps closely onto IFS. Under trauma the personality fragments into the Apparently Normal Part (ANP - left brain, gets on with daily life, corresponds to Manager Parts) and the Emotional Part (EP - right brain, frozen at the moment of trauma, corresponds to Exiles and Firefighters). Parts are a dissociative phenomenon - they are heroic. They helped you survive."], ["Reference", "Schwartz, R.C. & Sweezy, M. (2020). Internal Family Systems Therapy (2nd ed.). Guilford Press. | Van der Hart, O., Nijenhuis, E.R.S. & Steele, K. (2006). The haunted self. Norton."]]
  },
  emdr: {
    title: "Negative and Positive Cognitions",
    badge: "EMDR",
    bc: "bg-orange-50 border-orange-200",
    tc: "bg-orange-100 text-orange-700",
    body: "In EMDR a Negative Cognition (NC) is the explicit verbal belief a distressing memory encodes about the self. It is the moment all the implicit architecture - the IWM, the schema, the distortion - surfaces as a speakable belief. The Positive Cognition (PC) is the target belief the therapy works toward installing once the memory is processed. The PC must be felt as true, not just understood intellectually.",
    secs: [["The four NC domains", "1. Responsibility - I am defective: I am not lovable, I am not good enough, I am shameful, I am permanently damaged, I am a disappointment, I deserve only bad things.\n\n2. Responsibility - I did something wrong: I should have done something, I should have known better. These usually collapse into Domain 1 when explored.\n\n3. Safety / Vulnerability: I cannot trust anyone, I cannot trust my judgment, I am in danger, I cannot stand up for myself, it is not OK to feel my emotions.\n\n4. Control / Choices: I am powerless, I am weak, I cannot get what I want, I have to be perfect, I am a failure."], ["Thoughts worth moving towards", "I deserve love, I am a good person, I am worthy, I am lovable, I am fine as I am, I can be trusted, I can choose whom to trust, I am safe now, I can safely feel my emotions, I am now in control, I have choices, I am strong, I can succeed, I can be myself."], ["Finding the bridge from negative to positive", "For each negative cognition, there is a corresponding question that points toward the felt sense of the positive. These are not affirmations — they are invitations to locate a real memory, a real moment, a real person who provides neurological evidence that the negative belief is not the whole truth. The goal is to find where in the body that memory lives, because the body holds the resource just as it holds the wound.\n\nI am not good enough — When did you absolutely know you were enough? Who has made you feel genuinely valued?\n\nI am shameful — What do you know is true and good about you? Who has seen your goodness clearly?\n\nI do not deserve to be loved — Who has loved you most fully? Where do you feel that love in your body when you allow it in?\n\nI cannot trust anyone — Who could you trust, even partially? When has someone come through for you?\n\nIt is my fault — Would you say this to someone you love in the same situation? What would you need to forgive yourself?\n\nI am powerless — When have you felt genuinely capable and effective? What have you built, created, or changed?\n\nI am a failure — When did you succeed at something that mattered to you? What do you want to be remembered for?\n\nI am permanently damaged — What is the highest possibility inside you that healing is available?\n\nI am insignificant — When did you know with certainty that you mattered to someone?\n\nI am not loveable — Who loved you most? What part of yourself do you recognise as worthy of love?\n\nI cannot stand up for myself — When have you held a position that mattered to you? How did that feel in your body?\n\nI have to be perfect — What would you tell a child who was trying their hardest? What do you need to know that trying your best is enough?\n\nThe practice: for any negative cognition that activates strongly, sit with the corresponding question long enough to locate a real memory or felt sense. Notice where in the body the resource lives. That body location is where the positive cognition work begins."], ["How EMDR works — memory reconsolidation", "The standard explanation of trauma therapy is that it works through extinction — creating a new less fearful memory that competes with and gradually overrides the traumatic one. The original memory remains, suppressed by a newer stronger competing memory.\n\nEMDR appears to work differently. Karim Nader and Joseph LeDoux established in the early 2000s that when a consolidated memory is retrieved, it re-enters a labile (unstable) state for a window of several hours. During this window, if something disrupts or contradicts the memory trace, the memory can be reconsolidated — stored again in an updated form. The original fear memory is not suppressed. It is changed at the level of storage.\n\nBruce Ecker, Robin Ticic, and Laurel Hulley developed a clinical framework around reconsolidation called Coherence Therapy. Their key finding: for reconsolidation to occur, the original memory must be activated (brought into awareness), then a mismatch experience must occur — something that contradicts what the memory predicts — and then the memory is reconsolidated incorporating the new information.\n\nIn EMDR: the traumatic memory is activated (target memory, body sensation, negative cognition). The bilateral stimulation creates the labile state. The positive cognition provides the mismatch experience. The installation phase drives the new information into the reconsolidating memory.\n\nThe clinical implication is significant: if EMDR works through reconsolidation rather than extinction, the original traumatic memory is not merely suppressed — it is structurally updated. This is consistent with the observation that EMDR effects tend to be stable without requiring ongoing exposure homework to maintain.\n\nAlain Brunet and colleagues developed a reconsolidation-based protocol using propranolol specifically for PTSD, providing pharmacological evidence that reconsolidation is the active mechanism."],
      ["Memory reconsolidation — why EMDR works", "The standard explanation of trauma therapy is that it works through extinction — creating a new less fearful memory that suppresses the traumatic one. EMDR appears to work differently. The evidence increasingly suggests it operates through memory reconsolidation — a neurobiological process by which memories, once retrieved, become temporarily unstable and can be genuinely rewritten before being stored again.\n\nKarim Nader and Joseph LeDoux established that when a consolidated memory is retrieved it re-enters a labile (unstable) state for a window of several hours. During this window, if something disrupts or contradicts the memory trace, the memory can be reconsolidated — stored again in an updated form. The original fear memory is not suppressed. It is changed at the level of storage.\n\nBruce Ecker, Robin Ticic, and Laurel Hulley developed a clinical framework around reconsolidation. Their key finding: for reconsolidation to occur, the original memory must be activated, then a mismatch experience must occur — something that contradicts what the memory predicts — and then the memory reconsolidates incorporating the new information.\n\nIn EMDR: the traumatic memory is activated (target memory, body sensation, negative cognition). The bilateral stimulation simultaneously engages working memory in a way that reduces the vividness and emotional intensity of the activated memory, creating the labile state. The positive cognition provides the mismatch experience. The installation phase drives the new information into the reconsolidating memory.\n\nIf EMDR works through reconsolidation rather than extinction, the original traumatic memory is not merely suppressed — it is structurally updated. This is consistent with the observation that EMDR effects tend to be stable and do not require ongoing exposure homework to maintain.\n\nAlain Brunet and colleagues developed a reconsolidation-based protocol using propranolol specifically for PTSD, providing pharmacological evidence that reconsolidation is the active mechanism."],
      ["Reference", "Shapiro, F. (2001). Eye movement desensitisation and reprocessing (2nd ed.). Guilford Press."]]
  },
  fourfs: {
    title: "Fight Flight Freeze Fix",
    badge: "Fight Flight Freeze Fix",
    bc: "bg-amber-50 border-amber-200",
    tc: "bg-amber-100 text-amber-700",
    body: "The four survival responses — Fight, Flight, Freeze, and Fix — are the nervous system automatic strategies for managing threat. Each develops from early experience and becomes a default mode that activates below conscious awareness. Fawn overlaps with Fix and is included as a related fifth response. Understanding your pattern is the first step to having a choice about it. are trauma-based personality patterns that develop in childhood as adaptations to environments of abuse, neglect, chronic unsafety, or unpredictable caregiving. They are not short-term threat responses. They are ingrained relational architectures that shape how a person approaches connection, conflict, emotion, and self-worth across the lifespan. Each sits on a spectrum. Most people carry a blend of all four with one or two dominant.",
    secs: [["Two organising states — stuck on and stuck off", "Deb Dana and Stephen Porges describe the nervous system as moving between two survival states when safe regulation is unavailable. Peter Levine maps these as the symptoms of undischarged traumatic stress — the body stuck in one pole or oscillating between both.\n\nSTUCK ON — mobilised, hyperarousal: The sympathetic accelerator is pressed and does not release. Fight, flight, fix, and active fawn are all stuck-on states.\n\nWhat this looks and feels like:\nAnxiety · Panic · Restlessness · Hypervigilance · Inability to relax · Exaggerated startle · Emotional flooding · Hostility · Rage · Fight responses · Flight and avoidance · Fix and overwork · People-pleasing and fawning · Digestive problems · Chronic pain · Sleeplessness · Racing thoughts · Urgency that does not resolve.\n\nThe body floods with adrenalin and cortisol. Heart rate rises. Breathing shifts into the chest. Digestion shuts down. The muscles are perpetually braced. The mind narrows to threat detection and cannot access rest, creativity, genuine connection, or clear perspective.\n\nSTUCK OFF — immobilised, hypoarousal: The dorsal vagal brake is fully engaged and the system collapses into conservation. Freeze is the primary stuck-off state.\n\nWhat this looks and feels like:\nFreeze · Depression · Flat affect · Lethargy · Deadness · Exhaustion · Chronic fatigue · Disorientation · Disconnection · Dissociation · Numbness · Feeling absent from your own life · Complex physical syndromes without clear medical cause · Low blood pressure · Poor digestion · Brain fog · Inability to feel emotions clearly.\n\nThe body conserves energy. Blood pressure drops. Digestion slows. The mind detaches from the present. The person may appear calm or simply absent — but this is not regulation. It is collapse.\n\nHealing insight: It can take 12 to 24 hours to return to the window of tolerance after significant activation. Substances may create a temporary felt sense of coming down but they suspend the process of recovery rather than completing it. True regulation takes time, safety, and where possible the presence of another regulated nervous system.\n\nMost people with complex developmental trauma cycle between both poles — periods of hyperactivation followed by collapse, then re-activation when the collapse feels too dangerous. Understanding which state you are currently in shapes which tools will actually help. You cannot think your way out of either. You work through the body first. And the people you spend time with matter neurologically, not just relationally."], ["Fight — mobilised, seeking control", "Unconscious belief: Power and control keep me safe from abandonment.\n\nNervous system: Mobilised. Sympathetic activation channelled into dominance and control.\n\nSurvival pattern: Pursue power and control. Connect by controlling others.\n\nChildhood origin: Often a child given too much power, or one who modelled a narcissistic or domineering caregiver. Fight types learned that asserting dominance kept them safer than vulnerability.\n\nCommon patterns: Incessant monologuing, criticising, raging. Impulsive decisions. Demands perfection from others. Avoids isolation — needs an audience. Mislabelled as narcissistic or sociopathic.\n\nThe spectrum: Assertive and clear → domineering, bullying, contemptuous.\n\nCatchphrase: No relationships, just prisoners.\n\nHealing: Feel safe enough to relinquish control and express vulnerability. The need to control others is always a signal of intolerable inner vulnerability."], ["Flight — mobilised, seeking perfection", "Unconscious belief: Perfection and achievement will make me safe and loveable.\n\nNervous system: Mobilised. Sympathetic activation channelled into performance and achievement.\n\nSurvival pattern: Escape into thought and action. Withdraw by staying focused on personal performance.\n\nChildhood origin: A hyperactive response to family trauma. The child learned that being still or imperfect was dangerous — that doing and achieving produced safety.\n\nCommon patterns: Worrying, performance anxiety, over-achieving, unable to rest. Over-analytical. Driven by perfectionism. Avoids inaction — stillness feels threatening. Mislabelled as OCD, mood disorder, or ADHD.\n\nThe fix response: Flight types often present with a strong fix pattern — the compulsive urge to resolve, manage, and over-prepare. This is mobilised energy directed at the problem. It feels productive. The body is still in survival mode.\n\nThe spectrum: Efficient and productive → compulsive doing, micromanaging, never satisfied.\n\nCatchphrase: Human-doings not human-beings.\n\nHealing: Develop the capacity to feel safe when still and imperfect. The compulsive achievement is a relationship with safety, not with ambition."], ["Freeze — immobilised, seeking invisibility", "Unconscious belief: People are unsafe. It is safer to disappear.\n\nNervous system: Immobilised. Dorsal vagal collapse — the body conserves energy and withdraws from engagement.\n\nSurvival pattern: Avoid human contact. Withdraw by disengaging entirely.\n\nChildhood origin: Often the most profoundly abandoned child — the scapegoat who was not permitted to fight back, flee, or please. When all other options were unavailable, disappearing became the only safe response. This is the most dissociative of the four types.\n\nCommon patterns: Hibernating, sleeping, daydreaming, screens as avoidance. Struggles to decide — avoids commitment. Achievement phobic — performing means being seen. Emotionally distant and detached. Mislabelled as depressed, schizoid, or dissociative.\n\nThe body in freeze: Low energy. Flat affect. The digestive system slows. Blood pressure drops. Dissociation is the cognitive signature — the mind detaches from the body and from the present moment.\n\nThe healing direction: Movement first. The body went still to survive — any movement begins to signal safety. Physical tools come before cognitive ones.\n\nThe spectrum: Peaceful and self-contained → numb, dissociated, unable to engage.\n\nCatchphrase: Hide from the world.\n\nHealing: Gradually and gently re-enter the body and develop tolerance for emotion and proximity."], ["Fawn — mobilised toward others, collapsed inside", "Unconscious belief: I will be safe and loved if I make others happy.\n\nNervous system: A complex blend — externally mobilised toward others through appeasement, internally collapsed around authentic self-expression.\n\nSurvival pattern: Please people compulsively. Connect by merging — losing self entirely into attunement with what others need.\n\nChildhood origin: The child of a narcissistic parent in whom bits of safety and love were earned through compliant servitude and the suppression of authentic self. The child learned that having their own needs, opinions, or reactions was dangerous.\n\nCommon patterns: Entertainer, yes-person, high concern with fitting in and flattering. Defers all decisions to others. Avoids conflict entirely. Exploited in relationships. Mislabelled as codependent or parentified child.\n\nFawn and the window of tolerance: When the fawn response is active, the person appears regulated — warm, socially engaged, calm. But this is external regulation in service of others. Internally, the authentic self is suppressed. The window of tolerance is maintained only by not being real.\n\nThe spectrum: Warm and genuinely attuned → servitude, no real preferences, invisible sense of self.\n\nCatchphrase: Keep others happy.\n\nHealing: Internalise a sense of self-worth entirely independent of others' approval. Begin to notice and name personal preferences and reactions — first in private, then gradually in safe relationships."], ["Blends and cycles", "Most people carry more than one type, and most cycle between mobilised and immobilised states.\n\nFight-Flight: Both mobilised. Alternates between aggression and anxious over-functioning. High energy, high control, unable to tolerate stillness or vulnerability.\n\nFreeze-Fawn: Both collapsed or appeasing. Alternates between disappearing and over-accommodating. Often found in the most severely neglected developmental histories.\n\nFlight-Fawn: High-achieving and people-pleasing simultaneously. Earns love through performance and accommodation. Looks ideal from the outside.\n\nFight-Fawn: Alternates between control and collapse. Domineering in some relationships, completely self-effacing in others. Often reflects disorganised attachment.\n\nThe mobilised-immobilised cycle: Many people cycle through periods of hyperactivation (anxiety, overwork, restlessness, urgency) followed by collapse (exhaustion, shutdown, depression) — then back to activation when the collapse feels too dangerous. Understanding this cycle is often more useful than fixing any one state. Both ends of the cycle are the same nervous system trying to survive."], ["Fix — the fifth F", "Fix activates when neither fight nor flight is available and freeze is too costly — when the person has learned that the safest strategy is to become indispensable, to manage the emotional state of the threatening or unpredictable other, to solve the problem before it becomes a crisis.\n\nThe Fix response looks like competence and helpfulness from the outside. Internally it is experienced as hypervigilance to others states, a compulsive need to manage, anticipate, and prevent. The person in Fix is monitoring the room constantly — reading facial expressions, adjusting their behaviour, pre-empting conflict.\n\nThe cost: the person in Fix has no template for rest. Their nervous system is organised around vigilance. Relaxing feels like dereliction. Other people feel like work rather than connection. The self — needs, preferences, rest — is chronically deprioritised.\n\nFix often looks like Fawn from the outside and shares developmental roots. The distinction: Fawn primarily appease and agree to avoid the threat. Fix primarily manage and control to prevent the threat arising. Both suppress the authentic self. Both develop from environments where survival depended on correctly managing an adult emotional state."],
      ["Mobilisation and immobilisation", "Stephen Porges polyvagal theory distinguishes between immobilisation with safety and immobilisation without safety — a distinction that matters clinically.\n\nMobilisation is sympathetic activation — the nervous system prepares for action. Fight and flight are both mobilisation responses. The body is energised, heart rate elevated, muscles primed, attention narrowed to the threat.\n\nImmobilisation without safety is the dorsal vagal shutdown — the freeze response. When neither fight nor flight is possible or has failed, the primitive dorsal vagal system activates. Heart rate drops, the person goes still or collapses, dissociation may occur. This is the same mechanism that causes animals to go limp in the jaws of a predator. It is not a choice. It is a biological last resort.\n\nImmobilisation with safety is a different state entirely — available only when the ventral vagal system is online. This is the state of rest, intimacy, play, deep connection. Two people sitting in comfortable silence. The body is still but regulated rather than shutdown.\n\nMany people with developmental trauma have access to mobilisation and immobilisation without safety but limited access to immobilisation with safety. Stillness has historically meant danger. Rest feels wrong. Intimacy activates vigilance. The work of nervous system healing is partly about building the capacity for the third state — learning that stillness can be safe."],
      ["Reference", "Walker, P. (2013). Complex PTSD: From surviving to thriving. Azure Coyote. | Porges, S.W. (2011). The polyvagal theory. Norton. | Dana, D. (2018). The polyvagal theory in therapy. Norton. | Levine, P.A. (2010). In an unspoken voice. North Atlantic Books."]]
  },
  ace: {
    title: "The ACE Study",
    badge: "ACE Study",
    bc: "bg-emerald-50 border-emerald-200",
    tc: "bg-emerald-100 text-emerald-700",
    body: "The Adverse Childhood Experiences Study is one of the largest investigations into the social determinants of health ever conducted. Carried out by Felitti and Anda with 17,421 adults, it established a powerful relationship between emotional experiences in childhood and physical and mental health across the entire lifespan.",
    secs: [["Key findings", "Over half of participants had at least one ACE. 87% of those with one had at least one additional - ACEs cluster. ACE score 4+ produces significantly worse outcomes across every health domain. Effects persist across decades - childhood experiences predicted adult health 50 years later.\n\nACEs do not just cause trauma - they disrupt the attachment system during its formation, producing insecure IWMs. Secure attachment is the primary buffer against ACE-related harm."], ["Longevity connection", "A meta-analysis of 148 prospective studies found a 50% increased likelihood of survival for people with stronger social ties - an effect size comparable to diet and exercise. Social isolation independently predicts dementia. Attachment insecurity is associated with chronic pain, hypertension, stroke, and heart attack. The pathway runs through chronic HPA axis dysregulation - the biological stress system that stays activated when the IWM encodes the world as perpetually threatening."], ["ACE scores and life expectancy", "The most striking finding from ACE research concerns longevity. A 2009 analysis found that people with an ACE score of six or more had a life expectancy approximately twenty years shorter than those with an ACE score of zero.\n\nThis is not a marginal statistical effect. It represents a fundamental difference in biological ageing, driven by the cumulative physiological impact of chronic stress activation across development. The mechanisms include chronic elevation of cortisol and inflammatory markers, epigenetic changes to stress response systems, accelerated cellular ageing, higher rates of cardiovascular disease, autoimmune conditions, metabolic disorders, and cancer — as well as higher rates of suicide, overdose, and accident.\n\nFelitti and Anda described a dose-response relationship: the higher the ACE score, the greater the health risk, with no safe threshold. Each additional ACE adds cumulative biological load.\n\nThe 2019 CDC analysis found that approximately 1.9 million cases of heart disease and 21 million cases of depression in the US could be attributed to ACEs. Preventing ACEs could reduce adult depression by up to 44%.\n\nThis establishes that childhood adversity is not a psychological issue with physical consequences. It is a biological event that reorganises the body at a cellular level. The corollary — which the research also supports — is that these effects are not fixed. Healing relationships, regulated nervous system states, and sustained therapeutic work reverse many of the biological markers. The body that learned threat can learn safety."],
      ["ACE scores and life expectancy", "The most striking finding from ACE research concerns longevity. A 2009 analysis of the original cohort found that people with an ACE score of six or more had a life expectancy approximately twenty years shorter than those with an ACE score of zero.\n\nThis is not a marginal statistical effect. It represents a fundamental difference in biological ageing, driven by the cumulative physiological impact of chronic stress activation across development. The mechanisms include chronic elevation of cortisol and inflammatory markers, epigenetic changes to stress response systems, accelerated cellular ageing (shorter telomere length), higher rates of cardiovascular disease, autoimmune conditions, metabolic disorders, and cancer.\n\nFelitti and Anda described a dose-response relationship: the higher the ACE score, the greater the health risk, with no safe threshold. Each additional ACE adds cumulative biological load.\n\nA 2019 CDC analysis found that approximately 1.9 million cases of heart disease and 21 million cases of depression in the US could be attributed to ACEs. Preventing ACEs could reduce adult depression by up to 44 percent.\n\nThe corollary: the research also supports that these effects are not fixed. Healing relationships, regulated nervous system states, and sustained therapeutic work reverse many of the biological markers associated with ACE-related stress. The body that learned threat can learn safety."],
      ["Reference", "Felitti, V.J., Anda, R.F. et al. (1998). American Journal of Preventive Medicine, 14(4), 245-258. | Holt-Lunstad, J. et al. (2010). PLOS Medicine, 7(7)."]]
  },
  survival: {
    title: "The Survival Split, Fantasy Bond and Trauma Bond",
    badge: "Fantasy Bond & Trauma Bond",
    bc: "bg-rose-50 border-rose-200",
    tc: "bg-rose-100 text-rose-700",
    body: "To survive early caregiving that was inadequate, frightening, or inconsistent, the child does something remarkable and costly: they split. They preserve an idealised version of the caregiver in order to maintain the attachment that keeps them alive — and they bury the evidence of their own unmet needs, their authentic emotional responses, and their real self deep where it cannot threaten that survival. This is not a failure of the child. It is an extraordinarily intelligent adaptation to an impossible situation. The cost is paid later.",
    secs: [["Why the child could not afford to see clearly", "The infant and young child cannot survive without the caregiver. This is not metaphorical — it is biological. Abandonment is death. Given this, the child faces an impossible bind when the caregiver is inconsistent, neglectful, frightening, or emotionally absent: if I see this person clearly — as unreliable, hurtful, or unavailable — I risk the attachment that keeps me alive.\n\nThe solution the developing mind reaches is to split. The psychoanalyst Ronald Fairbairn described this in 1952 as the fundamental dilemma of the deprived child: they cannot abandon the attachment to a bad object, so they internalise the badness themselves. The caregiver is preserved as good. The child becomes the problem. This is why so many adults who were raised in inadequate environments carry a deep conviction that they are fundamentally wrong, broken, or not enough — while simultaneously holding an idealised or defended image of the caregiver.\n\nWinnicott described a parallel process in 1960: the development of a False Self that learns to comply with the caregiver's needs and emotional atmosphere, while the True Self — the authentic emotional and relational core of the person — retreats underground. The False Self is not dishonest in a moral sense. It is a survival structure."], ["The fantasy bond", "Robert Firestone introduced the concept of the fantasy bond in the 1980s to describe the imaginary connection the child creates with the caregiver in order to tolerate the pain of emotional unavailability. When the real caregiver cannot provide what the child needs, the mind generates an internal substitute: a felt sense of connection that does not depend on the caregiver actually being present or responsive.\n\nThe fantasy is not a lie the child tells themselves. It is an internal working model built from desperate need: if I am good enough, quiet enough, helpful enough, invisible enough, then they will finally see me and love me properly. This conditional promise — the belief that the love is available if only the right conditions can be met — is the core of the fantasy bond.\n\nThis fantasy does not dissolve in adulthood. It relocates. The adult carries the same internal template — the same conditional promise — into new relationships. The romantic partner, the employer, the friend, becomes the new figure who might finally deliver what the caregiver could not. Rumination, obsessive thinking, and the pattern of over-investing in relationships with limited return are often the adult mind returning to the fantasy and trying, again, to solve it."], ["Limerence, intermittent reward and why people cannot just leave", "Dorothy Tennov coined the term limerence in 1979 to describe a state of intense, intrusive, involuntary preoccupation with another person — characterised by longing for reciprocation, acute sensitivity to every signal from the other, and an inability to think about much else. Limerence is commonly understood as a form of romantic obsession but it has deep developmental roots that make it something quite different from ordinary love or attraction.\n\nUnderstanding the cycle is essential because it explains something that otherwise makes no sense: why intelligent, self-aware people stay in relationships that are clearly not working, why they cannot simply decide to leave and mean it, and why the connection to someone inconsistent or unavailable can feel more urgent and real than a connection to someone who is consistently warm.\n\nThe cycle goes like this. There is longing — a preoccupied, searching quality of attention that keeps returning to the person no matter what else is happening. Then there is hope — a signal arrives, a text, a moment of warmth, a look, and the system floods with relief. Then comes the partial reward — not the full love or presence that is being sought, but enough to keep the system engaged. Then the withdrawal — the warmth recedes, the person becomes unavailable or inconsistent again, and the longing intensifies. Then the cycle begins again.\n\nThis is not a character flaw. It is neurochemistry. Neuroscience research on reward systems shows that intermittent and unpredictable reward produces significantly stronger dopamine responses than consistent reward. A slot machine that pays out occasionally and unpredictably creates more compulsive engagement than one that pays every time. The partial reward — the almost — is more neurologically activating than the full thing. This is why a relationship with someone inconsistent can feel more alive and urgent than one with someone reliably loving. The nervous system is not confused. It is doing exactly what reward circuitry does when the reward is uncertain.\n\nFor someone who carries an unresolved fantasy bond, this dynamic lands with particular force. When they encounter a person who is warm then distant, available then gone, interested then cool — the nervous system does not register this as a warning. It registers it as recognition. This pattern matches the original template. The caregiver was like this. Love was like this — scarce, unpredictable, sometimes withheld, sometimes given. The child learned to read every signal, to monitor constantly, to stay alert for the moment of warmth. That vigilance is now being activated again and it feels, underneath everything, like home.\n\nThis is the hook. Not weakness. Not stupidity. Not a failure to know better. The person often does know better. They can describe the dynamic clearly. They can see it from the outside. And they still cannot get free of it because the pull is not coming from the thinking mind — it is coming from a much older part of the nervous system that learned, decades ago, that this is what love looks like and that staying alert for the next moment of warmth is the most important thing there is.\n\nGabor Maté describes this as the child having to choose between authenticity and attachment — and attachment always winning. The adult version of that child is still making the same choice, still suppressing their own needs and perceptions, still accommodating and self-erasing in pursuit of a connection that always seems almost within reach.\n\nWhat breaks the cycle is not willpower or better reasoning. It is grief. Mourning the original loss — the love that was not reliably there, the child who had to become a vigilant monitor of another person instead of living in their own experience — is what slowly dissolves the hook. When the original wound is grieved rather than managed, the new person stops being the site of the old hope. The charge reduces. The cycle loses its grip. This takes time and it takes support. But it is the only thing that actually works."], ["The trauma pot — what goes in and what happens when it fills", "The material that cannot be expressed or even consciously experienced in the original environment does not disappear. It goes somewhere. Clinicians working in the trauma field often use the image of a container — sometimes called the trauma pot — to describe the accumulated dissociated content: the grief that was never safe to feel, the anger that would have been too dangerous to express, the needs that had no one to meet them, the authentic emotional responses to experiences that required a different face.\n\nVan der Hart, Nijenhuis and Steele described this structure formally in 2006 as structural dissociation: the Apparently Normal Part of the personality that functions in daily life and maintains the attachment system, and the Emotional Part or parts that hold the overwhelming experiences — the frozen child states, the unmet needs, the accumulated pain. These are not separate people. They are split-off aspects of one person navigating an impossible situation.\n\nThe trauma pot has a capacity. When life is relatively stable, the container holds. When accumulated stress, relational activation, significant loss, or life transition increases the internal pressure, the contents begin to emerge. This is experienced as: anxiety with no clear cause, intrusive emotions, emotional flashbacks, physical symptoms without medical explanation, sudden intense reactions to apparently small triggers, depression that arrives without obvious reason, addictive pulling toward numbing or intensity. These are not signs of breakdown. They are signs that the suppressed material is trying to surface — trying, finally, to be known."], ["What therapy is actually doing", "Therapy with this understanding is not primarily about insight or changing thinking patterns. It is about creating the conditions in which the dissociated parts of the self — particularly the parts that carry the child\'s authentic needs, unprocessed grief, and real emotional responses — can surface safely enough to be known.\n\nThis is relational work. The therapeutic relationship itself becomes the environment in which a different kind of experience is possible: one in which the authentic self does not have to hide in order to maintain the connection. The therapist\'s consistent presence, regulated attunement, and genuine interest in the client\'s real experience — not their performed or defended version of it — provides the conditions for the True Self to begin to emerge from behind the survival structure.\n\nJanina Fisher describes this process as working with the fragmented parts of the self — not to integrate them forcibly but to bring them into relationship with each other and with the present-day adult who can now provide what the original environment could not. Each part that surfaces from the trauma pot carries information: this is what I needed, this is what hurt, this is what I was never allowed to feel. Meeting that information without immediately managing it away is the work."], ["Mourning the fantasy — what healing actually requires", "This is the part of the therapeutic process that is least understood and most resisted, because it asks for something genuinely painful: the relinquishing of the hope that kept the child alive.\n\nHealing does not come from understanding the fantasy intellectually. It comes from grieving it. Grieving means allowing the reality to land — that the caregiver could not provide what was needed, that the childhood that should have happened did not happen, that the love that was waited for with such patience and adaptation is not coming in the form that was hoped for. This grief is real grief. It is the mourning of a loss that was never acknowledged as a loss precisely because the child needed to maintain the fiction that there was no loss.\n\nBowlby\'s later work on mourning and the failure to mourn describes what happens when this grief cannot be processed: the loss remains active in the internal world, driving the continued search for what was not received. The fantasy bond stays intact. The adult keeps returning to relationships and situations that recreate the original dynamic — not out of masochism but because the unresolved grief makes the hope feel more alive than the evidence.\n\nMourning the fantasy means sitting with the truth: it was not your fault that you were not seen. You did not need to be different. The caregiver had their own limitations that had nothing to do with your worth. The adaptation you made was intelligent and necessary and it cost you your authentic self for a period of time. That loss is real. Grieving it fully is what makes it possible to step into what is actually available in the present rather than remaining organised around what was missing in the past."], ["Trauma bonding — why people stay", "Trauma bonding describes the powerful attachment that can form between a person and someone who harms them — within intimate relationships, families, or high-control environments. It was first described formally by Patrick Carnes in 1997 and developed further by Donald Dutton and Susan Painter through their work on traumatic bonding in abusive relationships.\n\nThe mechanism is not weakness or stupidity. It is neurochemistry, operating through the same dopaminergic reward system that drives all strong attachments — amplified by intermittent reinforcement.\n\nIn a relationship characterised by cycles of tension, harm or threat, and then reconciliation and warmth, the nervous system experiences the reconciliation phase as an intense relief. The warmth after the cold is neurologically more activating than consistent warmth would be. The intermittent reward — the return of the good version of the person — produces a dopamine response that is stronger than steady care produces. The body becomes organised around the cycle.\n\nAt the same time, the harm produces fear activation, and fear and arousal share neurological pathways with bonding. High arousal states — including fear — can intensify attachment. This is the Stockholm Syndrome mechanism: the nervous system bonds with the source of both threat and relief because that person has become the regulator.\n\nWhat makes trauma bonding particularly difficult to leave:\n\nThe bond is to the good version of the person — which is real. The harm comes from the same person, but the attachment formed to who they are in the reconciliation phase. Leaving means losing both the harm and the warmth simultaneously.\n\nThe nervous system has been conditioned to read the danger-relief cycle as love. Calm, consistent love from a new relationship can feel flat, boring, or unreal by comparison — because it lacks the activation that the trauma bond trained the system to associate with genuine connection.\n\nShame and self-blame often reinforce the bond. The person explains the harm as their own fault — if I was better, they would not do this — which preserves the hope of the relationship while directing the pain inward.\n\nHealing requires understanding that the strength of the attachment is not evidence of the quality of the relationship. It is evidence of the conditioning. The bond can be intense, real, and built on genuine love — and it can still be a trauma bond. These are not contradictory."], ["References", "Fairbairn, W.R.D. (1952). Psychoanalytic Studies of the Personality. Tavistock. | Winnicott, D.W. (1960). Ego distortion in terms of true and false self. In The Maturational Processes and the Facilitating Environment. Hogarth Press. | Tennov, D. (1979). Love and Limerence. Stein and Day. | Firestone, R.W. (1985). The Fantasy Bond. Human Sciences Press. | Bowlby, J. (1980). Attachment and Loss Vol. 3: Loss, Sadness and Depression. Basic Books. | Van der Hart, O., Nijenhuis, E.R.S. & Steele, K. (2006). The Haunted Self: Structural Dissociation and the Treatment of Chronic Traumatization. Norton. | Main, M. & Hesse, E. (1990). Parents\' unresolved traumatic experiences are related to infant disorganized attachment status. In M. Greenberg, D. Cicchetti & E.M. Cummings (Eds.), Attachment in the Preschool Years. University of Chicago Press. | Fisher, J. (2017). Healing the Fragmented Selves of Trauma Survivors. Routledge. | Maté, G. (2019). When the Body Says No. Vermilion. | Walker, P. (2013). Complex PTSD: From Surviving to Thriving. Azure Coyote."]]
  },
  commstools: {
    title: "In the Moment — Communication Tools and Mantras",
    badge: "Communication & Repair",
    bc: "bg-emerald-50 border-emerald-200",
    tc: "bg-emerald-100 text-emerald-700",
    body: "These tools are for the moments when you are actually in it — when the conversation is happening, the dynamic is activated, and you need something concrete to say or do. None of these require the other person to cooperate. They are about what you can do from your side, regardless of what is happening on theirs. The goal is not to win. It is to stay in your own nervous system, hold your position, and not abandon yourself in the process.",
    secs: [["When someone dismisses or minimises your experience", "You do not need their agreement for your experience to be real. The temptation is to argue the point harder — to provide more evidence, more detail, more justification — but this usually escalates without resolving anything. Instead:\n\nSay less, not more. The more you explain, the more material there is to dismiss. A short, grounded statement repeated calmly is more effective than a long one said once.\n\nUseful phrases:\n\'My experience of it is different from yours.\' — and then stop. You do not need to fill the silence.\n\'I understand we see this differently.\' — this is not agreement. It is the refusal to keep arguing.\n\'I am not asking you to agree with me. I am telling you what it was like for me.\' — this closes the debate without closing the conversation.\n\nMantra: I do not need a witness to know what happened."], ["When someone is aggressive, loud or contemptuous", "Matching the energy makes it worse. The most disorienting and effective response to aggression is to slow down and become quieter rather than louder. The contrast forces the other person to attune to your register or to notice how alone they are in the elevated state.\n\nUseful approaches:\n— Lower your voice deliberately. Slow your words down. Relax your shoulders. This is not submission — it is regulation, and it signals that you are not available for this level of engagement.\n— Focus on the behaviour rather than the person: \'When the volume is this high I cannot follow the conversation. Can we bring it down?\' rather than \'You are being aggressive.\' The first describes an effect. The second invites a fight about whether they are aggressive.\n— If it continues: \'I am not able to continue this while it feels like this. I will come back to it when we can both be heard.\' Then follow through.\n\nMantra: Their volume is theirs. My steadiness is mine."], ["When you are being gaslighted", "Gaslighting works by destabilising your confidence in your own perception. The goal of the other person — conscious or not — is to make you doubt what you remember, what you felt, and what you know. The way through is not to argue the facts harder. It is to hold your own ground without engaging in the debate they are trying to create.\n\nUseful phrases:\n\'I remember it differently.\' — say this once, clearly, and then stop. If they push back, repeat it without elaboration: \'I understand that. I still remember it differently.\' Repetition is grounding. Explanation is invitation to continue the argument.\n\'That was not my experience of it.\' — again, said once, calmly, without justification.\n\'I am not going to debate what happened. I want to talk about what we do from here.\' — this refuses the gaslighter\'s territory (the past, which they can endlessly reshape) and moves to the present, where you have equal standing.\n\nMantra: I do not need to convince them. I already know what I know."], ["When someone stonewalls or goes silent", "Stonewalling is withdrawal from contact — the other person shuts down, goes quiet, or becomes unavailable in the middle of a conversation or conflict. The most common response is to pursue: to ask more questions, increase intensity, or try harder to get a response. This almost always makes it worse because pursuit activates further withdrawal.\n\nWhat works instead:\n— Stop pursuing. Give the withdrawal the space it is asking for. This is not giving up — it is refusing to reinforce the pattern.\n— One clear statement before stepping back: \'I am going to give you some space. I would like to know when we can pick this up.\' Then let it sit.\n— If the silence extends for days without any signal: \'The silence is making it hard for me to know where we are. I would like to hear from you by [specific time].\' This is a limit, not a threat.\n— If no response comes: the silence is itself the answer. It is painful information but it is information.\n\nMantra: Pursuing someone who is withdrawing is not connection — it is anxiety in motion."], ["When you need to set a limit in the moment", "A limit stated calmly and followed through is more powerful than one stated loudly and abandoned. The structure that works: name the behaviour, name the effect, name what you need, name the consequence if it continues — and then mean it.\n\nStructure:\n\'When you [specific behaviour] I [specific effect on you]. I need [specific change]. If [behaviour] continues, I am going to [specific consequence].\' Then follow through every single time. A limit that is not followed through teaches the other person that limits are negotiable.\n\nFor in-the-moment use:\n\'I am not going to continue this conversation while it feels like this.\' — and then step back.\n\'That does not work for me.\' — short, grounded, no justification required.\n\'I am going to need a moment before I respond to that.\' — this buys time and signals that you are not going to react from activation.\n\nMantra: I do not need to justify a limit. It is enough that I need it."], ["When someone takes credit, puts you down publicly or uses a backhanded compliment", "Public diminishment works by relying on your not wanting to make a scene. The most effective responses are calm, brief, and slightly slower than the energy of the room — which creates contrast and draws attention to what was said without escalating.\n\nWhen credit is taken: wait for the right moment rather than reacting immediately, then reintroduce your contribution clearly: \'I want to come back to something — when I was working on this, the aim was [x]. I am glad it has landed.\' You are not accusing. You are simply placing yourself back in the frame.\n\nWhen put down or mocked: ask them to repeat it. \'I am not sure I understood that — can you say it again?\' Most people will soften or withdraw what they said when required to repeat it deliberately. If they do repeat it: \'I am surprised by that.\' — and then leave a silence. You are not defending. You are letting them sit with what they said.\n\nWhen a backhanded compliment arrives: take only the compliment. \'You\'re right, it does look good.\' You are not engaging with the barb. You are refusing to let it land.\n\nMantra: I do not have to catch every ball that is thrown at me."], ["When someone is emotionally immature or will not hear you", "Some conversations cannot be resolved in the way you are hoping because the other person does not have the emotional capacity to meet you there right now. This is not a judgment — it is a clinical observation. When someone is operating from a defended, reactive, or immature emotional position, logic and explanation will not reach them because the barrier is not intellectual.\n\nWhat helps:\n— Stop trying to be understood and start trying to be clear. These are different goals. Understanding requires the other person\'s cooperation. Clarity only requires yours.\n— Ask what they are going to do rather than offering solutions: \'That sounds hard. What are you thinking of doing about it?\' This returns agency to them rather than inviting you to rescue or fix.\n— Empathy without enabling: \'I can hear that you\'re frustrated. I also think this is yours to work through.\' You are not dismissing the feeling. You are not taking responsibility for it.\n— Recognise when to stop: if the conversation is going in circles and nothing is shifting, naming it is more useful than continuing: \'I notice we keep arriving at the same place. I think we need to step back from this for now.\' Then step back.\n\nMantra: I can be kind and clear at the same time. They are not opposites."], ["Mantras for self-grounding in hard moments", "These are not affirmations in the positive-thinking sense. They are short, true statements to return to when the nervous system is activated and the old patterns are pulling hard. They work best when they are said slowly, internally, and treated as anchors rather than arguments.\n\nOn limits and reactions:\n\'Their reaction to my limit is not evidence that my limit is wrong.\' \n\'I can love someone and still hold a limit.\' \n\'Saying less is sometimes the most powerful thing I can do.\'\n\nOn self-trust:\n\'I do not need to defend what is true.\'\n\'My perception is real even when it is not agreed with.\'\n\'I was not imagining it.\'\n\nOn responsibility:\n\'Their emotional state is not my emergency.\'\n\'I am not responsible for managing how they receive what I need to say.\'\n\'Carrying this has been costing me. I am allowed to put it down.\'\n\nOn clarity:\n\'Clarity is not cruelty.\'\n\'Honest is not the same as unkind.\'\n\'I can be warm and still mean what I say.\'\n\nOn the process:\n\'This is hard because it matters, not because it is wrong.\'\n\'The discomfort of holding this limit will pass. The cost of abandoning it will stay.\'\n\'I have been here before and I have survived it.\'"], ["Cognitive defusion — creating distance from thoughts", "One of the most useful tools from Acceptance and Commitment Therapy. When a painful or self-critical thought arrives, instead of treating it as fact, you insert a layer of observation between you and the thought.\n\nInstead of: I am too much — say: I notice I am having the thought that I am too much.\nInstead of: They do not care — say: My mind is telling me they do not care.\nInstead of: I always end up here — say: There is a thought showing up that says I always end up here.\n\nThis is not positive thinking and it is not denial. The thought is still present. You are simply no longer fused with it — no longer treating it as a direct window onto reality. The thought becomes something you have rather than something you are.\n\nParticularly useful for the self-critical loop that runs during and after hard interactions — the replaying, the self-blame, the catastrophising about what was said."], ["Always to sometimes — challenging absolute language", "The language we use about ourselves and relationships encodes beliefs. Absolute terms like always, never, everyone, nobody, completely are rarely accurate and always costly — they generalise a single experience into a permanent truth and make it much harder to act differently.\n\nThe practice: when you notice absolute language, replace it with the accurate version.\n\nI always get this wrong -> I sometimes get this wrong.\nThey never listen -> They often do not listen in this kind of conversation.\nEveryone leaves eventually -> Some people I have been close to have left.\nI will never be able to hold a limit -> I have found limits very difficult so far.\n\nThis is not minimising — the original experience is still real. It is right-sizing the language so the nervous system does not treat one data point as a permanent law."], ["Double standards — the friend test", "A simple but consistently effective CBT tool. When the internal critic is running hard, ask: would I say this to a close friend in this situation?\n\nIf the answer is no — and it almost always is — ask: what would I say to them? Then say that to yourself instead.\n\nThe double standard is not a personal failing. It is a structural feature of how self-criticism works — we apply a standard of judgment to ourselves that we would never apply to someone we care about. The friend test makes the disparity visible, which is often enough to begin to shift it.\n\nExtended version: imagine your close friend came to you and described your exact situation, your exact behaviour, your exact struggle. Write down what you would say to them. Read it back as if it were addressed to you."], ["DEAR MAN — asking for what you need", "A DBT communication tool from Marsha Linehan for situations where you need to ask for something, set a limit, or say no — and you want to do it in a way that is clear without being aggressive.\n\nDescribe: state the situation factually, without interpretation. Just what happened.\nExpress: say how you feel about it. Own it as your feeling rather than a fact about them.\nAssert: say clearly what you want or do not want. Be direct.\nReinforce: briefly name why meeting your need is good for both of you.\nMindful: stay focused on your goal. Do not get pulled into side arguments.\nAppear confident: keep your voice steady and your posture open even if you do not feel it.\nNegotiate: be willing to explore alternatives if the first ask is not possible.\n\nMost useful for: making direct asks in situations where you have historically over-explained, apologised, or backed down before the conversation was finished."], ["FAST — keeping your self-respect", "A second DBT tool from Linehan. Where DEAR MAN is about getting what you need, FAST is about how you show up in the interaction — keeping your integrity regardless of the outcome.\n\nFair: be fair to yourself as well as the other person. Do not accept treatment that is not fair to you simply to preserve the relationship.\nApologies: only apologise when you have genuinely done something wrong. Apologising for existing, for having needs, or for the other person's discomfort is not an apology — it is self-erasure.\nStick to values: know what matters to you and let that guide what you agree to.\nTruthful: be honest. Do not agree to things you will not follow through on and do not pretend to feel things you do not feel.\n\nFAST is particularly relevant to patterns involving fawn and compliance — where the instinct is to apologise, accommodate, and agree in order to preserve the connection."], ["Radical acceptance — dropping the fight with reality", "Rooted in DBT and Buddhist philosophy. Radical acceptance does not mean approving of what happened or deciding it was acceptable. It means fully acknowledging reality as it is rather than as you wish it were — and stopping the additional suffering caused by fighting against what cannot be changed.\n\nThe suffering in many relational patterns has two layers: the pain of what actually happened, and the pain of continuing to resist the reality of what happened. Radical acceptance addresses the second layer.\n\nPracticed in the moment it sounds like:\n\'This is what is happening. I do not have to like it. I accept that it is real.\'\n\'I cannot change what they are. I can change what I do from here.\'\n\'The past cannot be different. What I do now can be.\'\n\nIt is not resignation. It is the release of energy that was being used to fight reality — energy that can then be used to respond to it.\n\nRadical acceptance often has to be practiced many times before it takes hold. Each time the resistance returns, acknowledge it and return to the acceptance. It is a practice, not a single decision."], ["In-the-moment tools from the wider toolkit", "These are drawn from CBT, DBT, ACT and NLP and work well alongside the communication strategies above.\n\nSTOP — when you feel yourself about to react from activation: Stop what you are doing. Take one slow breath. Observe what is happening in your body, your thoughts, and the room. Then Proceed with awareness rather than reaction. The gap between stimulus and response is where your power is.\n\nTIPP — for high distress states when the nervous system is flooded: Temperature (cold water on wrists or face to rapidly lower arousal), Intense movement (shake, walk fast, throw a scrunched paper ball — burn off the emotional energy physically), Paced breathing (slow extended exhale), Paired muscle relaxation (tense a muscle group hard for 5 counts, then release completely). Any one of these works. All four together is very fast.\n\nPattern Interrupt — when you notice yourself going down the loop: physically break it before it completes. Clap your hands sharply, stand up abruptly, change rooms, say something out loud, jump. The physical disruption interrupts the neural pathway mid-route. It works because the rumination loop is partly motor — it needs the body to stay still and the attention to stay internal. Movement removes both conditions.\n\nUrge Surfing — for the urge to
