 The person who complains that their partner never listens may find they are doing a lot of explaining and very little asking. The person who feels disrespected may find they are not naming the disrespect directly but hoping it will be noticed.\\n\\nThis is not blame — it is leverage. If you are contributing to the pattern, even in a small way, that means there is something within your reach to change. That is more useful than being entirely at the effect of what someone else is or is not doing.\\n\\nIn practice this means: before asking the other person to change, identify one thing in your own behaviour that might be sustaining the pattern. Not because the problem is your fault, but because that is where your actual power is."]]\n  },\n  distortions: {\n    title: "Cognitive Distortions",\n    badge: "Cognitive Distortions",\n    bc: "bg-sky-50 border-sky-200",\n    tc: "bg-sky-100 text-sky-700",\n    body: "Cognitive distortions are systematic patterns of thinking that are biased away from reality. Aaron Beck first identified them in the 1960s while developing cognitive therapy for depression. David Burns expanded and popularised the framework in his clinical work. Albert Ellis developed a parallel model through Rational Emotive Behaviour Therapy, identifying what he called irrational beliefs. Martin Seligman contributed the explanatory styles framework — how people habitually explain setbacks to themselves. Together these theorists mapped the cognitive architecture of emotional suffering. They are not character flaws — they are habits of mind, often learned in environments where they were adaptive. Recognising them is the first step to challenging them. The goal is not to replace them with forced positivity but with more accurate, balanced thinking.",\n    secs: [["All-or-nothing thinking", "Seeing things in black and white, with no middle ground. If something is not perfect it is a total failure. If someone is not completely trustworthy they are entirely untrustworthy. This distortion is particularly active in the perfectionist patterns — Never Good Enough, The Performance, Unrelenting Standards — where partial success is experienced as failure.\\n\\nChallenge: Where is the grey here? What would a more accurate spectrum look like? What percentage would I actually give this rather than 0 or 100?"], ["Overgeneralisation", "Taking a single negative event and treating it as a never-ending pattern. One rejection becomes nobody will ever want me. One mistake becomes I always get things wrong. The key words are always, never, everyone, nobody, everything, nothing.\\n\\nChallenge: Is this actually always true, or does it feel that way right now? What would the evidence look like if I counted carefully?"], ["Mental filter", "Picking out a single negative detail and dwelling on it exclusively, so that it colours the entire picture. Like a drop of ink in a glass of water — one critical comment at a meeting makes the whole day a failure despite ten things going well.\\n\\nChallenge: What am I filtering out? If I were a fair witness to the whole picture, what else would I include?"], ["Discounting the positive", "Rejecting positive experiences by insisting they do not count. You did well because it was easy. They said something kind but they were just being polite. This distortion is self-sustaining because it makes the negative evidence permanent and the positive evidence meaningless.\\n\\nChallenge: What would I think if a friend dismissed their achievement the way I am dismissing mine? Would I accept their reasoning?"], ["Jumping to conclusions", "Making a negative interpretation without actual supporting evidence. Mind reading: assuming you know what someone else is thinking, usually negatively. Fortune telling: predicting that things will turn out badly and treating the prediction as fact.\\n\\nChallenge: What is the actual evidence for this interpretation? What are two or three other possible explanations?"], ["Magnification and minimisation", "Exaggerating the importance of problems and shortcomings, or minimising the significance of positive qualities and events. Also called catastrophising — turning a mistake into a disaster, a difficulty into an impossibility.\\n\\nChallenge: If I put this on a scale of 0 to 100 where 100 is the worst thing that could happen to a person, what number does this actually deserve? What would I tell a friend in this situation?"], ["Emotional reasoning", "Assuming that negative emotions necessarily reflect the way things really are. I feel it therefore it must be true. I feel stupid therefore I am stupid. I feel guilty therefore I must have done something wrong. I feel afraid therefore there must be real danger.\\n\\nChallenge: Feelings are real but they are not always accurate maps of reality. What would the evidence say, separate from how it feels?"], ["Should statements", "Motivating yourself with should and should not, must, ought, and have to. When directed at yourself this produces guilt and shame. When directed at others it produces frustration and resentment. Albert Ellis called this musturbation — the rigid insistence on how things must be.\\n\\nChallenge: Why should I? Says who? What would happen if I replaced should with I would like to or it would be helpful if?"], ["Labelling", "An extreme form of overgeneralisation. Instead of saying I made a mistake, you say I am a failure. Instead of they did something hurtful, you say they are a bad person. The label is a global negative judgment on the entire self or the other person based on a single event.\\n\\nChallenge: What specifically happened? What did I or they do, rather than what am I or they?"], ["Personalisation and blame", "Holding yourself responsible for things that are not fully within your control. Seeing yourself as the cause of external events you were not primarily responsible for. Or the reverse — blaming other people entirely and not considering your own contribution.\\n\\nChallenge: What were all the factors that contributed to this? What is my actual percentage of responsibility — not 0 and not 100?"], ["The 3 Ps — Permanence, Pervasiveness and Personalisation", "Martin Seligman identified three explanatory styles that determine how people respond to adversity. Permanence: believing the negative will last forever versus seeing it as temporary. Pervasiveness: believing the negative affects everything versus just this situation. Personalisation: believing it is entirely your fault versus seeing it as partly situational.\\n\\nThe most resilient explanatory style is: this is temporary, it is specific to this situation, and I am not the only cause. The most depressive style is: this is permanent, it poisons everything, and it is entirely my fault.\\n\\nChallenge: Is this permanent or temporary? Is it specific or pervasive? How much is me and how much is situation?"], ["References", "Beck, A.T. (1979). Cognitive therapy of depression. Guilford Press. | Burns, D.D. (1980). Feeling good: The new mood therapy. William Morrow. | Burns, D.D. (1989). The feeling good handbook. William Morrow. | Ellis, A. & Harper, R.A. (1975). A new guide to rational living. Prentice Hall. | Seligman, M.E.P. (1991). Learned optimism. Knopf. | Vivyan, C. (2009). Unhelpful thinking styles. Get Self Help. | Beck, J.S. (2011). Cognitive behaviour therapy: Basics and beyond (2nd ed.). Guilford Press."]]\n  },\n  selfcare: {\n    title: "Self-Care — Restoring the System",\n    badge: "Self-Care",\n    bc: "bg-lime-50 border-lime-200",\n    tc: "bg-lime-100 text-lime-700",\n    body: "Self-care is not indulgence. It is the maintenance of the system that everything else runs on. When the nervous system is chronically activated — by patterns of over-responsibility, emotional neglect, boundary violation, or relentless self-monitoring — the body and mind need consistent, deliberate replenishment. This is not optional for people doing relational healing work. It is the foundation.",\n    secs: [["Body and physical restoration", "Movement that belongs to you alone — walking, running, swimming, yoga, dancing in your kitchen. The body holds the relational patterns somatically and movement is one of the most reliable ways to discharge what has accumulated. Regular exercise is one of the most evidence-based interventions for mood, anxiety, and nervous system regulation.\\n\\nRest without agenda — sleeping in, a bath with candles, doing nothing at all. Rest is not laziness. For people who were parentified, who over-function, or who were only valued for what they produced, the capacity to rest without earning it first is often genuinely difficult. Practice it as a skill.\\n\\nSensory pleasure — aromatherapy, massage, a sauna, a long walk in the woods, the first sip of morning coffee. The sensory system is the fastest route to the present moment. Pleasure is not trivial — it is the nervous system learning that the world is not only threatening."], ["Connection and creativity", "Connection with people who are genuinely safe — not people you manage, maintain, or perform for. Real connection, which involves being known rather than useful. Chatting with a friend who hears you. Debriefing with someone who gets it.\\n\\nCreativity in any form — cooking without pressure, gardening, music, singing, writing, craft, photography. Creativity is not about skill. It is about engagement, expression, and the experience of making something that did not exist before. This activates parts of the self that purely relational or cognitive work does not reach.\\n\\nHumour and lightness — stand-up comedy, sharing a joke, watching something funny. Laughter is physiologically regulatory — it activates the social engagement system, releases tension, and is incompatible with sustained threat activation."], ["Reflection and meaning", "Journalling — not necessarily to process difficulty but simply to notice your own experience. What am I thinking? What do I want? What happened today? Giving your inner world a place to exist in words.\\n\\nGratitude practice — identifying one good thing at the end of each day, however small. Not toxic positivity but genuine noticing of what was present. This is not about denying difficulty — it is about training the attention not to filter exclusively for threat.\\n\\nInspirational reading, purposeful learning, attending workshops. The part of you that wants to understand, to grow, to make meaning of what you have experienced deserves investment."], ["Boundaries with input", "Leaving the computer off sometimes. Avoiding news cycles that activate without informing. Social media breaks. The nervous system cannot distinguish between a threat in the room and a threat on a screen — sustained media exposure keeps the system in a low-level state of alertness that compounds everything else.\\n\\nSilence. Time alone that is genuinely restorative rather than lonely. For people who have spent their lives attending to others\' states, silence is where the authentic self can be heard."], ["Reconnecting with nature as regulation", "Nature contact is one of the most underused and most evidence-supported regulation tools available. It requires no equipment, no skill, and no particular effort — only the willingness to be present in the natural world for a period of time without an agenda.\\n\\nAimless outdoor time — going outside without a purpose or destination, without a task to complete or a destination to reach. This is specifically counter to how most people with activated nervous systems habitually move through the world. For those who were only valued for what they produced, the capacity to be genuinely aimless is itself a practice. Start with a short period — even ten minutes — and allow the eyes to move without direction.\\n\\nSensory immersion — focus on what you can hear in the natural environment: wind, rain, birds, water. Turn off media and simply listen. Notice colour as it changes through the seasons, light through leaves, the texture of bark or stone. The sensory system is the fastest route to the present moment, and nature provides an endlessly renewable sensory environment that makes no demands in return.\\n\\nWalking as regulation — a deliberate walk with attention on the connection between feet and ground, the feel of air on skin, the rhythm of the body moving. This is different from walking as exercise or as transport. It is walking as a way of returning to the body. The bilateral rhythm of walking has been shown to assist with emotional processing — this is part of why EMDR uses bilateral stimulation and why many people find that difficult conversations are easier on a walk than sitting still.\\n\\nBringing the outside in — when outdoor access is limited, fresh air through an open window, a plant on a windowsill, natural textures and materials, the sound of rain. The body responds to sensory cues from the natural world even in small doses.\\n\\nThe research base for nature contact as a mental health intervention is now substantial. Time in natural environments reduces cortisol, lowers blood pressure, improves mood, and activates the parasympathetic nervous system. This is not metaphorical. The body is part of the natural world and responds to it as such."], ["Self-validation", "Validating yourself — to yourself and to people you trust. Acknowledging your own experience before you seek acknowledgement from others. The practice of being a fair witness to yourself rather than applying a harsher standard than you would apply to anyone else.\\n\\nBuying yourself flowers. Small gestures of care directed at yourself rather than always outward. The question worth asking is: do I give to myself with the same generosity that I give to others? If not — that gap is both a symptom of the patterns and a place to begin repairing them."]]\n  },\n  stresstrauma: {\n    title: "Stress, Trauma and Complex Trauma",\n    badge: "Stress vs Trauma",\n    bc: "bg-violet-50 border-violet-200",\n    tc: "bg-violet-100 text-violet-700",\n    body: "The words stress and trauma are used interchangeably in everyday language but they describe significantly different things clinically. The distinction matters because the tools that help, and the timescale of recovery, are different for each.",\n    secs: [["Stress — a response to demand", "Stress is the nervous system responding to a demand that exceeds available resources — a deadline, a conflict, a period of overload. Stress is normal, universal, and in moderate amounts adaptive. It sharpens focus and mobilises the system to meet the challenge.\\n\\nThe key feature of stress is that it resolves. When the demand passes, the nervous system returns to baseline. Cortisol drops. The muscles release. The mind quietens.\\n\\nChronic stress occurs when the demands do not pass. The system remains mobilised for weeks or months, producing cumulative harm: immune depletion, hormonal disruption, sleep problems, cognitive impairment, mood instability. But it is still, in principle, a response to a current situation. Change the situation and the stress begins to resolve.\\n\\nThe practical test: Is the nervous system responding to something actually happening now? If reducing the demand would reduce the response — that is stress."], ["Trauma — when the past stays present", "Trauma occurs when an experience overwhelms the nervous system\'s capacity to process and integrate it. The event is too much, too fast, too soon, or too repeated. The ordinary mechanisms for filing an experience into memory and moving on do not complete. The event stays live — encoded in the body and the nervous system — as if it were still happening.\\n\\nThe defining feature of trauma is not what happened. It is what happens inside the person as a result. Two people can experience the same event and one is traumatised and one is not, depending on their developmental history, available support, and the state of their nervous system at the time.\\n\\nBessel van der Kolk describes trauma as the body continuing to mobilise in response to a threat that is no longer present. The nervous system is responding accurately to its internal state — but that internal state reflects the past, not the present. This is why trauma reactions can appear disproportionate to the current situation. They are not disproportionate to what they are actually responding to.\\n\\nSingle-incident trauma — a car accident, an assault, a sudden loss — produces PTSD symptoms: intrusive memories, hypervigilance, avoidance, emotional numbing. With good support it can be processed and integrated."], ["Complex trauma — when it happened over time", "Complex trauma (C-PTSD) is different from single-incident PTSD in important ways not yet fully reflected in mainstream diagnostics.\\n\\nComplex trauma is developmental — it occurs during childhood within the attachment relationship itself. Not a single overwhelming event but repeated, chronic experience of neglect, emotional unavailability, inconsistency, abuse, enmeshment, or parentification. Because it happens during the period when the nervous system, brain, and attachment architecture are being formed, it shapes the very structures through which the person later experiences the world.\\n\\nThe effects of complex trauma are therefore not primarily symptoms following a remembered event. They are structural — built into the nervous system baseline, the relational templates, the sense of self, and the capacity for emotional regulation.\\n\\nMany people with complex developmental trauma do not identify as traumatised because there was no single dramatic incident to point to. The harm was ambient — the cumulative effect of a thousand ordinary interactions in which the child\'s authentic self was not seen, met, or safe. This is among the most important things to understand about developmental trauma: the absence of something that should have been there is just as formative as the presence of something that should not have been.\\n\\nJudith Herman, who described complex PTSD in 1992, identified the core features: difficulties with emotional regulation, disturbances of consciousness and memory, changes in self-perception, disturbances in relations with others, alterations in systems of meaning. These are not symptoms of an event. They are the architecture of a self that had to adapt to an environment that could not support its development."], ["Why the distinction matters", "If someone is experiencing stress, the intervention is environmental and behavioural — reduce the demand, restore resources, regulate the acute activation. The nervous system can return to baseline because it was functioning from baseline before.\\n\\nIf someone is experiencing trauma, the intervention needs to reach further back. The nervous system is not returning to a regulated baseline because it never had a stable regulated baseline to return to. The relational patterns in this app — the over-responsibility, the eggshell-walking, the disappearing, the compulsive caretaking, the loop — are not responses to current stress. They are old architecture. They were built in conditions that no longer exist, but the nervous system does not know that yet.\\n\\nThis is why insight alone is rarely enough. Understanding the pattern does not automatically dissolve it. The nervous system needs repeated new experience — particularly within safe relationship — to build the neural pathways that were never laid down. This is slower than insight. It is also more durable.\\n\\nAnd it is possible. The hippocampus grows new neurons throughout life. The nervous system can learn. The window of tolerance can widen. The fantasy bond can be grieved. The parts carrying the old material can be met and allowed to rest."], ["References", "Herman, J. (1992). Trauma and recovery. Basic Books. | van der Kolk, B. (2014). The body keeps the score. Viking. | Walker, P. (2013). Complex PTSD: From surviving to thriving. Azure Coyote. | Porges, S.W. (2011). The polyvagal theory. Norton. | Fisher, J. (2017). Healing the fragmented selves of trauma survivors. Routledge."]]\n  }\n};\n\n// ── ATTACHMENT INFO ──────────────────────────────────────────────────\nvar ATT = {\n  "Anxious": {\n    title: "Anxious attachment",\n    short: "You pursue connection and fear losing it",\n    desc: "Develops when caregiving was inconsistent - sometimes warm, sometimes unavailable. You learned to stay hypervigilant and manage others\' emotions to feel safe. The nervous system stays activated, scanning for signs that connection might disappear.",\n    traits: ["Preoccupied with the relationship", "Seeks reassurance frequently", "Interprets silence or distance as danger", "Tends to over-explain, over-give, or over-apologise"],\n    schemas: "Abandonment/Instability, Emotional Deprivation, Dependence/Incompetence",\n    change: "Practise waiting before responding. Notice when you are reacting to fear rather than reality. Consistency in yourself builds security over time."\n  },\n  "Disorganised": {\n    title: "Disorganised attachment",\n    short: "Closeness feels both needed and unsafe",\n    desc: "Develops when the caregiver was also the source of fear. You learned both to seek and to flee connection. There is no clean strategy - just confusion.",\n    traits: ["Approach-withdraw cycles", "Difficulty trusting closeness", "Oscillates between clinging and pushing away", "Confusion about what safe feels like"],\n    schemas: "Mistrust/Abuse, Abandonment, Defectiveness/Shame, Enmeshment",\n    change: "Small consistent experiences of safety begin to rewire the pattern. You do not have to resolve the confusion - you just have to stay with it long enough to learn something new."\n  },\n  "Anxious / Disorganised": {\n    title: "Anxious / Disorganised",\n    short: "You crave closeness but it also feels dangerous",\n    desc: "A combination of anxious pursuit and disorganised fear. You want connection intensely but when it gets close it can feel threatening. The nervous system swings between activation and confusion.",\n    traits: ["Intense desire for closeness paired with fear of it", "High emotional reactivity", "Unpredictable responses to intimacy", "Difficulty settling even in safe relationships"],\n    schemas: "Abandonment, Mistrust/Abuse, Vulnerability to Harm, Emotional Deprivation",\n    change: "Notice when closeness activates fear rather than comfort. That is information about history, not about the present person."\n  },\n  "Fawn": {\n    title: "Fawn response",\n    short: "You learned to stay safe by making others comfortable",\n    desc: "A nervous system survival pattern. You learned to manage threat by becoming agreeable, accommodating, and self-erasing. Compliance became the strategy for staying safe.",\n    traits: ["Overriding your own needs", "Difficulty saying no", "Automatic accommodation under pressure", "Losing track of what you actually want"],\n    schemas: "Subjugation, Self-Sacrifice, Approval-Seeking, Emotional Inhibition",\n    change: "Your needs are legitimate. Practise noticing what you actually want before responding. Disagreement is not the same as danger."\n  },\n  "Fawn / Disorganised": {\n    title: "Fawn / Disorganised",\n    short: "You cope through compliance but closeness still feels unsafe",\n    desc: "A combination of people-pleasing and disorganised attachment. You learned to survive through compliance while carrying the confusion of caregiving that was unpredictable or frightening.",\n    traits: ["Self-erasure under pressure", "Confusion about your own needs", "Difficulty distinguishing care from control", "Body signals frequently overridden"],\n    schemas: "Subjugation, Defectiveness/Shame, Emotional Inhibition, Mistrust/Abuse",\n    change: "Your body signals are real. When something contracts or tightens, that is information. You do not have to override it."\n  },\n  "Anxious pursuit or avoidant shutdown": {\n    title: "Anxious pursuit or avoidant shutdown",\n    short: "Loss activates either chasing or shutting down",\n    desc: "When someone withdraws, your nervous system moves to one of two poles - urgent pursuit or complete shutdown. Both are protective responses to abandonment.",\n    traits: ["Alternates between chasing and detaching", "Difficulty tolerating uncertainty", "Withdrawal feels like final rejection", "Body either activates sharply or goes flat"],\n    schemas: "Abandonment/Instability, Emotional Deprivation, Mistrust/Abuse",\n    change: "Space is not always abandonment. Sit with the discomfort before acting. The urge to chase or disappear will pass."\n  }\n};\n\n// ── DEVELOPMENTAL INFO ───────────────────────────────────────────────\nvar DEV = {\n  "Inconsistent caregiving": {\n    title: "Inconsistent caregiving",\n    desc: "Your early caregiving was unpredictable - sometimes warm, sometimes unavailable. Your nervous system learned urgency: love might disappear so it must be secured quickly when it appears.",\n    impact: "Urgency in new connections, difficulty tolerating ordinary pace, interpreting distance as withdrawal.",\n    change: "Consistency, not intensity, is the real signal of safety. You can slow down and still be chosen."\n  },\n  "Deprivation + intensity bonding": {\n    title: "Deprivation and intensity bonding",\n    desc: "Emotional connection was scarce, and when it appeared it came with overwhelming intensity. Your nervous system learned to associate flooding and overwhelm with real intimacy.",\n    impact: "Drawn to intense charged connections. Calm consistent care can feel boring or suspicious.",\n    change: "Quiet consistent connection is real. Calm is not the absence of love."\n  },\n  "Emotional unavailability": {\n    title: "Emotional unavailability",\n    desc: "Caregivers were physically present but emotionally absent. You learned to fill the gaps, read the room, and manage your own experience without support.",\n    impact: "Skilled at decoding others but at the cost of your own clarity and needs.",\n    change: "You are allowed to ask for what you need. Clarity is not demanding."\n  },\n  "Conditional approval": {\n    title: "Conditional approval",\n    desc: "Love was tied to performance - being good enough or agreeable enough. You learned that who you are might not be enough but what you do might earn connection.",\n    impact: "Self-worth becomes externally located, scanning constantly for whether you are measuring up.",\n    change: "You do not have to earn your place. Your worth is not contingent on performance."\n  },\n  "Volatile caregiving": {\n    title: "Volatile caregiving",\n    desc: "Your early environment was unpredictable in tone - caregivers could shift from warmth to anger without obvious cause. You learned to monitor and fix before your own needs could surface.",\n    impact: "Highly attuned to others\' mood states, compelled to manage them before they escalate.",\n    change: "Other people\'s emotional states are not yours to fix or pre-empt."\n  },\n  "Safe/unsafe caregiving": {\n    title: "Safe and unsafe caregiving",\n    desc: "Your primary caregiver was sometimes a source of safety and sometimes a source of fear. The person meant to soothe you also activated your threat system.",\n    impact: "Closeness becomes both desired and frightening. Your nervous system may approach and withdraw in the same moment.",\n    change: "It is possible for closeness to be consistently safe. This takes time and corrective experience."\n  },\n  "Emotional neglect": {\n    title: "Emotional neglect",\n    desc: "Your emotional needs were not seen or responded to. You may have had material care but not attunement - no one tracked what you were feeling.",\n    impact: "Minimising your own needs, earning care through effort, giving more than you receive.",\n    change: "Your needs are real and legitimate. You do not have to earn care."\n  },\n  "Parentification": {\n    title: "Parentification",\n    desc: "As a child you were required to take responsibility for a caregiver\'s emotional state. You became the one who held things together.",\n    impact: "Highly attuned to others\' suffering, compelled to fix or rescue, difficulty receiving care yourself.",\n    change: "Care without losing yourself is possible. Other people\'s pain is not evidence that you must act."\n  },\n  "Intrusive caregiving": {\n    title: "Intrusive caregiving",\n    desc: "Caregiving involved crossing your limits - control disguised as love, criticism as care. You learned to adjust yourself to fit.",\n    impact: "Struggling to trust your own perceptions, overriding body signals, questioning whether discomfort is valid.",\n    change: "Your body signals are real. Discomfort is information, not overreaction."\n  },\n  "Boundary violation": {\n    title: "Boundary violation",\n    desc: "Your physical or emotional limits were not respected. You learned that your no either did not matter or was not safe to express.",\n    impact: "Disconnecting from body signals, overriding discomfort, complying with things that do not feel right.",\n    change: "You are allowed to move at your own pace. Your body is yours."\n  },\n  "Abandonment / lack of repair": {\n    title: "Abandonment and lack of repair",\n    desc: "Early experiences of significant loss or caregivers who disappeared without repair. Ruptures were not resolved.",\n    impact: "Withdrawal from others triggers urgent activation or complete shutdown.",\n    change: "Disconnection is not always permanent. Some space is just space. The urge to chase or shut down is old learning."\n  }\n};\n\n// ── SCHEMA INFO ──────────────────────────────────────────────────────\nvar SCHEMA = {\n  "Abandonment / Instability": {\n    domain: "Disconnection and Rejection",\n    desc: "The belief that people you rely on will eventually leave or become unpredictable. Based on caregiving that was available sometimes and absent at others.",\n    nc: "I am not lovable, people will always leave, I cannot get what I want",\n    pc: "I can create stability within myself, not everyone leaves, I can slow down and still be chosen"\n  },\n  "Emotional Deprivation": {\n    domain: "Disconnection and Rejection",\n    desc: "The belief that your need for emotional support, nurture, and empathy will never be adequately met. Often develops alongside emotional neglect.",\n    nc: "My needs are too much, no one will truly understand me, I must manage alone",\n    pc: "My emotional needs are legitimate, I deserve to be understood, I can ask for what I need"\n  },\n  "Mistrust / Abuse": {\n    domain: "Disconnection and Rejection",\n    desc: "The expectation that others will hurt, manipulate, or betray you. Arises from caregiving that was itself a source of fear. Positive signals get filtered as manipulation.",\n    nc: "People will hurt me eventually, I cannot trust anyone, I am in danger",\n    pc: "I can learn to choose whom to trust, I am safe now, not everyone causes harm"\n  },\n  "Defectiveness / Shame": {\n    domain: "Disconnection and Rejection",\n    desc: "The belief that you are fundamentally flawed and that if others saw the real you, they would reject you. The surface self-sufficiency of dismissing attachment often covers this.",\n    nc: "I am shameful, I am a bad person, if they knew the real me they would leave",\n    pc: "I am worthy of love, my true self is acceptable, I do not have to hide"\n  },\n  "Enmeshment / Undeveloped Self": {\n    domain: "Impaired Autonomy",\n    desc: "A sense of fusion with significant others - inability to have a clear separate identity. The self is defined by others\\\' needs.",\n    nc: "I don\'t know who I am without them, I cannot function independently",\n    pc: "I can be close and still be myself, my needs and identity matter"\n  },\n  "Dependence / Incompetence": {\n    domain: "Impaired Autonomy",\n    desc: "The belief that you are unable to handle everyday responsibilities without help from others.",\n    nc: "I cannot manage alone, I am powerless, I need others to function",\n    pc: "I am capable, I can handle this, I have resources I can trust"\n  },\n  "Vulnerability to Harm": {\n    domain: "Impaired Autonomy",\n    desc: "The exaggerated fear that catastrophe is imminent. The nervous system stays in threat-scanning mode even when the environment is safe.",\n    nc: "Something terrible is about to happen, I am in danger, I cannot cope",\n    pc: "I am safe right now, I have coped before, not all uncertainty leads to harm"\n  },\n  "Subjugation": {\n    domain: "Other-Directedness",\n    desc: "The excessive surrendering of control to others to avoid their anger or abandonment. The person suppresses their own choices, desires, and emotions.",\n    nc: "My needs do not matter, I cannot stand up for myself, if I say what I want I will lose them",\n    pc: "My needs matter, I can express my preferences safely, my voice is legitimate"\n  },\n  "Self-Sacrifice": {\n    domain: "Other-Directedness",\n    desc: "The excessive focus on meeting others\\\' needs at the expense of your own. Often driven by sensitivity to others\' pain or fear that expressing needs will lose care.",\n    nc: "I must put others first, my needs are selfish, their pain is my responsibility",\n    pc: "My needs matter too, care includes caring for myself, I can give without losing myself"\n  },\n  "Emotional Inhibition": {\n    domain: "Overvigilance and Inhibition",\n    desc: "The excessive inhibition of spontaneous feeling or communication to avoid disapproval or loss of control. Emotions became associated with risk.",\n    nc: "It is not OK to feel my emotions, showing feelings leads to rejection, I must stay in control",\n    pc: "My emotions are safe, I can feel and remain okay, vulnerability is not weakness"\n  },\n  "Unrelenting Standards": {\n    domain: "Overvigilance and Inhibition",\n    desc: "The belief that you must meet very high standards to avoid criticism. Often compensates for underlying shame - when emotional worth is unavailable, achievement becomes the currency.",\n    nc: "I must be perfect, I am a failure, nothing I do is ever enough",\n    pc: "I can be good enough, my worth is not conditional on performance, rest is not failure"\n  }\n};\n\n// ── IFS PARTS ────────────────────────────────────────────────────────\nvar PARTS = {\n  "Pleaser / Fawner": {\n    type: "Manager",\n    desc: "Maintains safety through compliance and self-erasure. Prevents the Abandonment exile from activating by ensuring there is no risk of rejection. In childhood this protected from a caregiver\'s anger by making sure there was nothing to be angry about.",\n    gift: "Sensitivity to others, genuine care, attunement",\n    cost: "Loss of self, chronic exhaustion, resentment that builds below awareness",\n    belief: "If I please everyone I will be safe and loved.",\n    hear: "Your needs matter. You can be yourself and still be loved."\n  },\n  "Perfectionist": {\n    type: "Manager",\n    desc: "Sets impossibly high standards to prevent the Defectiveness exile from being confirmed. If the standard is never met, failure is always the bar\'s fault. Emerged when achievement was the only reliable path to approval.",\n    gift: "High quality work, attention to detail, genuine striving",\n    cost: "Paralysis, procrastination, harsh self-criticism after any setback",\n    belief: "If I am perfect enough I will be safe from rejection and shame.",\n    hear: "You are enough as you are. Excellence is not the same as worth."\n  },\n  "Reassurance Seeker": {\n    type: "Firefighter",\n    desc: "Repeatedly seeks confirmation that the relationship is intact. Activates after the Abandonment exile is triggered - often by a delayed reply or slightly cooler tone.",\n    gift: "Genuine desire for connection, honest need for contact",\n    cost: "Exhausting for both parties, checking cycles that escalate, confirms that internal calm is unavailable",\n    belief: "If they reassure me I will be okay.",\n    hear: "You can find moments of safety within yourself while waiting. The urge to check will pass."\n  },\n  "Care Taker": {\n    type: "Manager",\n    desc: "Keeps attention and energy directed outward toward others\\\' needs. Prevents the Emotional Deprivation exile from surfacing by ensuring the person is always giving rather than needing.",\n    gift: "Genuine generosity, attunement to others, meaningful contribution",\n    cost: "Depletion, difficulty receiving, own needs go chronically unmet",\n    belief: "As long as I am giving I am safe and needed.",\n    hear: "You deserve care too. Receiving is not weakness."\n  },\n  "Fixer": {\n    type: "Manager",\n    desc: "Monitors and works to stabilise unpredictable or distressing situations. Prevents the Vulnerability exile by ensuring there is always a strategy or intervention to try.",\n    gift: "Problem-solving capacity, resilience, determination",\n    cost: "Constant vigilance, staying in situations longer than is safe",\n    belief: "If I find the right approach I can make this safe.",\n    hear: "Some things are not yours to fix. Letting go is not failure."\n  },\n  "Controlling": {\n    type: "Manager",\n    desc: "Manages the environment and others to prevent unpredictability. When chaos created danger in childhood, this part emerged to impose order because order felt like safety.",\n    gift: "Organisation, reliability, clear thinking under pressure",\n    cost: "Relational friction, difficulty delegating, anxiety when control is absent",\n    belief: "If I can control this I am safe.",\n    hear: "Uncertainty is not the same as danger. You can tolerate not knowing."\n  },\n  "Critical": {\n    type: "Manager",\n    desc: "Attacks the self before others can - managing shame pre-emptively. In childhood self-criticism was often less painful than external criticism and may have been modelled by a caregiver.",\n    gift: "High standards, genuine self-reflection",\n    cost: "Chronic self-attack, procrastination, shame cycles that deepen rather than motivate",\n    belief: "If I criticise myself first their criticism will hurt less.",\n    hear: "You do not need to punish yourself. Mistakes are information, not evidence of worthlessness."\n  },\n  "Avoidant": {\n    type: "Manager",\n    desc: "Prevents engagement with anything that could trigger the exile. The most generalised protective strategy. Behind every form of schema avoidance including procrastination, numbness, and social withdrawal.",\n    gift: "Protection in genuinely unsafe situations",\n    cost: "Life shrinks, connections lost, the exile grows more powerful through never being approached",\n    belief: "If I stay away from what hurts I am safe.",\n    hear: "Avoiding the pain keeps the wound open. Gentle approach at your own pace is how it heals."\n  },\n  "Intellectualises": {\n    type: "Manager",\n    desc: "Converts emotional experience into cognitive analysis, bypassing the felt sense entirely. Found in dismissing attachment where emotional expression was consistently met with withdrawal.",\n    gift: "Intelligence, analytical capacity, ability to understand patterns",\n    cost: "Disconnection from the body, emotional intimacy becomes difficult",\n    belief: "If I think about it enough I won\'t have to feel it.",\n    hear: "Your feelings are safe. Understanding and experiencing are both needed."\n  },\n  "Angry": {\n    type: "Firefighter",\n    desc: "Uses anger to protect the exile as protest when abandonment is detected, or as a wall against vulnerability. Often carries years of suppressed legitimate anger from an environment where anger was not safe.",\n    gift: "Healthy boundary-setting, self-advocacy, sense of justice",\n    cost: "Disproportionate reactions, relational ruptures, shame after the fire passes",\n    belief: "If I am angry enough I am protected. No one can hurt what they cannot reach.",\n    hear: "Your anger is valid. It does not need to be the only voice in the room."\n  },\n  "Dependent": {\n    type: "Firefighter",\n    desc: "Organises life around another person to prevent the Loneliness and Emotional Deprivation exiles from surfacing. The attachment system runs through this one person.",\n    gift: "Capacity for deep attachment, loyalty, prioritising connection",\n    cost: "Loss of self in relationship, catastrophic response to separation",\n    belief: "As long as they are here I am okay.",\n    hear: "You have an inner life that belongs to you. Others can be cherished without being the foundation."\n  },\n  "Freeze Part": {\n    type: "Firefighter",\n    desc: "From Janina Fisher\'s Structural Dissociation model - the part that carries shame, passivity, and submission. Closes the system down when activation becomes too great. Manifests as numbness, low energy, hopelessness.",\n    gift: "Protection from overwhelm, stillness",\n    cost: "Depression, inability to act, dissociation from life",\n    belief: "If I go very still the danger might pass.",\n    hear: "You do not need to disappear to be safe. Stillness and shutdown are not the same."\n  },\n  "Pessimistic": {\n    type: "Manager",\n    desc: "Predicts negative outcomes to prevent hope and the pain of disappointment. If you never expect good things you can never be devastated when they fail to arrive.",\n    gift: "Realism, protection from naive risk",\n    cost: "Self-fulfilling prophecy, opportunities declined, chronic low mood",\n    belief: "If I expect the worst I can never be truly hurt.",\n    hear: "Hope is survivable. Disappointment is survivable. You do not need the prediction to protect you."\n  },\n  "Independent / Self-Sufficient": {\n    type: "Manager",\n    desc: "Refuses dependence on others to prevent the Emotional Deprivation exile from activating. The person this part manages for can appear highly capable and feel profoundly alone.",\n    gift: "Genuine capability, reliability, self-direction",\n    cost: "Isolation, difficulty asking for help, intimacy feels threatening",\n    belief: "If I need no one no one can abandon me.",\n    hear: "Needing others is not weakness. Connection is not a trap."\n  }\n};\n\n// ── IDENTIFY INFO ────────────────────────────────────────────────────\nvar IDENTIFY = {\n  "Too Much, Too Soon": {\n    what: "This pattern is about the pull of early intensity - when someone comes in fast, warm, and full of promise, and something in you accelerates to match them. There is urgency rather than curiosity. A sense of needing to lock this in before it disappears.",\n    signs: ["You are thinking about them constantly within days of meeting", "You are already imagining a future before seeing how they handle conflict", "You feel anxious when they do not reply quickly", "You have shared significantly more than you normally would this early", "You feel breathless or overwhelmed - and you like it", "You are matching their pace rather than choosing your own", "There is a feverish quality - like something will be lost if you slow down"],\n    why: "When early caregiving was inconsistent the nervous system learned that connection is scarce - so when it appears you move fast. The dopamine surge activates the same urgency that once helped secure an unpredictable caregiver. Intensity feels like proof of something real.",\n    not: "Genuine chemistry. In healthy early connection the pace feels chosen by both and does not produce background anxiety. In this pattern there is an undercurrent of urgency and a fear of losing it if you slow down."\n  },\n  "Too Deep, Too Soon": {\n    what: "This pattern involves being pulled into emotional depth very quickly - flooding, intense sharing, a felt sense of profound connection before you really know the person. The intimacy feels real because the intensity is real. But depth of feeling and depth of knowledge are not the same thing.",\n    signs: ["You feel like you have known them forever after one conversation", "You have shared things you rarely tell anyone, very quickly", "You feel bonded in a way that surprises even you", "The emotional intensity feels like safety", "Ordinary calmer relationships feel flat by comparison", "You feel destabilised if they pull back even slightly", "There is a quality of falling with no ground beneath"],\n    why: "When emotional connection was scarce in childhood and arrived with great intensity, the nervous system learned to equate flooding with real love. Calm consistent intimacy can feel thin - it does not match the original imprint. Intensity becomes the proof.",\n    not: "Healthy emotional openness. Real intimacy involves sharing progressively as trust is built. This pattern skips that process - the depth arrives before the foundation exists."\n  },\n  "The Grey Zone": {\n    what: "This pattern is characterised by chronic uncertainty about where you stand and the exhausting mental effort of trying to resolve it. The other person\'s signals are unclear, their engagement is inconsistent, and you are caught in a loop of interpretation - trying to decode what they mean and whether there is something real here.",\n    signs: ["You do not know where you stand and have been unclear for some time", "You spend significant mental energy analysing their messages or behaviour", "You keep finding reasons why it might work out", "You have told yourself you will give it one more week multiple times", "You feel relief when they engage and anxiety when they go quiet", "You make excuses for low effort or vague communication", "Your friends have started asking what is going on with this person"],\n    why: "When early caregivers were emotionally unavailable the child becomes skilled at reading the environment - watching for signals, filling gaps, decoding what would make connection possible. That habit continues in adulthood, turning ambiguous people into puzzles that feel important to solve.",\n    not: "Early dating uncertainty. Some ambiguity is normal at the start. The grey zone persists beyond a reasonable period and the effort to resolve it becomes compulsive rather than curious."\n  },\n  "The Loop": {\n    what: "This pattern involves a relationship characterised by unpredictability - someone who shifts between warmth and coldness without explanation. The inconsistency keeps you activated and monitoring. You may feel hooked in a way that does not make rational sense.",\n    signs: ["Their mood or availability shifts without obvious cause", "You feel like you are walking on eggshells even during good periods", "The relief when they are warm is disproportionately intense", "You analyse what you might have done to cause the cold shift", "You cannot relax - always braced for the next change", "You have tried to leave but find yourself pulled back", "Others have noticed the pattern but you defend it"],\n    why: "Intermittent reinforcement - unpredictable reward - is neurologically more compelling than consistent reward. The nervous system becomes attuned to the cycle: tension, rupture, relief. When early caregiving was volatile this pattern feels like home. The chaos is familiar.",\n    not: "Normal relationship ups and downs. The loop is structural - the inconsistency is not occasional, there is no reliable repair process, and the pattern repeats with a quality of inevitability."\n  },\n  "One-Way Street": {\n    what: "This pattern involves a significant imbalance of effort and care - you consistently do more: initiating more, giving more emotionally, accommodating more, and receiving considerably less in return. You may be aware of the imbalance but keep finding reasons to stay and give.",\n    signs: ["You initiate contact more often than they do", "You are more invested in the relationship than they appear to be", "You adjust your needs and schedule around theirs", "You feel a quiet ache after interactions - not quite filled", "You have told yourself it will balance out when things settle for them", "You feel mild resentment but push it down", "You would never treat someone you cared about the way they treat you"],\n    why: "Emotional neglect in childhood can produce an adult who learned to give outward as a way of earning connection, and who mistakes unreciprocated giving for love. The hope that enough generosity will eventually produce mutuality keeps the pattern running.",\n    not: "A temporary imbalance during a partner\\\'s difficult period. The one-way street is structural - mutuality has never really been present, not just situationally absent."\n  },\n  "The Act": {\n    what: "This pattern involves a presentation gap - someone whose words and persona are compelling but whose behaviour over time tells a different story. Something registers as off but is hard to name. You find yourself working to earn their approval while something nags quietly underneath.",\n    signs: ["Something does not quite add up but you cannot identify what", "Their public presentation and private behaviour feel different", "You feel you need to be impressive to hold their attention", "You have pushed down an internal off signal more than once", "Their warmth feels contingent on your performance", "You are working harder than feels right to make this real", "You would feel embarrassed to explain the specific things that trouble you"],\n    why: "When early approval was conditional - love available only when performing well - the adult learns to scan for approval signals and adjust. A charming but inconsistent person activates this powerfully: the conditional warmth feels familiar and the pull to earn their approval is strong.",\n    not: "Normal nerves about impressing someone you like. The act is distinct - the performance has an anxious quality, the off signal is persistent, and their warmth is genuinely inconsistent with their behaviour."\n  },\n  "Not On Me": {\n    what: "This pattern involves someone else\'s pain or blame consistently landing on you - and you accepting it, carrying it, and working to fix it. The other person may use victim positioning or emotional intensity to transfer responsibility. You may feel guilty without fully understanding why.",\n    signs: ["You frequently apologise without being sure what you did", "Their emotional state becomes your responsibility to manage", "Conversations that start about them end up about you having failed them", "You feel exhausted and heavy after contact", "You explain yourself at length trying to make them feel better", "You notice a sense of dread before seeing or speaking to them", "Others\' accounts of events differ significantly from theirs"],\n    why: "Parentification - being given emotional responsibility for a caregiver\'s wellbeing as a child - produces an adult who automatically takes on others\' emotional states as their own responsibility. The belief that their pain is your fault or yours to fix runs beneath the surface.",\n    not: "Genuine accountability. Taking responsibility for things you have actually done wrong is healthy. This pattern is different: you are absorbing responsibility for things that are not yours."\n  },\n  "Crossing My Line": {\n    what: "This pattern involves someone consistently pushing against your limits - through criticism, control, testing, or minimising your concerns. The key feature is that your own perception of what is happening becomes unreliable: you start wondering if you are overreacting or expecting too much.",\n    signs: ["You catch yourself wondering if you are overreacting - often", "You feel contracted or tight around them but cannot explain why", "Small things they say or do leave you feeling smaller", "You find yourself defending their behaviour to others", "Your comfort has been dismissed as oversensitivity", "You have adjusted your expectations downward to make this work", "Each individual thing seems small but the accumulation is significant"],\n    why: "When early caregiving involved intrusion or criticism the child learned to distrust their own perceptions - particularly their discomfort. The caregiver\'s interpretation was authoritative; the child\'s experience was not. This produces an adult who automatically doubts their inner signals.",\n    not: "Occasional mismatches. Crossing My Line has a gradual accumulating quality - the doubt about your own perception grows over time rather than resolving, and you feel smaller rather than more settled."\n  },\n  "My Body, My Pace": {\n    what: "This pattern involves physical or sexual pressure that pushes you past your own pace, comfort, or readiness. You may comply while something in you contracts or goes quiet. The disconnection from your body in these moments is the signal: you have left yourself to manage the situation.",\n    signs: ["You go along with things your body is not comfortable with", "There is pressure spoken or unspoken to move faster than you want", "You feel frozen, numb, or not quite present during physical contact", "Slowing down or stopping feels like it will create a problem", "You override discomfort rather than naming it", "Afterwards you feel a vague unease you struggle to explain", "Their desire seems to take precedence over your readiness and you accept this"],\n    why: "When boundaries were not respected in early development, or when expressing discomfort was unsafe, the body learns to comply. The fawn response overrides the body\'s signals in order to maintain safety through accommodation.",\n    not: "Nervousness in intimacy. The difference is the overriding: in this pattern there is a clear body signal saying not this or not yet that is being suppressed in order to manage the other person\'s response."\n  },\n  "The Vanish": {\n    what: "This pattern involves the sudden or gradual withdrawal of someone - ghosting, unexplained silence, or disappearance without closure. The absence produces a particular suffering: the ambiguity. Without an explanation the mind fills the gap - and the filling almost always involves self-blame and the urge to pursue.",\n    signs: ["Contact has dropped off significantly or stopped without explanation", "You find yourself replaying the last interactions looking for what went wrong", "The urge to reach out is almost physical in its intensity", "Shame is rising - something must be wrong with you", "You are making up explanations that excuse their behaviour", "You have checked their social media to confirm they are still active", "The not-knowing feels worse than any clear ending would"],\n    why: "When early relationships included abandonment without repair - a parent who left or a caregiver who withdrew without explanation - the adult develops extreme sensitivity to unresolved disconnection. The nervous system learned that disappearance without closure is catastrophic.",\n    not: "Someone who is genuinely busy or going through something difficult. The vanish is characterised by the sustained unexplained nature of the withdrawal and the absence of any attempt at communication or repair."\n  },\n  "Invisible Work": {\n    what: "Effort that is real and substantial but not recognised. There is a growing compulsion to do more to close the gap between what you produce and what is acknowledged.",\n    signs: ["You work harder when invisible rather than addressing it directly", "The occasional acknowledgement produces relief that is disproportionate", "You have started to wonder whether you are actually good at this", "You compare your visibility to colleagues and feel the gap", "You track recognition more than you used to", "You justify staying in this environment despite the cost"],\n    why: "When early approval was conditional on performance the adult develops a nervous system that equates recognition with safety. The absence of acknowledgement re-activates the old sense of not being enough.",\n    not: "Normal variation in feedback. Invisible Work is structural - consistently unseen over time, and the response is to increase output rather than name the dynamic."\n  },\n  "Power Over": {\n    what: "Someone in authority using that authority as a source of pressure, fear, or control rather than genuine leadership. What makes it distinct is the way it shrinks you over time.",\n    signs: ["You feel dread before interactions with this person", "You over-prepare to avoid their criticism", "You monitor their mood before deciding what to say", "You feel relief when they are pleased - more than is appropriate", "You are smaller in your role than when you started", "Colleagues have noticed something in the dynamic too"],\n    why: "Volatile or controlling caregiving trains the nervous system to treat authority figures as sources of danger. A difficult manager reactivates this system - the old impulse to manage, please, and hide becomes the default again.",\n    not: "High standards and direct feedback. Power Over involves something specifically threatening - an unpredictability or quality of personal diminishment."\n  },\n  "Walking on Eggshells (Work)": {\n    what: "The workplace equivalent of The Loop - a relationship characterised by unpredictability that keeps you vigilant, monitoring, and managing rather than working.",\n    signs: ["You scan the environment before committing to any action", "You have developed a finely tuned read of this person\'s mood", "You are exhausted in a way that does not match your workload", "You find yourself explaining or justifying them to others", "Colleagues also find this person difficult to read", "You feel relief on days when they are absent"],\n    why: "Volatile caregiving creates a nervous system expert at threat detection. A volatile colleague activates this system and the old monitoring and pre-empting begins again automatically.",\n    not: "Occasional difficult dynamics. This pattern is structural - the volatility is consistent even if what triggers it varies."\n  },\n  "Over-Responsible": {\n    what: "The workplace version of parentification - taking on more than your share not just practically but psychologically. The work finds its way to you because you take it on.",\n    signs: ["You are the person others bring their problems to", "You find it very difficult to say no even when at capacity", "You do things yourself that you could delegate", "You are often the last to leave and first to respond", "Resentment is building but you feel guilty about it", "You feel anxiety when things might slip without your intervention"],\n    why: "Parentification creates an adult who automatically expands to fill need around them. The nervous system learned that over-functioning keeps systems stable and earns love.",\n    not: "A genuinely demanding role. This pattern is about the compulsive quality of the over-responsibility and inability to set limits even when it is clearly costing you."\n  },\n  "The Performance": {\n    what: "Not just ordinary self-doubt but a persistent underlying conviction that you are less competent than others believe and that exposure is only a matter of time.",\n    signs: ["You prepare more extensively than colleagues seem to need to", "Being praised feels good briefly then triggers anxiety about next time", "You minimise your expertise when asked", "Mistakes affect you for longer than they seem to affect others", "You feel genuine surprise when your work is received well", "You compare your internal experience to others\' external confidence and feel the gap"],\n    why: "When early approval was contingent on performance the child never developed a stable internal sense of competence. Even high achievement does not settle the underlying conviction of inadequacy.",\n    not: "Normal performance anxiety. The imposter pattern persists across success - the doubt is not resolved by evidence of competence."\n  },\n  "Shut Out": {\n    what: "A consistent experience of your voice not being heard, contributions not credited, or presence not acknowledged in the visible fabric of the organisation.",\n    signs: ["Your ideas are regularly discussed only after someone else raises them", "You are left off key communications or excluded from relevant meetings", "You have started to pre-filter your contributions to things you feel certain about", "You have pulled back from volunteering ideas rather than risk dismissal again", "You feel smaller in this role than your abilities warrant", "Speaking in groups produces a disproportionate internal experience of risk"],\n    why: "Early experiences of emotional unavailability can produce an adult whose nervous system expects not to be heard. The expectation of dismissal can precede actual dismissal and become self-fulfilling.",\n    not: "A single incident of being talked over. Shut Out is a pattern - the experience of your voice not carrying is consistent over time."\n  },\n  "Used Not Valued": {\n    what: "Skills, knowledge, or labour extracted and used without corresponding investment in you as a person. Transactional, not relational.",\n    signs: ["You are called upon when needed and overlooked otherwise", "Your contributions are acknowledged instrumentally but not relationally", "You have stayed because you believe the investment will eventually come", "When you are not useful you feel your status shift", "You have started to wonder whether you would be missed or simply replaced", "The depletion builds slowly rather than arriving dramatically"],\n    why: "Emotional neglect in early development produces an adult who confuses being useful with being valued. The absence of genuine investment feels familiar and is tolerated far longer than it should be.",\n    not: "Professional relationships which are appropriately transactional. Used Not Valued extends beyond the professional contract with a specific loneliness in being known only for your function."\n  },\n  "The Underminer": {\n    what: "Agreement to your face and a different behaviour behind it - credit taken, information withheld, support withdrawn, subtle sabotage.",\n    signs: ["You notice a gap between what was agreed and what happens", "Your contributions seem received differently in your absence than in your presence", "You doubt your own read of the situation - it seems too subtle to name", "You have become guarded about what you share with this person", "Others have made comments suggesting your perception might be accurate", "You feel a specific vigilance around this person you do not feel with others"],\n    why: "Safe/unsafe caregiving trains the nervous system to expect treachery from close relationships. The adult may second-guess accurate perception of genuinely harmful behaviour because the training was to doubt their own read of situations.",\n    not: "General competitive dynamics. The underminer pattern involves specific directed behaviour - a consistent gap between stated and actual conduct in relation to you specifically."\n  },\n  "Never Good Enough": {\n    what: "Love and approval experienced as conditional on performance or meeting an ever-moving standard. The child works hard to earn what should have been freely given.",\n    signs: ["Visits or calls often leave you feeling like you fell short", "Their approval produces disproportionate relief", "Their disappointment produces shame that feels much older than this moment", "You achieve significantly and still feel the gap", "Their voice appears in your internal critic", "The standard seems to move every time you approach it"],\n    why: "Conditional approval creates a child who concludes they are not enough as they are, but that doing more might eventually earn love that feels just out of reach. This architecture does not change when the adult becomes impressive.",\n    not: "High expectations combined with genuine warmth and celebration. This pattern is characterised by the conditional quality of love - achievements acknowledged briefly if at all, followed immediately by raising the bar."\n  },\n  "The Unspoken Rules": {\n    what: "Every family has rules but healthy families can name them. In this pattern the rules are real but cannot be spoken. Do not upset X. Do not talk about what happens here. Do not take up too much space.",\n    signs: ["You self-censor significantly around family", "There are topics or events that simply cannot be discussed", "You perform a version of yourself that fits the family rather than your whole self", "You feel the rules operating but cannot describe them", "Leaving family visits produces something that feels like release", "You have told the truth in a family context and experienced the consequences"],\n    why: "Intrusive caregiving often produces families with rigid unspoken rules. The child learns early that self-expression outside sanctioned limits produces withdrawal, punishment, or family disruption.",\n    not: "Family privacy and appropriate limits. This pattern actively suppresses authentic experience and requires ongoing performance of a self that fits the system."\n  },\n  "Carrying the Family": {\n    what: "One person becomes the emotional carer - the one who holds it together, mediates, and supports. The parentified child in adult form, present to meet the family\'s emotional needs in ways that were never their responsibility.",\n    signs: ["Family members come to you first when struggling", "You feel specific guilt when unavailable to the family", "You take calls and manage crises that drain you significantly", "You find it very difficult to have problems of your own", "You have no memory of being the one who was supported", "The family functions worse when you step back"],\n    why: "Parentification - being required to function as an emotional adult before your own needs are met - is among the most clinically significant developmental experiences. The adult continues in the role not because they chose it but because the role chose them.",\n    not: "Being a caring involved family member. Parentification is characterised by the absence of reciprocity - no child should have been asked to carry what you carried."\n  },\n  "The Scapegoat": {\n    what: "In unhealthy family systems one person carries the family\\\'s collective difficulty - the labelled one, the difficult child. This role is assigned not earned. The scapegoat is usually the most honest or most resistant to the family\'s denial.",\n    signs: ["Family conflict is regularly attributed to your presence or reactions", "Your attempts to change the dynamic become further evidence of the problem", "You were the one in therapy or trouble while others\' difficulties were invisible", "You feel both angry about the label and half-convinced it might be true", "People outside the family find you significantly less difficult than your family does", "When you are absent things are described as calmer even though the problems predate you"],\n    why: "Scapegoating externalises the family\'s unprocessed distress. The scapegoated child often became so because they refused to participate in the denial - they told the truth and the system identified that honesty as the problem.",\n    not: "Being the family member who genuinely struggled. Scapegoating involves systematic distortion - the attribution of broader family dysfunction to one person."\n  },\n  "The Invisible One": {\n    what: "The quiet neglect when attention, resources, and emotional investment flow to other siblings or parents\' own needs, leaving one child essentially overlooked. The damage is often invisible because nothing dramatic happened.",\n    signs: ["Your achievements were not celebrated the way a sibling\'s were", "There is little emotional memory of being known or tracked as a child", "You became very self-sufficient early and were praised for it", "You minimise your experience - you were fine, not abused", "You have difficulty receiving attention or care from safe people", "You have felt invisible in other relationships throughout adult life"],\n    why: "Emotional neglect produces an adult who has learned to need very little, whose inner world was not regularly met, and who carries an unspoken conviction that they are not worth the effort. Being quiet and low-maintenance was an adaptation, not evidence you needed less.",\n    not: "Natural variation in family attention. Emotional neglect has a sustained quality - the child was consistently not the focus of emotional investment."\n  },\n  "Don\'t Rock the Boat": {\n    what: "Family loyalty over truth - where maintaining the family\\\'s narrative takes precedence over accuracy or individual experience. The cost is born by whoever most clearly sees the gap between the story and the reality.",\n    signs: ["There are truths about your family you cannot speak in family contexts", "You maintain a version of family history that does not match your experience", "Bringing reality into family conversations produces pressure to withdraw it", "You have a sense of knowing something you cannot say", "Leaving the family context produces a specific sense of being able to breathe", "You have spoken truth in a family context and experienced its cost"],\n    why: "Families that require suppression of truth do so because the truth threatens their stability or image. The child who carries suppressed truth pays a significant cost - maintaining double awareness: internal knowing and external compliance.",\n    not: "Appropriate family privacy. This pattern requires systematic suppression of truth and collusion with a version of events that does not match experience."\n  },\n  "Enmeshed": {\n    what: "The boundary between self and family is either absent or actively punished when it appears. The child does not develop a clearly separate self because separateness is experienced as rejection or betrayal.",\n    signs: ["Having your own life produces guilt in relation to the family", "You absorb family members\' emotional states as if they were your own", "Decisions about your life are processed through how the family will respond", "You are not sure what you actually want outside of what fits the family", "Setting a limit in relation to family produces significant anxiety and guilt", "Significant events in your life are experienced primarily through their effect on the family"],\n    why: "Enmeshment develops when the child\'s individuation is experienced as threatening to the system. Caregivers\' own fears of abandonment mean the child\'s natural development toward separateness is disrupted or punished.",\n    not: "Close loving family bonds. Enmeshment is characterised by the impossibility of separateness without cost - not by the presence of warmth."\n  },\n  "Going Home": {\n    what: "Returning to the family environment and finding the adult self recedes - old roles and dynamics re-activate as if no time has passed. This is not a failure of therapeutic progress. It is the nervous system returning to where the original patterns were formed.",\n    signs: ["Something shifts in you at or before arrival at the family environment", "You find yourself responding from an older version of yourself", "Feelings emerge that feel disproportionate to the current situation", "You leave visits more depleted than the practical circumstances explain", "You feel shame about how strongly the environment still affects you", "You are clearer about your patterns away from family than when you are in it"],\n    why: "The family environment contains every sensory, social, and relational cue associated with the original developmental experience. Returning to it activates the nervous system\'s old architecture. This is neurological - not a measure of recovery.",\n    not: "A failure to have healed. Going Home regression is evidence of the power of conditioned environment on the nervous system. The measure of growth is how you resource yourself through it - not whether you are unaffected."\n  },\n  "One-Way Friend": {\n    what: "The friendship version of relational imbalance - one person consistently gives more, initiates more, provides more support, and invests more emotionally.",\n    signs: ["You are typically the one who reaches out first", "You notice when they are struggling and check in - they rarely do the same", "After significant events in your life they do not follow up", "You make excuses for their low investment", "You have lowered your expectations over time without naming that as what you have done", "There is a specific quality of disappointment after most interactions that you have normalised"],\n    why: "Emotional neglect in early development often produces an adult who is very practised at giving and unaccustomed to receiving. The expectation of mutuality was never reliably formed so its absence does not trigger the alarm it should.",\n    not: "A temporary imbalance during a friend\'s difficult period. The one-way friendship is structural - the imbalance is consistent and long-standing."\n  },\n  "Fair Weather": {\n    what: "A friendship that is present and warm when circumstances are good and quietly unavailable when you are genuinely struggling. The person is not unkind - they are simply not built for the difficult parts.",\n    signs: ["You have noticed they become hard to reach when you are going through something", "You moderate what you share because you know the limits of their availability", "When you are doing well the friendship feels genuine and nourishing", "You have been left specifically when you most needed support", "You make excuses for their absence in hard times", "You have started to self-censor your difficulties rather than risk their withdrawal"],\n    why: "Inconsistent caregiving creates particular sensitivity to care that is conditional on the absence of genuine need. This is the precise relational wound being re-activated - care available for the easy parts, absent for the hard ones.",\n    not: "A friend going through a period of limited capacity. Fair weather is structural - the withdrawal during hard times is consistent and the person is genuinely not available when it counts."\n  },\n  "The Subtle Competitor": {\n    what: "A friendship in which your wins are subtly managed, your happiness requires self-editing, and an undercurrent of comparison runs beneath the warmth. It may never be spoken. You may be the only one who notices it.",\n    signs: ["You self-edit your good news before sharing it with this person", "Their response to your wins has a quality that leaves you feeling less", "You feel more self-conscious about your life choices around them than other friends", "The friendship is easier when you are struggling than when you are thriving", "You feel unable to name the dynamic without sounding paranoid or unkind", "You have noticed their mood improves when things are not going well for you"],\n    why: "Conditional approval creates adults particularly sensitive to approval from peers and who may recreate competitive dynamics from their early family environment.",\n    not: "Natural envy that a good friend manages transparently. The subtle competitor pattern involves a consistent covert quality - the competition is not acknowledged and you are expected to collude with the pretence."\n  },\n  "The Intensity": {\n    what: "The friendship version of Too Deep Too Soon - a connection that moves to deep intimacy very quickly, in a way that feels profound but outpaces the actual knowledge of each other.",\n    signs: ["The friendship escalated in intensity before you fully chose it", "You feel you know this person in a way not quite matched by what you actually know about them", "There is a quality of obligation in the depth - hard to slow without seeming to withdraw", "You feel guilt when you need space", "The friendship is consuming more energy than you realised", "Ordinary friendships feel flat by comparison"],\n    why: "Deprivation and intensity bonding creates an adult who equates flooding and rapid depth with real connection. Ordinary gradual friendship development can feel insufficient against this template.",\n    not: "A genuine deep connection that developed naturally. The intensity pattern is characterised by speed that outpaces actual knowledge and a quality of obligation - being in deeper than you consciously chose."\n  },\n  "The Drift": {\n    what: "A friendship that seems to be fading with the specific suffering of not knowing whether this is natural change or quiet rejection - and the nervous system unable to rest in that ambiguity.",\n    signs: ["You have noticed contact reducing without identifying a reason", "You replay recent interactions looking for what might have changed", "The urge to reach out is accompanied by fear of looking too needy", "You feel specific shame about how much you need to know", "You have told yourself it is probably nothing and continued thinking about it", "The uncertainty is actively more painful than a clear ending would be"],\n    why: "Abandonment without repair in early development creates adults whose nervous system cannot rest in relational ambiguity. The drift reactivates the original unresolved loss and the body responds as if the danger is present again.",\n    not: "Natural change in friendship intensity over time. The drift pattern involves a specific suffering: the inability to tolerate the ambiguity and the shame about needing clarity."\n  },\n  "The Group": {\n    what: "The specific dynamics of group friendships - the subtle hierarchies, the risk of exclusion, the need to perform for collective acceptance, and the particular loneliness of being on the periphery while appearing to belong.",\n    signs: ["You feel slightly more performative in the group than in individual friendships within it", "You monitor where you sit in the group\'s informal hierarchy", "Finding out something happened without you produces a disproportionately painful response", "One-to-one within the group feels safer than the group itself", "You have worried about your standing without a specific incident to point to", "The group costs more energy than the individual relationships within it seem to"],\n    why: "Emotional neglect in early peer and social environments creates adults whose nervous system treats group belonging as perpetually at risk.",\n    not: "Normal social complexity. The group pattern is characterised by the specific quality of vigilance - the ongoing monitoring of standing - and the disproportionate cost of exclusion when it occurs."\n  }\n};\n\n// ── REGULATION TOOLS BY NS STATE ────────────────────────────────────\nvar REG_MAP = {\n  "Hyperactivation": [{\n    name: "Belly breathing",\n    time: "5-7 cycles",\n    desc: "Place one hand on your abdomen. Breathe in for 4 counts so the belly rises. Hold 2 counts. Breathe out for 4-6 counts. Moving the breath down into the belly disrupts the feedback loop between shallow chest breathing and threat perception. The extended exhale is the most important part — it directly activates the parasympathetic branch of the vagus nerve."\n  }, {\n    name: "Sensory anchoring",\n    time: "1-2 mins",\n    desc: "Name 5 things you can see, 4 you can touch, 3 you can hear, 2 you can smell, 1 you can taste. Rumination and urgency are both future-oriented. Sensory input is present-tense only. This physically interrupts the internal threat loop by requiring live sensory contact with the environment."\n  }, {\n    name: "Label the feeling",\n    time: "Immediately",\n    desc: "Say or write: I notice I am feeling... Naming an emotion in clear language activates the prefrontal cortex and reduces the intensity of the amygdala response. You do not need to fix the feeling. The naming is the regulation."\n  }, {\n    name: "Cold water reset",\n    time: "30-60 secs",\n    desc: "Run cold water over your wrists and inner forearms, or briefly splash your face. Cold temperature triggers a physiological brake on sympathetic activation, rapidly reducing heart rate. This is the fastest available intervention for high ar
